<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Validated ID — LinkedIn Vídeos</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  [hidden] { display: none !important; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #151A35;
    color: #ccd6f6;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: #0d1229;
    border-bottom: 3px solid #00BF71;
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo-area {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .logo-image {
    height: 30px;
    width: auto;
    display: block;
  }

  .header-subtitle {
    font-size: 0.85rem;
    color: #8892b0;
    margin-left: 0.5rem;
  }

  .header-network-nav {
    margin-left: auto;
    display: flex;
    gap: 0.5rem;
  }

  .header-network-btn {
    background: transparent;
    border: 1px solid #2a3a5a;
    color: #ccd6f6;
    border-radius: 6px;
    padding: 0.35rem 0.7rem;
    font-size: 0.8rem;
    font-weight: 700;
    cursor: pointer;
    text-decoration: none;
  }

  .header-network-btn:hover {
    border-color: #00BF71;
    color: #00BF71;
  }

  .header-network-btn.active {
    background: #00BF71;
    border-color: #00BF71;
    color: #0d1229;
    cursor: default;
  }

  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .coming-soon-card {
    background: #1e2a4a;
    border: 2px solid #2a3a5a;
    border-radius: 12px;
    padding: 3rem 2rem;
    text-align: center;
    max-width: 500px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
  }

  .coming-soon-icon {
    font-size: 4rem;
    margin-bottom: 1.5rem;
  }

  .coming-soon-title {
    font-size: 1.8rem;
    font-weight: 700;
    color: #e6f0ff;
    margin-bottom: 0.5rem;
  }

  .coming-soon-text {
    font-size: 1rem;
    color: #8892b0;
    line-height: 1.6;
    margin-bottom: 1.5rem;
  }

  .coming-soon-badge {
    display: inline-block;
    background: #00BF71;
    color: #0d1229;
    padding: 0.5rem 1rem;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  footer {
    background: #0d1229;
    border-top: 1px solid #2a3a5a;
    text-align: center;
    padding: 1rem;
    font-size: 0.8rem;
    color: #8892b0;
  }
  footer a { color: #00BF71; text-decoration: none; }
</style>
</head>
<body>

<header>
  <div class="logo-area">
    <a href="index.html" title="Volver a inicio">
      <img class="logo-image" src="assets/validated-id-logo-white-text-alt.webp" alt="Validated ID">
    </a>
    <span class="header-subtitle">Archivo de vídeos · LinkedIn</span>
  </div>
  <div class="header-network-nav">
    <a href="youtube.html" class="header-network-btn">YouTube</a>
    <button class="header-network-btn active">LinkedIn</button>
  </div>
</header>

<main>
  <div class="coming-soon-card">
    <div class="coming-soon-icon">📌</div>
    <h1 class="coming-soon-title">Próximamente</h1>
    <p class="coming-soon-text">
      El archivo de vídeos de LinkedIn estará disponible en breve. 
      Por ahora, puedes explorar nuestro archivo de vídeos de YouTube.
    </p>
    <span class="coming-soon-badge">En construcción</span>
  </div>
</main>

<footer>
  Archivo personal · Vídeos alojados en <a href="https://archive.org" target="_blank">Internet Archive</a> · Validated ID (2016–2025)
</footer>

</body>
</html>
