2","date":"03/01/2016","year":"2016","lang":"ES","type":"multiPhoto","text":"#ViDSigner es una solución de #firmaelectrónica ideal para los sectores de #Salud, administración pública, recursos humanos, distribución...\nPara más información:\nhttp://www.validatedid.com\nSi tienes una #clínica aquí www.validatedid.com/vidclinicas","images":["https://archive.org/download/validatedid-facebook-media/1114671241891100.jpg","https://archive.org/download/validatedid-facebook-media/1114671265224431.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1451851012"},{"anchor":"fb-1451763397","date":"02/01/2016","year":"2016","lang":"ES","type":"photo","text":"Los profesionales de la Justicia, obligados desde 1 Enero a presentar escritos por Internet.\nhttp://www.europapress.es/nacional/noticia-profesionales-justicia-obligados-hoy-presentar-escritos-internet-20160101111141.html\nLos profesionales de la Justicia, obligados desde hoy a presentar escritos por Internet\n\nLa norma incluye la obligatoriedad de todos los profesionales de la justicia y órganos y oficinas judiciales y fiscales, que aún no lo hagan, de emplear los sistemas telemáticos existentes en la Administración de Justicia para la presentación de escritos y documentos y la realización de actos de comunicación procesal. \n#firmaelectrónica #innovavión #ViDSigner","images":["https://archive.org/download/validatedid-facebook-media/1114143115277246.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1451763397"},{"anchor":"fb-1451676241","date":"01/01/2016","year":"2016","lang":"ES","type":"photo","text":"“La UE aprueba la ley de protección de datos, bloqueada desde 2013” http://bit.ly/1MLdioB \n\n\"Esta reforma no sólo fortalece los derechos de los ciudadanos, sino también la adaptación de las reglas en la era digital para nuestros negocios, al tiempo que reduce la carga administrativa\", ha declarado Félix Braz, ministro de Interior luxemburgués, país que ostenta la presidencia de turno de la UE hasta final de 2015.\n\nAunque aún no se han desvelado todos los detalles de este acuerdo, las fuentes consultadas lo consideran \"equilibrado\" tanto para las personas como para las empresas. Por ejemplo, las empresas no podrán compartir datos de los usuarios sin su autorización. Los consumidores deberán dar su consentimiento \"explícito\" para el intercambio de datos...\n\n----\n\nValidated ID es una empresa que muestra interés en la seguridad digital del ciudadano, el profesional y la empresa.\nCon VidSigner, ofrece USABILIDAD Y SEGURIDAD JURÍDICA en un servicio único de #firmaELECTRÓNICA\n\nahora también en el sector salud\nvisita http://www.validatedid.com/vidclinicas/\n\ncon VidSigner OLVÍDATE DE LOS PAPELES EN TU CLÍNICA","images":["https://archive.org/download/validatedid-facebook-media/1113590731999151.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1451676241"},{"anchor":"fb-1451505925","date":"30/12/2015","year":"2015","lang":"ES","type":"photo","text":"Los algoritmos serán los encargados de pilotar la nueva economía digital.\nhttp://www.eleconomista.es/tecnologia/noticias/7250343/12/15/Los-algoritmos-seran-los-encargados-de-pilotar-la-nueva-economia-digital.html\nToda esta digitalización de los sectores está marcando una nueva era dónde los datos adquieren una gran importancia pues gracias a ellos aparecen nuevos modelos de negocio\n#Seguridad #Innovación #ViDSigner","images":["https://archive.org/download/validatedid-facebook-media/1112388335452724.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1451505925"},{"anchor":"fb-1451420040","date":"29/12/2015","year":"2015","lang":"ES","type":"photo","text":"Prueba la #firmabiométrica de ViDSigner y no dejes que ni un solo papel te aparte nunca más de lo realmente importante.\nhttp://www.validatedid.com/vidclinicas\n¡Alta gratis y primer mes de prueba gratuito!\n Altas realizadas hasta el 31 de diciembre de 2015","images":["https://archive.org/download/validatedid-facebook-media/1111829025508655.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1451420040"},{"anchor":"fb-1451299137","date":"28/12/2015","year":"2015","lang":"ES","type":"multiPhoto","text":"\"Seguridad en la nube\"\nSi hay una pregunta que me hace todo el mundo cuando se habla de programas de gestión en la nube es sin ninguna duda: ¿están mis datos seguros en la nube?\nhttp://www.cliniwin.com/blog.html\nNos lo explica uno de nuestros partners, Cliniwin, en este post.\n#ViDSigner  #Seguridad  #Innovación\n\nwww.validatedid.com/vidclinicas","images":["https://archive.org/download/validatedid-facebook-media/1111191862239038.jpg","https://archive.org/download/validatedid-facebook-media/1111191908905700.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1451299137"},{"anchor":"fb-1451253248","date":"27/12/2015","year":"2015","lang":"ES","type":"photo","text":"Violaciones de datos en 2016 ¿qué podemos esperar? http://sco.lt/5apfPt  #ciberseguridad\n\nLa amenaza de las violaciones de datos no va a desaparecer...\n\n2015 fue un año con violaciones de datos sifinificativas , tanto en la asistencia sanitaria como en otros sectores.\nEn la sede de Himno, en indianapolis, se informó en Febrero de un ataque cibernético y de la mayor violación de datos hasta la fecha, ya que afectó a 78,8 millones de personas.\n\nMás ataques se preven para el 2016 y años venideros...\n\n------\n\nEn ValidatedID nos preocupa y ocupa la seguridad en el entorno salud...\n\npor eso ponemos a su disposición VidSigner,\n\nusabilidad y seguridad jurídica para un servicio de #firmaelectrónica en Clínica y Centro Médico\nVisita http://www.clinicasinpapeles.com","images":["https://archive.org/download/validatedid-facebook-media/1110821685609389.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1451253248"},{"anchor":"fb-1451075433","date":"25/12/2015","year":"2015","lang":"ES","type":"photo","text":"Los últimos avances de la #firmabiométrica en el XXII Congreso Nacional de Derecho Sanitario\nHerramientas como la firma biométrica pueden ser muy robustas jurídicamente, a la vez que agilizan los trámites sanitarios evitando una gran cantidad de engorroso papeleo.\nhttp://noticias.juridicas.com/actualidad/noticias/10544-los-ultimos-avances-de-la-firma-biometrica-en-el-xxii-congreso-nacional-de-derecho-sanitario/\n#ViDSigner #Seguridad #Innovación","images":["https://archive.org/download/validatedid-facebook-media/1109514622406762.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1451075433"},{"anchor":"fb-1450872301","date":"23/12/2015","year":"2015","lang":"ES","type":"photo","text":"Diseñan chips capaces de detectar enfermedades desde el interior de las células\nhttp://www.consalud.es/seenews.php?id=23293\nUn grupo de investigadores españoles logran reducir hasta 1.000 millones de veces el tamaño de los chips que se usan habitualmente en el estudio y detección de enfermedades.\n#innovación #tecnología #Salud #ViDSigner","images":["https://archive.org/download/validatedid-facebook-media/1108199825871575.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1450872301"},{"anchor":"fb-1450899465","date":"23/12/2015","year":"2015","lang":"ES","type":"photo","text":"Firma electrónica para (casi) todo. ¡Feliz Navidad!","images":["https://archive.org/download/validatedid-facebook-media/1108382882519936.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1450899465"},{"anchor":"fb-1450810507","date":"22/12/2015","year":"2015","lang":"ES","type":"photo","text":"Inteligencia artificial y #BigData consolidan su avance en 2015\n\nhttp://www.larazon.es/atusalud/ciencia/inteligencia-artificial-y-big-data-consolidan-su-avance-en-2015-MG11533087#.Ttt1W19HlffgJ5C\n\nLa #inteligenciaartificial y la analítica de grandes cantidades de datos, Big Data, son los dos grandes avances tecnológicos cuyas posibilidades en #salud se han terminado de asentar este año. También son los factores que más pueden cambiar la medicina de los próximos años, hacia un modelo mucho más preciso y preventivo, en el que apenas quede margen para el error humano.","images":["https://archive.org/download/validatedid-facebook-media/1107857372572487.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1450810507"},{"anchor":"fb-1450699025","date":"21/12/2015","year":"2015","lang":"ES","type":"photo","text":"¿Quieres integrar tu software con ViDSigner? \nCon nuestra API REST es realmente fácil.  http://www.validatedid.com/#partners Pídenos más información...ellos ya lo han hecho!!\n#Partnets #Innovación #Firmaelectrónica","images":["https://archive.org/download/validatedid-facebook-media/1107202095971348.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1450699025"},{"anchor":"fb-1450723980","date":"21/12/2015","year":"2015","lang":"ES","type":"photo","text":"M-Health: Salud, tecnología y los grandes beneficios para pacientes e instituciones\nPor #mHealth se entiende como el uso de tecnologías móviles, como los teléfonos celulares, aplicadas al sector salud para mejorar la prestación de servicios, la vigilancia, el control, entre otros.\nhttp://reportedigital.com/m2m/mhealth-salud-tecnologia-grandes-beneficios-pacientes-instituciones/\n\nAhora bien, ¿qué beneficios puede ofrecer la #mHealth?\n#innovación #tecnología #ViDSigner","images":["https://archive.org/download/validatedid-facebook-media/1107356672622557.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1450723980"},{"anchor":"fb-1450613060","date":"20/12/2015","year":"2015","lang":"ES","type":"photo","text":"Recuerda, seguimos de promoción!!!\nAprovecha esta oportunidad de probar nuestros servicios de #firmaelectrónica ViDSigner.\nAlta Gratis y primer mes de prueba Gratis...sólo hasta el 31 de Diciembre.\n#firmabiométrica #Seguridadjurídica #ViDSigner","images":["https://archive.org/download/validatedid-facebook-media/1106700379354853.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1450613060"},{"anchor":"fb-1450638021","date":"20/12/2015","year":"2015","lang":"ES","type":"photo","text":"La cirugía vive la revolución de los quirófanos inteligentes.\nRobots articulados, pantallas táctiles con toda la información del paciente, servicios de imagen y streaming en alta definición y la monitorización de todas las variables.\nhttp://consalud.es/saludigital/seedigital.php?id=79&revista=6\n#innovación #tecnología #ViDSigner","images":["https://archive.org/download/validatedid-facebook-media/1106869702671254.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1450638021"},{"anchor":"fb-1450547512","date":"19/12/2015","year":"2015","lang":"ES","type":"multiPhoto","text":"Star Wars : “El despertar de la #SaludDigital”\n\nBrazos biónicos, cirugía robótica y criogenización son algunas de las realidades que George Lucas vislumbró en su Guerra de Las Galaxias.\n\nhttp://consalud.es/saludigital/seedigital.php?id=78&revista=6#.VnVBcy_UU0s.twitter\n#innovación #tecnología #ViDSigner","images":["https://archive.org/download/validatedid-facebook-media/1106321316059426.jpg","https://archive.org/download/validatedid-facebook-media/1106321356059422.jpg","https://archive.org/download/validatedid-facebook-media/1106321446059413.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1450547512"},{"anchor":"fb-1450526613","date":"19/12/2015","year":"2015","lang":"ES","type":"photo","text":"Los ‘wearables’ españoles apuestan por la #salud\nDesde tejidos inteligentes hasta ‘apps’ para las Google Glass, el talento nacional se fija en esta #tecnología.\nhttp://cincodias.com/cincodias/2015/12/09/empresas/1449683865_882217.html\nLa revolución de los dispositivos electrónicos que se llevan en alguna parte del cuerpo e interactúan con el usuario, #wearables, ya ha llegado.","images":["https://archive.org/download/validatedid-facebook-media/1106152759409615.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1450526613"},{"anchor":"fb-1450429727","date":"18/12/2015","year":"2015","lang":"ES","type":"photo","text":"Lluis Monset , Director General de ACES (Associació Catalana d'Entitats de Salut) y Santi Casas, CEO de Validated ID han firmado el acuerdo de colaboración. #ViDSigner #eSign #Salud #Aces","images":["https://archive.org/download/validatedid-facebook-media/1105594082798816.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1450429727"},{"anchor":"fb-1450440000","date":"18/12/2015","year":"2015","lang":"ES","type":"photo","text":"¿Por qué el 2016 será el año de la adopción de los #wearables?\nQuizás 2016 será el año #wearable. Dependiendo de qué informe o analista quiera creer, el año que viene va a ser el año para la adopción masiva ... de la misma forma en que 2015 iba a ser el punto de inflexión.\nhttp://arc.applause.com/2015/12/12/wearables-mass-adoption-2016-forrester/\n#innovación #tecnología #ViDSigner","images":["https://archive.org/download/validatedid-facebook-media/1105617536129804.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1450440000"},{"anchor":"fb-1450465440","date":"18/12/2015","year":"2015","lang":"ES","type":"photo","text":"Una entrada de nuestro Blog, es de hace tiempo pero con una información muy importante a la hora de valorar nuestra #firmaelectrónica.\nDESMATERIALIZACIÓN DEL CONSENTIMIENTO INFORMADO\nhttp://www.validatedid.com/es/informed-consent-paperless/#prettyPhoto\nEl consentimiento informado requiere la forma escrita en determinados supuestos, lo que implica a su vez la necesidad de obtener la firma del paciente como prueba de su conformidad.\nNuestro servicio de firma electrónica #ViDSigner, da respuesta a las necesidades del sector sanitario respecto a la obtención del consentimiento informado del paciente y su ratificación por el facultativo.","images":["https://archive.org/download/validatedid-facebook-media/1105815229443368.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1450465440"},{"anchor":"fb-1450353720","date":"17/12/2015","year":"2015","lang":"ES","type":"photo","text":"#ViDSigner no sólo es una solución de #firmaelectrónica ideal para el sector #Salud, también para administración pública, recursos humanos, distribución...\nPara más información:\nhttp://www.validatedid.com\nSi tienes una #clínica aquí www.validatedid.com/vidclinicas","images":["https://archive.org/download/validatedid-facebook-media/1104741929550698.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1450353720"},{"anchor":"fb-1450293434","date":"16/12/2015","year":"2015","lang":"ES","type":"multiPhoto","text":"Google trabaja en un #wearable para medir los niveles de glucosa.\nPatenta un tipo de smartwatch que utilizaría un sistema de gas a presión para obtener pequeñas muestras de sangre sin que el usuario lo note.\nhttp://www.consalud.es/saludigital/seedigital.php?id=73&revista=5\n#innovación #tecnología #ViDSigner","images":["https://archive.org/download/validatedid-facebook-media/1104137672944457.jpg","https://archive.org/download/validatedid-facebook-media/1104137669611124.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1450293434"},{"anchor":"fb-1450180861","date":"15/12/2015","year":"2015","lang":"ES","type":"photo","text":"Emprendimiento tecnológico para la innovación en salud\n\nhttp://blogthinkbig.com/emprendimiento-tecnologico-la-innovacion-salud/\nWearables, Big Data, realidad virtual, impresión 3D… son muchas las tecnologías emergentes que se están llevando al sector #salud de la mano de osados #emprendedores e innovadoras startups.\n¿Qué futuro nos espera para este 2016?\n#innovación #eSalud #VidSigner","images":["https://archive.org/download/validatedid-facebook-media/1103538303004394.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1450180861"},{"anchor":"fb-1450206300","date":"15/12/2015","year":"2015","lang":"ES","type":"photo","text":"OLVÍDATE DE LOS PAPELES EN TU CLÍNICA\n¡Tenemos lo que necesitas! #ViDSigner  es la solución de #firmaelectrónica manuscrita que se integra con tu software de gestión clínica.\nwww.validatedid.com/vidclinicas\nNuestro servicio:\n- Seguridad Jurídica.\n- Fácil de usar.\n- Económico.\n- Fácil integración...trabajamos con los mejores\n#innovación #firmabiométrica #ViDSigner","images":["https://archive.org/download/validatedid-facebook-media/1103634822994742.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1450206300"},{"anchor":"fb-1450094401","date":"14/12/2015","year":"2015","lang":"ES","type":"photo","text":"Eyesynth, unas impresionantes gafas 3D para invidentes\nhttp://wwwhatsnew.com/2015/12/11/eyesynth-unas-impresionantes-gafas-3d-para-invidentes/?utm_source=dlvr.it&utm_medium=twitter\n Eyesynth es un proyecto basado en unas gafas capaces de reconocer lo que hay a nuestro alrededor y transformarlo en audio, siendo así ideal para quien tiene problemas visuales.\n#innovación #eSalud #tecnología #ViDSigner","images":["https://archive.org/download/validatedid-facebook-media/1103075483050676.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1450094401"},{"anchor":"fb-1450120395","date":"14/12/2015","year":"2015","lang":"ES","type":"photo","text":"ViDSigner es un servicio de #firmaelectrónica manuscrita con las máximas garantias de seguridad.\n¿Pero cómo funciona?\n1- Desde el sistema de gestión sanitaria se generan los documentos a firmar.\n2- El paciente y/o el facultativo firman desde el puesto del mostrador o en el dispositivo móvil.\n3- ViDSigner recoge todas las evidencias y certifica el documento.\nMás información en www.validatedid.com/vidclinicas\n#innovación #seguridad #firmabiométrica #eSalud","images":["https://archive.org/download/validatedid-facebook-media/1103254823032742.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1450120395"},{"anchor":"fb-1450033068","date":"13/12/2015","year":"2015","lang":"ES","type":"multiPhoto","text":"¿TODOS LOS SISTEMAS DE FIRMA DIGITALIZADA O BIOMÉTRICA SON IGUALES?\nNo todo vale en la #firmadigitalizada.\nAunque aparentemente todos los sistemas de firma digitalizada son similares y cumplen objetivos parecidos, existen bastantes elementos que los diferencian, por lo que nos gustaría clarificar algunos conceptos y analizar los elementos que pueden influir de forma más significativa en la calidad del sistema.\nhttp://www.validatedid.com/es/no-todo-vale-en-la-firma-digitalizada/\n#innovación #eSalud #firmabiométrica #ViDSigner","images":["https://archive.org/download/validatedid-facebook-media/1102808999743991.png","https://archive.org/download/validatedid-facebook-media/1102809006410657.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1450033068"},{"anchor":"fb-1450008060","date":"13/12/2015","year":"2015","lang":"ES","type":"photo","text":"Unos ingenieros han diseñado la que podría ser la tirita del futuro.\nhttp://noticiasdelaciencia.com/not/17359/electronica-estirable-en-forma-de-tiritas/\nCuriosidades de la #tecnología y la #salud.\nElectrónica estirable en forma de tiritas: un material pegajoso y elástico que puede incorporar sensores de temperatura, luces LED y otros sistemas electrónicos, así como diminutos depósitos y canales para suministrar fármacos con la cadencia adecuada.\n#innovación #eSalud #ViDSigner","images":["https://archive.org/download/validatedid-facebook-media/1102652663092958.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1450008060"},{"anchor":"fb-1449920749","date":"12/12/2015","year":"2015","lang":"ES","type":"multiPhoto","text":"Cerebros y corazones hechos con una impresora 3D\nLa nueva era de la impresión 3D, imprimir partes blandas del organismo ya es posible.\n\nhttp://www.muyinteresante.es/innovacion/articulo/cerebros-y-corazones-hechos-con-una-impresora-3d-241445953800\nLos científicos han impreso replicas de órganos reales basadas en imágenes de resonancia magnética.\n#innovación #eSalud #3D #tecnología","images":["https://archive.org/download/validatedid-facebook-media/1102224906469067.jpg","https://archive.org/download/validatedid-facebook-media/1102225066469051.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1449920749"},{"anchor":"fb-1449947697","date":"12/12/2015","year":"2015","lang":"ES","type":"photo","text":"Seguimos con nuestra promoción hasta el 31 Diciembre.\nOlvídate de los papeles!\n Alta gratis y primer mes de prueba gratis #firmaelectrónica www.validatedid.com/vidclinicas\n#innovación #seguridad #eSalud","images":["https://archive.org/download/validatedid-facebook-media/1102386076452950.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1449947697"},{"anchor":"fb-1449835260","date":"11/12/2015","year":"2015","lang":"ES","type":"photo","text":"\"El hospital simulado donde casi todo es real\"\nhttp://www.consalud.es/saludigital/seedigital.php?id=74&revista=5\nEl 4DHealth de Igualada es el primer hospital de Europa donde se simulan todos los procedimientos y tecnologías propios de un hospital, pero no se atiende a pacientes reales.\nDe esta forma el complejo sanitario brinda la posibilidad a los estudiantes de establecer situaciones específicas, como las que posteriormente se encontrarán en su profesión, repetirlas las veces que quieran y no causar daños a los pacientes.\n#innovación #esalud #tecnología #ViDSigner","images":["https://archive.org/download/validatedid-facebook-media/1101743776517180.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1449835260"},{"anchor":"fb-1449860401","date":"11/12/2015","year":"2015","lang":"ES","type":"photo","text":"¡Tenemos lo que necesitas!\nhttp://www.validatedid.com/vidclinicas/\nViDSigner es la solución de #firmaelectrónica manuscrita que se integra con tu software de gestión clínica y que te permitirá gestionar de una forma mucho más eficiente los documentos relevantes que requieren la firma de pacientes y facultativos, como los formularios de alta o los consentimientos informados.\n#innovación #firmabiométrica #eSalud #clinicasinpapeles","images":["https://archive.org/download/validatedid-facebook-media/1101908969833994.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1449860401"},{"anchor":"fb-1449774002","date":"10/12/2015","year":"2015","lang":"ES","type":"photo","text":"Apple Watch y Android Wear, ¿qué smartwatch cuida mejor de tu #salud?\nhttp://www.consalud.es/saludigital/seedigital.php?id=64&revista=4\nLa funcionalidades para la salud \"ya se han convertido en el paquete mínimo para cualquier #wearable, porque tienen un gran potencial\"\nxDrip para monitorizar niveles de glucosa en sangre, HealthTap control médico y prescripción, entre otras aplicaciones, nos ayudan a controlar nuestra salud...","images":["https://archive.org/download/validatedid-facebook-media/1101279169896974.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1449774002"},{"anchor":"fb-1449748981","date":"10/12/2015","year":"2015","lang":"ES","type":"photo","text":"En ValidatedID nos preocupa la #seguridad en el entorno de la #salud.\nPor eso ponemos a su disposición VidSigner,\nusabilidad y seguridad jurídica para un servicio de #firmaelectrónica en Clínica, Centro Médico y Hospital \nhttp://www.validatedid.com/vidclinicas/","images":["https://archive.org/download/validatedid-facebook-media/1101281466563411.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1449748981"},{"anchor":"fb-1449662460","date":"09/12/2015","year":"2015","lang":"ES","type":"photo","text":"Si Google se quiere meter en el negocio...otra vez la Salud unida al #BigData.\nEl conglomerado Alphabet crea Verily, una nueva compañía que investigará las últimas tecnologías en el mercado de las ciencias de la #salud.\nVerily deja algo muy claro: que su finalidad no consiste en solo estudiar las enfermedades, sino también en investigar la salud.\nhttp://tecnologia.elpais.com/tecnologia/2015/12/08/actualidad/1449561246_071428.html \n#innovación #tecnología #eSalud","images":["https://archive.org/download/validatedid-facebook-media/1100732696618288.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1449662460"},{"anchor":"fb-1449687780","date":"09/12/2015","year":"2015","lang":"ES","type":"photo","text":"Un robot que reduce a cero los errores en las dosis de 'quimio'\nhttp://www.elmundo.es/salud/2015/12/08/5661c20c46163f7c258b45f8.html\nEl Hospital Clínico San Carlos de Madrid y el Instituto Catalán de Oncología (ICO) de Barcelona, han incluido en sus servicios de Farmacia un robot especializado en la preparación de tratamientos de quimioterapia.\nLos errores en la dosificación se reducen a cero y aumenta la #seguridad de los sanitarios implicados en el manejo de este tipo de fármacos.\n#innovación   #tecnología   #eSalud\n\nEn ValidatedID nos preocupa y ocupa la seguridad en el entorno salud...\npor eso ponemos a su disposición VidSigner,\nusabilidad y seguridad jurídica para un servicio de #firmaelectrónica en Clínica, Centro Médico y Hospital \nhttp://www.validatedid.com/vidclinicas/","images":["https://archive.org/download/validatedid-facebook-media/1100733773284847.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1449687780"},{"anchor":"fb-1449576213","date":"08/12/2015","year":"2015","lang":"ES","type":"photo","text":"Recuerda, tenemos en marcha la campaña #clínicasinpapeles\nHasta el 31 de Diciembre ALTA GRATIS y primer MES DE PRUEBA GRATIS\nPrueba la #firmabiométrica ViDSigner, más información en\nhttp://www.validatedid.com/vidclinicas/\n#Firmaelectrónica #Clínicamédica #eSalud #eHealth","images":["https://archive.org/download/validatedid-facebook-media/1100345189990372.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1449576213"},{"anchor":"fb-1449602137","date":"08/12/2015","year":"2015","lang":"ES","type":"photo","text":"Cada día nos encontramos con nuevas #aplicaciones móviles para cuidar y controlar nuestra #salud. \nUn monitor portátil permite controlar el marcapasos desde el móvil. #mHealth\nhttp://www.consalud.es/saludigital/seedigital.php?id=68&revista=4","images":["https://archive.org/download/validatedid-facebook-media/1100493596642198.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1449602137"},{"anchor":"fb-1449489720","date":"07/12/2015","year":"2015","lang":"ES","type":"photo","text":"Después del estudio publicado sobre #BigData seguimos aportando datos sobre el tema. \nhttp://laesalud.com/consulta-medica-big-data/\nSegún los expertos, la #consultamédica estará basada en el BigData, y la no consulta de grandes cantidades de datos para diagnosticar  y tratar a un #paciente se considerará mala práxis.\n¿Estáis de acuerdo con estas afirmaciones? ¿Utilizáis algún programa de tratamiento de datos?","images":["https://archive.org/download/validatedid-facebook-media/1099881190036772.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1449489720"},{"anchor":"fb-1449515061","date":"07/12/2015","year":"2015","lang":"ES","type":"photo","text":"Los #wearables intracorporables pueden ser la clave del futuro de la medicina.\nhttp://hipertextual.com/2015/12/wearables-sensores-intracorporales\nExisten muchos retos por delante antes de llevar al interior del cuerpo de forma masiva, pero las ventajas que proporcionará serán incalculables para la #medicina, y más allá de ella, para la #tecnología.","images":["https://archive.org/download/validatedid-facebook-media/1100070003351224.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1449515061"},{"anchor":"fb-1449424339","date":"06/12/2015","year":"2015","lang":"ES","type":"photo","text":"TECH TATS, TATUAJES ELECTRÓNICOS CON FINES MÉDICOS Y DEPORTIVOS http://bit.ly/1N50rRL\n#esalud  #ehealth\nNo es una moda...\nTal y como explican sus creadores, una vez que el tatuaje electrónico se ha transferido a la piel proporciona información médica de su portador en tiempo real que puede ser usada, tanto para la prevención de enfermedades como para el control de las constantes vitales durante la práctica de deporte.","images":["https://archive.org/download/validatedid-facebook-media/1099566033401621.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1449424339"},{"anchor":"fb-1449146727","date":"03/12/2015","year":"2015","lang":"ES","type":"photo","text":"Scripps, Aetna y J & J tra const CONTENT_TYPES = {"article": "📰 Artículo", "media": "📷 Imagen", "multiImage": "🖼️ Galería", "none": "📝 Texto", "reference": "🔗 Referencia", "carousel": "🎠 Carrusel", "poll": "📊 Encuesta", "image": "📷 Imagen", "sidecar": "🖼️ Galería", "video": "🎬 Vídeo", "photo": "📷 Foto", "multiPhoto": "🖼️ Álbum"};
const PAGE_SIZE = 50;

let filtered = [...POSTS];
let currentPage = 0;
let lbImages = [];
let lbVideoUrl = null;
let lbIdx = 0;

// ── FILTRES ───────────────────────────────────────────────────────────────────
function applyFilters() {
  const years  = new Set([...document.querySelectorAll('.filter-cb[data-type=year]:checked')].map(c => c.value));
  const media  = new Set([...document.querySelectorAll('.filter-cb[data-type=media]:checked')].map(c => c.value));
  const langs  = new Set([...document.querySelectorAll('.filter-cb[data-type=lang]:checked')].map(c => c.value));
  filtered = POSTS.filter(p => {
    if (years.size > 0 && !years.has(p.year)) return false;
    if (media.has('images') && p.images.length === 0) return false;
    if (media.has('video')  && !p.video)              return false;
    if (langs.size > 0 && !langs.has(p.lang))         return false;
    return true;
  });
  currentPage = 0;
  renderPage();
}

function clearFilters() {
  document.querySelectorAll('.filter-cb').forEach(c => c.checked = false);
  applyFilters();
}

document.querySelectorAll('.filter-cb').forEach(cb => cb.addEventListener('change', applyFilters));

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderPage() {
  const start = currentPage * PAGE_SIZE;
  const pagePosts = filtered.slice(start, start + PAGE_SIZE);
  const container = document.getElementById('posts-container');

  container.innerHTML = pagePosts.map(p => postHTML(p)).join('');

  // Lazy load images
  container.querySelectorAll('img[data-src]').forEach(img => {
    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          img.src = img.dataset.src;
          img.onload = () => img.classList.remove('loading');
          observer.disconnect();
        }
      });
    });
    observer.observe(img);
  });

  document.getElementById('count').textContent = filtered.length;
  document.getElementById('page-display').textContent = currentPage + 1;
  renderPagination();
}

function postHTML(p) {
  const typeLabel = CONTENT_TYPES[p.type] || p.type;
  const textHTML = p.text
    ? `<div class="post-text">${escHTML(p.text)}</div>`
    : `<div class="post-text no-text">(sin texto)</div>`;
  const urlHTML = '';

  // Imatges (columna dreta): mostrem totes apilades
  let mediaColHTML = '';
  if (p.images.length > 0) {
    mediaColHTML += p.images.map((url, i) => `
      <div class="post-img-wrap" onclick="openImgLightbox('${escAttr(p.anchor)}', ${i})">
        <img data-src="${url}" src="" alt="" class="loading">
        ${i === 0 && p.images.length > 1 ? `<span class="img-count-badge">1/${p.images.length}</span>` : ''}
      </div>`).join('');
  }

  // Vídeo (miniatura clicable → lightbox amb iframe)
  if (p.video) {
    mediaColHTML += `
      <div class="post-video-wrap" onclick="openVideoLightbox('${escAttr(p.anchor)}')" title="Reproducir vídeo">
        <img data-src="${p.video.thumbnail_url}" src="" alt="${escAttr(p.video.title)}" class="loading">
        <div class="video-play-btn"></div>
      </div>`;
  }

  const mediaCol = mediaColHTML
    ? `<div class="post-media-col">${mediaColHTML}</div>`
    : '';

  return `<div class="post-card" id="${escAttr(p.anchor)}">
    <div class="post-header">
      <span class="badge badge-year">${p.year}</span>
      <span class="badge badge-type">${typeLabel}</span>
      <span class="post-date">${p.date}</span>
    </div>
    <div class="post-body">
      <div class="post-text-col">${textHTML}${urlHTML}</div>
      ${mediaCol}
    </div>
  </div>`;
}

function escHTML(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(str) {
  return str.replace(/"/g,'&quot;');
}

// ── PAGINACIÓ ─────────────────────────────────────────────────────────────────
function renderPagination() {
  const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
  const pag = document.getElementById('pagination');
  if (totalPages <= 1) { pag.innerHTML = ''; return; }

  let html = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===0?'disabled':''}>&#8249;</button>`;

  const range = pageRange(currentPage, totalPages);
  range.forEach(p => {
    if (p === '…') {
      html += `<span class="page-info">…</span>`;
    } else {
      html += `<button class="page-btn ${p===currentPage?'active':''}" onclick="goPage(${p})">${p+1}</button>`;
    }
  });

  html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages-1?'disabled':''}>&#8250;</button>`;
  pag.innerHTML = html;
}

function pageRange(cur, total) {
  if (total <= 7) return Array.from({length: total}, (_, i) => i);
  const pages = new Set([0, total-1, cur, cur-1, cur+1].filter(p => p >= 0 && p < total));
  const sorted = [...pages].sort((a,b) => a-b);
  const result = [];
  sorted.forEach((p, i) => {
    if (i > 0 && p - sorted[i-1] > 1) result.push('…');
    result.push(p);
  });
  return result;
}

function goPage(p) {
  const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
  if (p < 0 || p >= totalPages) return;
  currentPage = p;
  renderPage();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

// ── LIGHTBOX ──────────────────────────────────────────────────────────────────
function openLightbox(meta, contentHTML, showNav) {
  document.getElementById('lb-content').innerHTML  = contentHTML;
  document.getElementById('lb-date').textContent    = meta.date;
  document.getElementById('lb-caption').textContent = meta.text || '';
  document.getElementById('lb-prev').style.display  = showNav ? '' : 'none';
  document.getElementById('lb-next').style.display  = showNav ? '' : 'none';
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function openImgLightbox(anchor, imgIdx) {
  const post = POSTS.find(p => p.anchor === anchor);
  if (!post) return;
  lbImages   = post.images;
  lbVideoUrl = null;
  lbIdx      = imgIdx;
  showLbImage(post);
}

function showLbImage(post) {
  if (!post) {
    // Recupera el post actual pel lbImages actiu
    post = POSTS.find(p => p.images === lbImages);
  }
  openLightbox(
    post,
    `<img src="${lbImages[lbIdx]}" alt="" style="max-width:90vw;max-height:75vh;object-fit:contain;border-radius:4px;">`,
    lbImages.length > 1
  );
}

function openVideoLightbox(anchor) {
  const post = POSTS.find(p => p.anchor === anchor);
  if (!post || !post.video) return;
  lbImages   = [];
  lbVideoUrl = post.video.embed_url;
  openLightbox(
    post,
    `<div class="lb-video-wrap"><iframe src="${post.video.embed_url}" allowfullscreen></iframe></div>`,
    false
  );
}

function closeLightbox() {
  // Atura el vídeo eliminant l'iframe
  const wrap = document.querySelector('.lb-video-wrap');
  if (wrap) wrap.innerHTML = '';
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

function navLightbox(dir) {
  if (lbImages.length === 0) return;
  lbIdx = (lbIdx + dir + lbImages.length) % lbImages.length;
  const post = POSTS.find(p => p.images === lbImages);
  showLbImage(post);
}

document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === document.getElementById('lightbox')) closeLightbox();
});

document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowRight') navLightbox(1);
  if (e.key === 'ArrowLeft') navLightbox(-1);
});

// ── HASH NAVIGATION ───────────────────────────────────────────────────────────
function navigateToHash() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  const idx = POSTS.findIndex(p => p.anchor === hash);
  if (idx === -1) return;
  currentPage = Math.floor(idx / PAGE_SIZE);
  renderPage();
  setTimeout(() => {
    const el = document.getElementById(hash);
    if (el) {
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      el.classList.add('highlighted');
      setTimeout(() => el.classList.remove('highlighted'), 3000);
    }
  }, 150);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
renderPage();
navigateToHash();
</script>
</body>
</html>
