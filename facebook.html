ear":"2021","lang":"PT","type":"photo","text":"100% online e com total segurança, a solução #VIDsigner de assinatura digital já está disponível para agentes, clientes e parceiros de PRÉVOIR Portugal - Vie Groupe Prévoir, a divisão portuguesa da seguradora francesa. Com a nova solução, a empresa, agentes e parceiros beneficiam de processos mais simples e mais ágeis, em linha com o que o mercado actual procura. Ler mais : https://bit.ly/3j0AI3r\n\nOutra história de sucesso realizada com a nosso partner Entelgy Consulting\n#VIDpartner #assinaturasdigitais #Portugal #Insurance","images":["https://archive.org/download/validatedid-facebook-media/4450211555003702.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1627630613"},{"anchor":"fb-1626860188","date":"21/07/2021","year":"2021","lang":"DE","type":"photo","text":"Toshiba Tec Netherlands maakt het digitaal en wettelijk ondertekenen van zakelijke documenten super eenvoudig en veilig, dankzij hun samenwerking met Validated ID. Zakelijke documenten die een handtekening vereisen, worden niet meer uitgeprint om een natte handtekening te zetten. Zo simpel kan het zijn! https://bit.ly/3eYFEon","images":["https://archive.org/download/validatedid-facebook-media/4423843527640505.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1626860188"},{"anchor":"fb-1626432713","date":"16/07/2021","year":"2021","lang":"ES","type":"photo","text":"Inscríbete en el webinar organizado por nuestro partner y descubre la firma de documentos #VIDsigner integrada con Becca Software, una herramienta que te permite gestionar y automatizar todo el proceso de venta de un profesional hacia sus clientes, desde el inicio de la colaboración, creación de presupuestos hasta la pasarela de pago.\n\nRegístrate aquí: https://bit.ly/3erHY6R","images":["https://archive.org/download/validatedid-facebook-media/4409758912382300.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1626432713"},{"anchor":"fb-1626252107","date":"14/07/2021","year":"2021","lang":"ES","type":"photo","text":"#CasosDeÉxito #HospitalMesaDelCastillo cc NUNSYS\n\nLa firma electrónica #VIDsigner es una herramienta clave para la mejora de los procesos documentales físicos, tanto en el ámbito administrativo como sanitario del Hospital Mesa del Castillo. Gracias a su uso, el hospital no solo redució el impacto medioambiental y los costes, sino también eliminó el riesgo de contagio del papel como elemento transmisor, ayudó al cumplimiento del marco legal (reglamento de protección de datos, …) y optimizó la operativa interna y externa. \n\nDescubre más ventajas del uso de la #firmaelectrónica en el #sectorsanitario y descárgate nuestro nuevo caso de éxito:\n\nhttps://bit.ly/3hL0vMa","images":["https://archive.org/download/validatedid-facebook-media/4403696446321880.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1626252107"},{"anchor":"fb-1626105942","date":"12/07/2021","year":"2021","lang":"EN","type":"photo","text":"#SuccessStory #VIDpartner cc Infinity Doc\n\nSwitch to a full digital experience for boosting agreements remotely with legal security by using the #send2sign solution for sending and tracking, integrated with Validated ID’s wide range of signatures.\n\nThis solution allows James & Uzzell - Chartered Certified Accountants customers to sign securely and quickly by their own means through their cell phone, or from their offices with an approved tablet.\n\nDownload our new success story from the financial sector here: https://bit.ly/3g2XGGF\n\n#Finances #DigitalSignature #VIDsigner","images":["https://archive.org/download/validatedid-facebook-media/4398880556803469.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1626105942"},{"anchor":"fb-1625658573","date":"07/07/2021","year":"2021","lang":"ES","type":"photo","text":"La integración realizada por nuestro partner #INERZA de las firmas electrónicas #VIDsigner con el Sistema de Información Hospitalaria (HIS) utilizado por Hospitales Universitarios San Roque, les permitió la firma de documentos de manera mucho más rápida y ágil respecto a los procesos que antes realizaban en papel. \n\n📲 Descarga nuestro nuevo caso de éxito en el sector sanitario: ➡️ https://bit.ly/3hL0vMa ⬅️\n\n#firmadigital #firmaelectrónica #VIDpartner #casodeéxito #sanidad #saluddigital #salud #HIS","images":["https://archive.org/download/validatedid-facebook-media/4384085844949607.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1625658573"},{"anchor":"fb-1625477075","date":"05/07/2021","year":"2021","lang":"ES","type":"photo","text":"Despapeliza, nuestro partner en #Chile, especializado en firma electrónica, detalla los 5️⃣ trámites más comunes que se pueden hacer de manera digital gracias a la validez legal que la tecnología le otorga a la #firmaelectrónica. \n\nLee el artículo completo 👉 https://bit.ly/3AwJRIL","images":["https://archive.org/download/validatedid-facebook-media/4378297808861744.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1625477075"},{"anchor":"fb-1625219511","date":"02/07/2021","year":"2021","lang":"ES","type":"photo","text":"#webinar #VIDpartner #BECCASoftware\n\nAhora ya puedes firmar tus contratos internacionales, nóminas y cualquier otro documento sin necesidad de desplazarte y sin usar más de dos plataformas. Con Becca Software podrás realizar todos los trámites de documentación fácilmente, gracias a la implantación de las firmas electrónicas #VIDsigner en su sistema.\n\nNuestro partner hablará de todo ello, en un seminario, el 6 de julio de 2021 a las 12:00 horas. ¿Te apuntas?\n\n👉Inscríbete y descubre todas sus funciones: https://bit.ly/365dsLD","images":["https://archive.org/download/validatedid-facebook-media/4370077929683732.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1625219511"},{"anchor":"fb-1625150148","date":"01/07/2021","year":"2021","lang":"ES","type":"photo","text":"#VIDpartner #Ecuador\n\nConoce nuestro nuevo partner Twiins HRM de Ecuador y la integración de las firmas electrónicas VIDsigner dentro de su herramienta enfocada a la comunicación y gestión del talento humano.  Más info: https://bit.ly/2UeMazM\n\n#FirmaElectrónica #FirmaDigital #TransformaciónDigital #VIDsigner #RRHH #recursoshumanos","images":["https://archive.org/download/validatedid-facebook-media/4367834883241370.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1625150148"},{"anchor":"fb-1624447806","date":"23/06/2021","year":"2021","lang":"FR","type":"none","text":"Avec la signature électronique #VIDsigner intégrée à la GED de DocuWare, vos documents sont centralisés, sécurisés et les processus de validation accélérés. \n\nInscrivez-vous au Webinar - 1er juillet à 10h - La signature électronique dans les métiers de la Vente, des Achats et des RH 👉 👉 https://bit.ly/3gM43Pc  \n\nConférence animée par : Florent Rogeon, Responsable commercial DocuWare France et Olivier Rajzman, Directeur commercial France & Benelux chez Docuware.\n\nLa démonstration portera notamment sur les processus métier suivants :\n\n➡️ Achats : signature électronique d’un contrat fournisseur \n➡️ Ventes : signature d’un B/L sur tablette par le client\n➡️ RH : signature d’un contrat de travail à distance par le salarié","images":[],"video":null,"url":null,"pageRef":"facebook.html#fb-1624447806"},{"anchor":"fb-1624374468","date":"22/06/2021","year":"2021","lang":"ES","type":"photo","text":"Únete a la transformación digital y descubre los principales aspectos legales de la firma electrónica en #México en nuestro próximo webinar gratuito organizado junto a nuestro partner #ThinkSmart  Compartiremos los diferentes fundamentos de la #firmaelectrónica y la legalidad de las firmas electrónicas de #VIDsigner en casos de uso como los de #RecursosHumanos y #teletrabajo. \n\nRegístrate aquí: https://bit.ly/3xBhSW6","images":["https://archive.org/download/validatedid-facebook-media/4342660605758798.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1624374468"},{"anchor":"fb-1624362474","date":"22/06/2021","year":"2021","lang":"ES","type":"photo","text":"¡Últimos días! Regístrate al webinar que realizaremos el próximo jueves 24 de Junio a las 10h de la mano de nuestro partner #SOINCON sobre Gestión de personas para organizaciones 4.0\n\nAbordaremos cuestiones como los fichajes, control de la jornada laboral, solicitudes, formaciones, cualificaciones, o el portal del empleado, y cómo resolverlas desde su suite EMI 4.0, el módulo Digital People y su integración con las firmas electrónicas de #VIDsigner cc Miguel Sierra Sánchez y Xabier Martínez\n\nEnlace para la inscripción: https://bit.ly/3vQoWge","images":["https://archive.org/download/validatedid-facebook-media/4342203462471179.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1624362474"},{"anchor":"fb-1624266634","date":"21/06/2021","year":"2021","lang":"FR","type":"photo","text":"Lancez-vous dans la digitalisation de vos processus en 2021 !\nInscrivez-vous vite pour découvrir les solutions cloud clés en main DocuWare. Découvrez au cours de ce webinaire les solutions cloud clés en main DocuWare, vous permettant de vous lancer en 3 jours seulement dans la digitalisation de vos processus courants, grâce à des workflows préconfigurés.\n\nInscrivez-Vous: https://bit.ly/3qdyCjK","images":["https://archive.org/download/validatedid-facebook-media/4339209252770600.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1624266634"},{"anchor":"fb-1623854707","date":"16/06/2021","year":"2021","lang":"ES","type":"photo","text":"La nueva regulación establece que la firma electrónica tendrá la misma validez y efectos jurídicos que la manuscrita en #Colombia. Descubre los principales aspectos de la reglamentación jurídica que sustentan su uso en Colombia y las principales tipologías. \n\nEn este #webinargratuito también abordaremos el proceso de certificación ONAC y la legalidad de las firmas electrónicas de #VIDsigner en casos de uso como los #RecursosHumanos y el #teletrabajo.  \n\nRegistrate aquí: https://bit.ly/3gDm3Kf","images":["https://archive.org/download/validatedid-facebook-media/4326628550695337.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1623854707"},{"anchor":"fb-1623222614","date":"09/06/2021","year":"2021","lang":"ES","type":"video","text":"Descubre la firma de documentos #VIDsigner integrada con Becca Software, una herramienta que te permite gestionar y automatizar todo el proceso de venta de un profesional hacia sus clientes, desde el inicio de la colaboración, creación de presupuestos hasta la pasarela de pago.\n\nConsigue tu prueba gratuita: https://bit.ly/3v0w4q9","images":[],"video":{"embed_url":"https://archive.org/embed/validatedid-facebook-media/1011371963006804.mp4?ui-theme=dark","thumbnail_url":"https://archive.org/download/validatedid-facebook-media/1011371963006804.mp4.thumbs/1011371963006804.mp4_000001.jpg","title":"Descubre la firma de documentos #VIDsigner integrada con Becca Software, una herramienta que te permite gestionar y automatizar todo el proceso de venta de un profesional hacia sus clientes, desde el inicio de la colaboración, creación de presupuestos hasta la pasarela de pago.\n\nConsigue tu prueba gratuita: https://bit.ly/3v0w4q9"},"url":null,"pageRef":"facebook.html#fb-1623222614"},{"anchor":"fb-1623072936","date":"07/06/2021","year":"2021","lang":"EN","type":"photo","text":"If you are interested in driving forward digitalization in the healthcare system, the #DMEA2021 is the place to be this week. One Whole Week Committed to Digital Health - Completely Online. If you have any questions about the #KHZG-fundable patient portal, our partner m.Doc GmbH is available to answer them at any time via their exhibition and networking profile. \n\nhttps://mdoc.one/dmea","images":["https://archive.org/download/validatedid-facebook-media/4301656329859226.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1623072936"},{"anchor":"fb-1622809184","date":"04/06/2021","year":"2021","lang":"EN","type":"photo","text":"After four years working and promoting decentralised identities (SSI) in different international forums, two of which we have worked for the European Commission in the ESSIF project, yesterday was a great day for Validated ID: the European Union announces that this will be the identity model for European citizens. 🚀🚀\n\nThose are 4 Key takeaways from the Press Conference:\n\n➡️ 3 main improvement suggestions have been presented to build a successful European eID framework See details 👉 https://bit.ly/3x9Yq2L\n\n➡️ In practice, all Member States will ensure that their citizens have a so call Digital Wallet: a digital safe for our identity data.\n\n➡️ It will be mandatory for very large online platforms as well as central providers of services like transport, electricity companies, or banks to accept it for identification purposes.\n\n➡️ It should be in production as soon as 1 year after the amendment proposal of eIDAS regulation is approved.\n\nFind out more: https://bit.ly/3uWuiGA\n\n#EUdigitalidentity #DigitalEU #VIDchain #VIDwallet #SSI #blockchain #ESSIF","images":["https://archive.org/download/validatedid-facebook-media/4293070097384516.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1622809184"},{"anchor":"fb-1622792843","date":"04/06/2021","year":"2021","lang":"ES","type":"photo","text":"La identidad auto soberana, o #SSI, es el último modelo de identidad digital que permite a cualquier persona u organización mantener un control completo de su identidad y una total independencia de los intermediarios.\n\nEn este capítulo de Healthio TV hablaremos con expertos muy relevantes del sector sobre cómo podría mejorar el empoderamiento del ciudadano en el sistema sanitario.\n👉  https://bit.ly/34A8HZP\n\ncc \n➡️ Jordi Serrano Pons, CO-FOUNDER, #Healthio \n➡️ Miguel Angel Calero Fernández, CO-FOUNDER, Wealize\n➡️ Montse Guardia Guell, General Manager, #AlastriaBlockchainEcosystem\n➡️ Quirze Salomó, Presidente, #CentreBlockchainCatalunya\n➡️ Santi Casas, CEO, Validated ID \n➡️ Raul Ortega, Responsable de la área tecnológica, #ACES  (Associacio Catalana d'Entitats de Salut)","images":["https://archive.org/download/validatedid-facebook-media/4292533530771506.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1622792843"},{"anchor":"fb-1622725415","date":"03/06/2021","year":"2021","lang":"ES","type":"photo","text":"¿Sabes cómo funciona la Identidad Auto Soberana SSI (Self Sovereign Identity)? Se trata de un sistema de gestión de identidad descentralizado basado en #blockchain.\nSi quieres saber más te lo explicamos en el evento Identification & Security 2021 organizado por #iKNSpain en 23 de Junio. \n\nConsigue tu entrada: https://bit.ly/3uQEhgm\n\n#firmadigital #ssi #selfsovereignidentity\n#blockchain #digitalidentity #decentralizedidentity #identidad #identity #identidaddigital","images":["https://archive.org/download/validatedid-facebook-media/4290252797666246.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1622725415"},{"anchor":"fb-1622452729","date":"31/05/2021","year":"2021","lang":"FR","type":"photo","text":"#LivreBlanc #VIDpartner #Progedoc\n\nTPE, petites PME : DEVENIR UNE ENTREPRISE DIGITALE EN 6 ÉTAPES. Télécharger le livre blanc de notre partenaire PROGEDOC pour passer à la dématérialisation avec une solution de gestion documentaire adaptée, facile, et sécurisé:\nhttps://bit.ly/3fwKedX Bonne lecture !  \n\n#signaturenumérique  #signatureélectronique #OxyGed #GED cc Franck DECKER","images":["https://archive.org/download/validatedid-facebook-media/4281228441902015.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1622452729"},{"anchor":"fb-1622195507","date":"28/05/2021","year":"2021","lang":"EN","type":"photo","text":"As people-focussed organizations, Housing Associations have been greatly impacted by the pandemic and need to ensure their documents are accessible remotely both for their staff and their tenants. Our partners #DocTech have been working with Mosscare St Vincent's Housing Group to help them electronically sending and receiving documentation using #VIDsigner Digital Signatures.\nAll signed documents are stored in DocuWare and their status updated.  \nTake a look at their case study to find out more: ➡️ ➡️ https://bit.ly/2SBDO48\n#documentmanagement #housingassociations #paperless #VIDpartner","images":["https://archive.org/download/validatedid-facebook-media/4272116296146563.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1622195507"},{"anchor":"fb-1622104191","date":"27/05/2021","year":"2021","lang":"ES","type":"photo","text":"Conceptos como la Auto-Identidad soberana o SSI self sovereign identity están cada vez más presentes en los debates sobre el futuro de la sanidad. La identidad auto soberana, o #SSI, es el último modelo de identidad digital que permite a cualquier persona u organización mantener un control completo de su identidad y una total independencia de los intermediarios.\n\nLa COVID -19 nos ha destapado necesidades que podrían ser cubiertas de forma satisfactoria por este nuevo modelo de identidad digital gobernada por cada uno de nosotros… En este capítulo de Healthio TV hablaremos con expertos muy relevantes del sector sobre cómo podría mejorar el empoderamiento del ciudadano en el sistema sanitario.\n\n👉 https://bit.ly/34A8HZP \n\ncc \n➡️ Jordi Serrano Pons, CO-FOUNDER, #Healthio \n➡️ Miguel Angel Calero Fernández, CO-FOUNDER, Wealize\n➡️ Montse Guardia Guell, General Manager, #AlastriaBlockchainEcosystem\n➡️ Quirze Salomó, Presidente, #CentreBlockchainCatalunya\n➡️ Santi Casas, CEO, Validated ID \n➡️ Raul Ortega, Responsable de la área tecnológica, #ACES  (Associacio Catalana d'Entitats de Salut)\n\nUna iniciativa de Healthi","images":["https://archive.org/download/validatedid-facebook-media/4268846429806883.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1622104191"},{"anchor":"fb-1622094710","date":"27/05/2021","year":"2021","lang":"FR","type":"photo","text":"#Webinar #VIDpartner Ricoh Luxembourg Ricoh Belgiumgium \n\nSigner des documents peut parfois être un vrai casse-tête : des processus d’approbation très longs, l’absence des signataires, des impressions à n’en plus finir… Tout ceci ralentit votre travail et affecte votre productivité.\n\nGrâce à la solution Validated ID, vous pouvez dès maintenant signer électroniquement tous vos documents avec toutes les exigences de sécurité actuelles.\n\nDécouvrez en plus pendant le webinaire consacré à 100% à la signature électronique de vos documents ! \n\n➡️ https://bit.ly/2S7Oqru ⬅️\n\n#signaturenumérique #signatureélectronique #DocuWare #GED","images":["https://archive.org/download/validatedid-facebook-media/4268547943170065.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1622094710"},{"anchor":"fb-1621518321","date":"20/05/2021","year":"2021","lang":"ES","type":"photo","text":"#VIDpartner Oreka IT\n\nDescubre las posibilidades que ofrecen las firmas electrónicas VIDsigner integradas con #SAP gracias a nuestro nuevo partner Oreka IT, consultores especialistas en implementar y mantener sistemas SAP. Si quieres saber más puedes leer aquí el artículo completo: https://bit.ly/3fBg0Fk \n\n#FirmaElectrónica #FirmaDigital #TransformaciónDigital #VIDpartner","images":["https://archive.org/download/validatedid-facebook-media/4245056158852577.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1621518321"},{"anchor":"fb-1621407587","date":"19/05/2021","year":"2021","lang":"FR","type":"photo","text":"#Webinar #VIDpartner Ricoh Luxembourg Ricoh Belgium \n\nSigner des documents peut parfois être un vrai casse-tête : des processus d’approbation très longs, l’absence des signataires, des impressions à n’en plus finir… Tout ceci ralentit votre travail et affecte votre productivité. \n\nGrâce à la solution Validated ID, vous pouvez dès maintenant signer électroniquement tous vos documents avec toutes les exigences de sécurité actuelles. \n\nDécouvrez en plus pendant le webinaire consacré à 100% à la signature électronique de vos documents ! \n\n➡️ https://bit.ly/2S7Oqru ⬅️\n\n#signaturenumérique #signatureélectronique #DocuWare #GED","images":["https://archive.org/download/validatedid-facebook-media/4241312489226944.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1621407587"},{"anchor":"fb-1621328986","date":"18/05/2021","year":"2021","lang":"DE","type":"photo","text":"Validated ID elektronische Signaturen garantieren die Echtheit von wichtigen Geschäftsdokumenten. Sie sind nicht nur rechtsverbindlich, sondern erfüllen auch hohe Sicherheitsanforderungen. Einer ihrer Hauptvorteile ist, dass sie viel schneller und einfacher zu erstellen sind und einer handschriftlichen Unterschrift in nichts nachstehen. \n\nSie möchten erfahren, wie Sie mit dem Dokumentenmanagement-System DocuWare erstellte Dokumente mit der elektronischen Signatur Validated ID signieren können? Dann registrieren Sie sich für dieses Webinar. ➡️ https://bit.ly/3oCbkU9 ⬅️\n\n📆 Dienstag, 25. Mai 2021\n⏰ 9:30 Uhr","images":["https://archive.org/download/validatedid-facebook-media/4238379372853589.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1621328986"},{"anchor":"fb-1620895515","date":"13/05/2021","year":"2021","lang":"ES","type":"photo","text":"#Webinar #VIDpartner Seidor\n\nLas firmas electrónicas #VIDsigner ayudan a las empresas a dar el salto de calidad en sus procesos de trabajo y adaptarse a diferentes entornos de trabajo. Regístrate en este webinar el próximo 26 de Mayo en el que explicaremos todos los secretos de la integración con SAP : SAP BusinessOne, SAP Business ByDesign, SAP S/4HANA, ECC y SuccessFactors. \n\nTambién, presentaremos la modalidad Try&Buy para que puedas valorar el servicio desde el primer minuto.\n\nNo esperes más, reserva tu plaza:  https://bit.ly/2QchUni","images":["https://archive.org/download/validatedid-facebook-media/4222784697746390.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1620895515"},{"anchor":"fb-1620814990","date":"12/05/2021","year":"2021","lan  😉\n\n#signaturenumérique #signatureélectronique #VIDpartner #OxyGed #GED","images":["https://archive.org/download/validatedid-facebook-media/4213322442025949.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1620630488"},{"anchor":"fb-1620385173","date":"07/05/2021","year":"2021","lang":"EN","type":"photo","text":"Validated ID is proud to become a part of the Velocity Network Foundation for boosting the #InternetofCareers and the way career credentials data is managed through innovation. \n\n#SelfSovereignIdentity #HRTech #HumanResources #FutureofWork","images":["https://archive.org/download/validatedid-facebook-media/4204278202930373.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1620385173"},{"anchor":"fb-1620313905","date":"06/05/2021","year":"2021","lang":"EN","type":"photo","text":"Day 2 of DocuWorld Partner Conference Americas 2021. We look forward to welcoming you again. To share ideas with our team Daniel Translateur (North America & South America) and Miguel Jijón meet us at the Networking Lounge or contact us for an easy free demo: https://bit.ly/3dVeqxy\n\nDía 2 de la Conferencia de Partners de DocuWorld Américas 2021. Para compartir ideas con nuestro equipo Daniel Translateur (América del Norte y América del Sur) y Miguel  Jijón, visita el Networking Lounge o contáctenos para una demostración gratuita: https://bit.ly/3dVeqxy\n\n#docuworld2021 #DocuWorldAmericas  #esignature #digitalsignature #VIDsigner #VIDpartner #DocuWare #DocumentManagement #Technology #Events","images":["https://archive.org/download/validatedid-facebook-media/4201715099853350.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1620313905"},{"anchor":"fb-1620294187","date":"06/05/2021","year":"2021","lang":"ES","type":"photo","text":"El contexto laboral surgido tras la pandemia ha dibujado un nuevo paradigma en las organizaciones, en el que adaptarse al entorno digital es más importante que nunca. Respondiendo a esta problemática, surge VIDsigner, de Validated ID, que se integra dentro de las soluciones #SuccessFactors, #BusinessOne, #ByDesign, #S4HANA y #ECC desde el mismo sistema SAP.\n\nVIDsigner cuenta, además, con una modalidad Try&Buy, para que puedas probar sus beneficios desde el primer minuto. \n\n¿Te vas a quedar atrás? ➡️ ➡️ https://bit.ly/3enBKFt  \n\ncc Seidor  #VIDsigner #firmaelectrónica #firmadigital #VIDpartner","images":["https://archive.org/download/validatedid-facebook-media/4201082599916600.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1620294187"},{"anchor":"fb-1619689433","date":"29/04/2021","year":"2021","lang":"EN","type":"photo","text":"#DocuWorldAmericas Partner Conference 2021 is coming up! Book your free demo on how to automate and gather signed agreements within the native solution #VIDsigner integrated with DocuWare workflows. The signature procedures with VIDsigner offer options for every signer with the highest security levels.\n\nRequest Your DocuWare Demo Today: https://bit.ly/3dVeqxy\n\n#DocuWorld2021Americas #esignature #digitalsignature #VIDpartner #DocuWare #DocumentManagement #Technology #Events","images":["https://archive.org/download/validatedid-facebook-media/4181212878570239.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1619689433"},{"anchor":"fb-1618996755","date":"21/04/2021","year":"2021","lang":"EN","type":"photo","text":"Day 2 of DocuWorld Partner Conference Europe 2021 starts today. We look forward to welcoming you again. \nTo share ideas with our team Daniel Translateur (EMEA & APAC) Martí Adroher (EMEA & DACH) Carlos Romero (DACH) and Cedric Guillou (FR) meet us at the Networking Lounge or contact us for an easy free demo: https://bit.ly/3dVeqxy\n\n#docuworld2021 #esignature  #digitalsignature #VIDsigner #VIDpartner #DocuWare #DocumentManagement #Technology #Events","images":["https://archive.org/download/validatedid-facebook-media/4158140080877519.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1618996755"},{"anchor":"fb-1618912380","date":"20/04/2021","year":"2021","lang":"EN","type":"photo","text":"Discover the main advantages of #VIDsigner electronic signatures for the Real Estate sector: 🏘 🏡\n\n✅ Sign rental and purchase contracts in minutes\n✅ Save time and close sales on the spot\n✅ Improved customer satisfaction\n✅ Substantial reduction of face-to-face processes\n✅ Possibility of integration within a CRM\n\nWanna know more? Check out all the use cases and learn how to streamline the process in your #RealEstate agency: https://bit.ly/32w8NAA\n\n#electronicsignatures #DigitalSignature #esignature #housing","images":["https://archive.org/download/validatedid-facebook-media/4155300664494794.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1618912380"},{"anchor":"fb-1618840533","date":"19/04/2021","year":"2021","lang":"EN","type":"photo","text":"Only 1 week left for #DocuwarePartnerConference Europe 2021! Book your free demo on how to automate and gather signed agreements within the native solution VIDsigner integrated with DocuWare workflows. The signature procedures with VIDsigner offer options for every signer with the highest security levels.\n\nRequest Your DocuWare Demo Today: https://bit.ly/3dVeqxy\n\n#DocuWorld2021Europe #esignature #digitalsignature #VIDsigner #VIDpartner #DocuWare #DocumentManagement #Technology #Events","images":["https://archive.org/download/validatedid-facebook-media/4153059354718925.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1618840533"},{"anchor":"fb-1618582500","date":"16/04/2021","year":"2021","lang":"EN","type":"multiPhoto","text":"What a great day today! Happy to have been sharing about #SelfSovereignIdentity at European Blockchain Convention with this panel:\n· Coty de Monteverde - Banco Santander España\n· Charles Walton - Mastercard\n· Daniël Du Seuil - #EBSI\n· Antoine Maisonneuve - Orange\n· Ivan Basart - Validated ID\n\n#blockchain #cybersecurity #technology #fintech #collaboration","images":["https://archive.org/download/validatedid-facebook-media/4144683875556473.jpg","https://archive.org/download/validatedid-facebook-media/4144683845556476.jpg","https://archive.org/download/validatedid-facebook-media/4144683848889809.jpg","https://archive.org/download/validatedid-facebook-media/4144684022223125.jpg","https://archive.org/download/validatedid-facebook-media/4144684012223126.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1618582500"},{"anchor":"fb-1618568257","date":"16/04/2021","year":"2021","lang":"ES","type":"photo","text":"Hospitales Universitarios San Roque es una red de centros líder en la sanidad privada de #Canarias que cuenta con más de 100 años de antigüedad.\n\nDesde sus orígenes han destacado por un compromiso con el crecimiento constante, los valores de su equipo humano y la incorporación de la última tecnología para ofrecer mejor servicio a sus pacientes, familiares y cuidadores.\n\nDescubre su caso de éxito presentado por Javier Arencibia (CIO) en la mesa redonda que organizamos junto a Alianza de la Sanidad Privada Española - ASPE, Bionexo, #Stacks , Caser Seguros : La innovación tecnológica al servicio de la sanidad privada. Casos de Éxito.\n\nModera Alfonso de La Lama-Noriega","images":["https://archive.org/download/validatedid-facebook-media/4144164015608459.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1618568257"},{"anchor":"fb-1618405604","date":"14/04/2021","year":"2021","lang":"ES","type":"photo","text":"¿Quieres mejorar tu nivel de servicio mediante la innovación con firma electrónica? En este webinar gratuito te enseñaremos dos cosas que debes saber antes de implementar este servicio en tu empresa:\n\n1️⃣ Los distintos tipos de firma electrónica que proporciona el servicio #VIDsigner de Validated ID con nuestro partner Think Smart #México \n\n2️⃣ Demostración práctica de cómo recoger la firma electrónica de un documento de manera segura, rápida y con validez jurídica. \n\nRegístrate ahora: https://bit.ly/3uNuU1p\n\n#firmaelectrónica #WebinarGratuito #webinar #VIDpartner","images":["https://archive.org/download/validatedid-facebook-media/4138692476155613.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1618405604"},{"anchor":"fb-1618225762","date":"12/04/2021","year":"2021","lang":"EN","type":"photo","text":"So great to renew our sponsorship for the 5th edition of the European Blockchain Convention (EBC) 🚀 Join us on 13th, April in the debate about 👉 Verifiable Credentials for COVID-19 Data Management, with our Product Manager Xavier Vila Pueyo, Marco Cuomo from PharmaLedger  Novartis , Heather Leigh Flannery form #ConsenSysHealth and Daniel Uribe, MBA 🧬🔗🔐 form GenoBank.io\n\nSave the date 📆 13.04.2012 and book your seat: ➡️ https://bit.ly/3941m7h ⬅️\n\n#blockchain #blockchaincongress #EuropeanBlockchainConvention #EBC #VIDchain #VIDsigner #VIDwallet #SSI","images":["https://archive.org/download/validatedid-facebook-media/4132746953416832.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1618225762"},{"anchor":"fb-1617787432","date":"07/04/2021","year":"2021","lang":"ES","type":"photo","text":"Muchas de las empresas que han digitalizado ya sus procesos con firma electrónica conocen las ventajas: la simplificación de los procedimientos, más seguridad jurídica, menos costes y tiempo... \n\nAhora además, estos beneficios se trasladan ya a nuestros clientes en #Quodem. \n\nEn este webinar, compartiremos los principales usos de la firma electrónica para #Pharma: procesos SOP, COA’s, protocolos y reports de validación, NC’s, CAPAS, firma electrónica de las guías de producción, documentos asociados a procesos de calidad, así como Recursos Humanos (contrataciones, faltas graves, despidos, entre otros).\n\nRegístrate aquí: https://bit.ly/3rY4Uyo\n\n#webinargratuito #webinar #firmaelectrónica #firmadigital #VIDsigner #VIDpartner #RRHH #recursoshumanos","images":["https://archive.org/download/validatedid-facebook-media/4117626188262242.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1617787432"},{"anchor":"fb-1617272373","date":"01/04/2021","year":"2021","lang":"EN","type":"photo","text":"In the digital world, having a secure and simple way to have trusted identities is more important than ever. That’s why we created ID wallet, VIDwallet enables people and enterprises to utilize the newest innovations in decentralized technology to make data more portable, private, and valuable. #VIDwallet also solves the problem of having multiple accounts and improves the privacy of most of your daily actions.\n\nTry the #demo guide and get familiar with it: https://bit.ly/3dt0w5g  \n\n#digitalidentity #credentials #identity #blockchain #digitalcredentials #VIDchain #blockchain","images":["https://archive.org/download/validatedid-facebook-media/4100451509979710.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1617272373"},{"anchor":"fb-1617091449","date":"30/03/2021","year":"2021","lang":"EN","type":"photo","text":"👩‍💻🖥️‍ We've joined forces with BBVA Labs Spain to transform banking processes and develop an innovative SSI model to secure your customers' digital credentials. We are thrilled to work in coordinated innovation with one of the world's leading banks in security and sustainability.  👑\n\n#VIDchain #VIDwallet #KYC","images":["https://archive.org/download/validatedid-facebook-media/4094759860548875.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1617091449"},{"anchor":"fb-1616582914","date":"24/03/2021","year":"2021","lang":"ES","type":"photo","text":"La importancia de contar con herramientas que ofrecen el proceso de firmas de forma segura, válida y efectiva es cada vez mayor e impacta positivamente en la productividad empresarial. \n\nInscríbete en nuestro webinar que impartimos mañana junto con nuestro partner Rootstack - Web / Mobile Applications y descubre todos beneficios de las firmas electrónicas #VIDsigner.\n\nRegístrate: https://bit.ly/3cZKEap \n\n#webinar #webinargratuito #Firmaelectrónica #firmadigital #VIDpartner","images":["https://archive.org/download/validatedid-facebook-media/4074949339196594.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1616582914"},{"anchor":"fb-1616418230","date":"22/03/2021","year":"2021","lang":"ES","type":"photo","text":"El próximo 24 y 25 de marzo estaremos presentes junto a nuestro partner Artaiz Asesoría Tecnológica en #OTDChallenge2021, organizado por Colegio Oficial de Ingenieros Industriales de Navarra y #FundaciónIndustrialDeNavarra, hablando sobre AHORRO DE TIEMPO EN TRÁMITES LABORALES MEDIANTE FIRMA REMOTA. Un evento en el que estaremos acompañados de grandes referentes tecnológicos de nuestra comunidad.\n\nInscríbete en: https://bit.ly/3vLZTwb\n\n#VIDsigner #firmadigital #firmaelectrónica #VIDpartner #Navarra #TransformaciónDigital","images":["https://archive.org/download/validatedid-facebook-media/4069724913052370.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1616418230"},{"anchor":"fb-1616407264","date":"22/03/2021","year":"2021","lang":"EN","type":"photo","text":"We are very excited to be a part of the European Blockchain Convention another year 🚀 Come join us in this meeting point for the Blockchain industry, we'll be talking about Verifiable Credentials for COVID-19 on the 13th, April, with Marco Cuomo, Applied Technology Innovation Manager PharmaLedger, Novartis , Xavier Vila Pueyo, Product Manager at #ValidatedID, Heather Leigh Flannery, #ConsenSysHealth, Daniel Uribe Founder GenoBank.io , and Clarisse Dias da Mota.\n\nBook your seat now: ➡️ https://bit.ly/3941m7h ⬅️\n\n#blockchain #blockchaincongress #EuropeanBlockchainConvention #EBC #VIDchain #VIDsigner #VIDwallet #SSI","images":["https://archive.org/download/validatedid-facebook-media/4069318926426302.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1616407264"},{"anchor":"fb-1616150140","date":"19/03/2021","year":"2021","lang":"ES","type":"photo","text":"Para todos los clientes de Freematica España, Fernando Montero - director de desarrollo de negocio - estará presentando este webinar sobre los beneficios de la firma electrónica para el trabajo en remoto, mediante la integración con su ERP #eSatellite. No te lo pierdas: https://bit.ly/3ltv4HH\n\n#webinar #firmaelectrónica #firmadigital #VIDpartner","images":["https://archive.org/download/validatedid-facebook-media/4061560063868855.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1616150140"},{"anchor":"fb-1615816394","date":"15/03/2021","year":"2021","lang":"EN","type":"video","text":"Get control of how you share your data! With #VIDchain we're offering secure identity solutions that allow a more digital and sustainable world guaranteeing privacy, rights, and freedoms to people. \n\nTo ensure that verifiable digital credentials respond to a universal model, we are working with national and international partners such as the European Commission, #COVIDCredentialsInitiative (CCI), and #GoodHealthPass to create an open ecosystem of decentralized identity that is accessible to all.\n\nDownload the application: \n\nGoogle Play: https://bit.ly/3uUovCC  \nApp Store: https://bit.ly/3kFBvqZ  \n\n#digitalidentity #credentials #identity #blockchain #digitalcredentials","images":[],"video":{"embed_url":"https://archive.org/embed/validatedid-facebook-media/764798310812871.mp4?ui-theme=dark","thumbnail_url":"https://archive.org/download/validatedid-facebook-media/764798310812871.mp4.thumbs/764798310812871.mp4_000001.jpg","title":"Get control of how you share your data! With #VIDchain we're offering secure identity solutions that allow a more digital and sustainable world guaranteeing privacy, rights, and freedoms to people. \n\nTo ensure that verifiable digital credentials respond to a universal model, we are working with national and international partners such as the European Commission, #COVIDCredentialsInitiative (CCI), and #GoodHealthPass to create an open ecosystem of decentralized identity that is accessible to all.\n\nDownload the application: \n\nGoogle Play: https://bit.ly/3uUovCC  \nApp Store: https://bit.ly/3kFBvqZ  \n\n#digitalidentity #credentials #identity #blockchain #digitalcredentials"},"url":null,"pageRef":"facebook.html#fb-1615816394"},{"anchor":"fb-1615540642","date":"12/03/2021","year":"2021","lang":"EN","type":"video","text":"🚀🚀 Today we’d like to share with you Validated ID's new ID wallet, #VIDwallet, a service designed to help you regain control of your digital identity and to exchange digital credentials securely and privately. With #VIDchain your identity is always protected and you can store and share your digital credentials with whomever you choose. Just that simple.\n\nDownload the application and get to know it for free:\n\n📲 Google Play: https://bit.ly/3uUovCC \n📲 App Store: https://bit.ly/3kFBvqZ   \n\n#digitalidentity #credentials  #identity #blockchain #digitalcredentials","images":[],"video":{"embed_url":"https://archive.org/embed/validatedid-facebook-media/3729299147150997.mp4?ui-theme=dark","thumbnail_url":"https://archive.org/download/validatedid-facebook-media/3729299147150997.mp4.thumbs/3729299147150997.mp4_000001.jpg","title":"🚀🚀 Today we’d like to share with you Validated ID's new ID wallet, #VIDwallet, a service designed to help you regain control of your digital identity and to exchange digital credentials securely and privately. With #VIDchain your identity is always protected and you can store and share your digital credentials with whomever you choose. Just that simple.\n\nDownload the application and get to know it for free:\n\n📲 Google Play: https://bit.ly/3uUovCC \n📲 App Store: https://bit.ly/3kFBvqZ   \n\n#digitalidentity #credentials  #identity #blockchain #digitalcredentials"},"url":null,"pageRef":"facebook.html#fb-1615540642"},{"anchor":"fb-1615379783","date":"10/03/2021","year":"2021","lang":"ES","type":"photo","text":"Descarga el informe sobre la validez jurídica de la firma electrónica en #Colombia realizado por el abogado Erick Rincon Cardenas del bufete internacional Rincón Cárdenas & Moreno , y conozca en profundidad las soluciones de firmas que ofrece Validated ID en cumplimiento con las normativas que regulan el uso de las firmas electrónicas en este país.\n\nDescarga gratis aquí: https://bit.ly/3cgJdUG\n\n#VIDsigner #firmaelectrónica #Ley527 #firmadigital","images":["https://archive.org/download/validatedid-facebook-media/4034592896565572.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1615379783"},{"anchor":"fb-1615294892","date":"09/03/2021","year":"2021","lang":"ES","type":"photo","text":"Últimos días para registrarse al WEBINAR GRATUITO sobre #FirmaElectrónica en #Argentina.\nEn este webinar organizado junto a nuestro partner #EXACorporateBusinessSolutions compartiremos contigo:\n\n➡️ Conceptos de Firma Digital y Electrónica.\n➡️ Tipos de firmas electrónicas.\n➡️ Demostración práctica de cómo recoger una firma electrónica con #VIDsigner.\n\n📆 Fecha: martes, 10 de Marzo de 2021\n⏰ Hora: 11:00 - 12:00 Time zone (GMT-3:00) Buenos Aires\n\nRegístrate aquí: https://bit.ly/3rrwlRQ\n\n#VIDsigner #webinar #webinargratuito #VIDpartner","images":["https://archive.org/download/validatedid-facebook-media/4032045253487003.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1615294892"},{"anchor":"fb-1614933883","date":"05/03/2021","year":"2021","lang":"EN","type":"photo","text":"Pressure on app developers to add digital signature technologies to their business solutions is greater now more than ever. Thanks to the integration between #VIDsigner electronic signatures and #DataFlex platform, developed by our partner Moose Software, it is now possible to start any process that requires a legally compliant signature without leaving the DataFlex platform. \n\nDon't miss it: https://bit.ly/2OkaDk3\n\n#VIDpartner #DataFlex #digitalsignature #electronicsignature #esignature","images":["https://archive.org/download/validatedid-facebook-media/4019772824714246.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1614933883"},{"anchor":"fb-1614669771","date":"02/03/2021","year":"2021","lang":"ES","type":"photo","text":"Descubre junto a nuestro partner #NexTReT los diferentes tipos de #firmaelectrónica que ofrece #VIDsigner integrada dentro de tus procesos y software habitual. \n\nHablaremos de cómo dar respuesta a una amplia gama de necesidades de empresas e industria y presentaremos una demostración práctica de cómo recoger la #firmadigital de un documento de manera segura, rápida y con seguridad jurídica.\n\n📆 3 de Marzo a las 10h\n➡️ Apúntate ya: https://bit.ly/3pbP4PA\n\n#webinargratuito #webinar #firmadigital #VIDpartner","images":["https://archive.org/download/validatedid-facebook-media/4013860111972184.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1614669771"},{"anchor":"fb-1614256092","date":"25/02/2021","year":"2021","lang":"EN","type":"photo","text":"We did it! Winners in the second edition of #Start4big 💥🏅 out of 192 projects to implement real solutions in digital identity and biometric identification 🚀🚀\n\nThanks to this initiative driven by Aigües de Barcelona, \nCaixaBank, Naturgy, SEAT, and Telefónica, we added a reach to a customer base of more than 3️⃣8️⃣0️⃣ million people worldwide.\n\nCongratulations to the other 5 winners in their categories: \nMobbeel, #Innovae, Solum Innovation pv  and \nClimateTrade and #UAPUrbanAirPurifier 🎉🎉\n\nMore info: https://bit.ly/3pUQTR0\n\n#start4big #startups #VIDsigner #VIDchain #esignature #DecentralizedIdentity","images":["https://archive.org/download/validatedid-facebook-media/3998045963553599.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1614256092"},{"anchor":"fb-1613649774","date":"18/02/2021","year":"2021","lang":"ES","type":"photo","text":"Gracias a la integración del programa de #RRHH #Epsilon de \nGrupo Castilla con la herramienta de firma electrónica VIDsigner, COVAP ha logrado digitalizar un volumen de contratos que equivale a +13.000 hojas/año. ¡Descubre cómo ahorra en costes y tiempo la cooperativa ganadera, apostando por la digitalización de #RecursosHumanos!\n\ncc RRHH Digital ➡️ ➡️ https://bit.ly/3pax9Zy \n\n#sectorganadero #firmadigital #firmaelectrónica #VIDpartner","images":["https://archive.org/download/validatedid-facebook-media/3975690029122526.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1613649774"},{"anchor":"fb-1613556527","date":"17/02/2021","year":"2021","lang":"ES","type":"photo","text":"Descubre qué es la firma electrónica, resuelve tus dudas sobre esta herramienta digital y comprueba con un caso práctico en directo, la aplicación de esta herramienta en el sector Bancario y de Seguros en #Honduras.\n\nInscríbete al webinar gratuito organizado con nuestro partner \nMicro Imagenes soluciones de gestión documental: https://bit.ly/3u98wzV\n\n#firmaelectrónica #VIDsigner #Banca #Seguros #VIDpartner","images":["https://archive.org/download/validatedid-facebook-media/3972934579398071.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1613556527"},{"anchor":"fb-1613466580","date":"16/02/2021","year":"2021","lang":"FR","type":"photo","text":"DocuWare Régional Sales Director Gregory Hérold et Responsable commercial France Florent Rogeon partagera avec vous jeudi prochain comment optimiser votre processus de gestion des contrats avec la #dématérialisation et les signatures électroniques VIDsigner. #Partenaire international #DocuWare 😉\n\nInscrivez-Vous ici: https://bit.ly/2Z9IzCi\n\n#signatureélectronique #docuware #Webinar #ZéroPapier #VIDpartner #VIDsigner","images":["https://archive.org/download/validatedid-facebook-media/3970431862981676.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1613466580"},{"anchor":"fb-1613130066","date":"12/02/2021","year":"2021","lang":"EN","type":"photo","text":"It is vital to take a step towards digital health pass systems that everyone can adhere to. Because it is important that we think of interoperability – in terms of digital health #credentials – this can only be achieved if we work together on open standards. That's why we're joining the Good Health Pass Collaborative to help restore international travel and restart the global economy.: https://bit.ly/2MZpy2P  \n\n#COVID19 #identitysolutions #GoodHealthPass #SafeCredentials","images":["https://archive.org/download/validatedid-facebook-media/3960544817303714.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1613130066"},{"anchor":"fb-1612970938","date":"10/02/2021","year":"2021","lang":"FR","type":"photo","text":"Vous avez besoin d'une solution rapide pour mener à bien des processus de signature ayant une validité juridique absolue ? Dans le domaine des ressources humaines, l'utilisation des signatures électroniques offre de grands avantages tant pour les salariés que pour les entreprises.\n\nTéléchargez notre livre blanc ➡️ https://bit.ly/38Z9FSl  \n\n#VIDsigner #RH #RessourcesHumaines #SignatureNumérique #Esignature #livreblanc","images":["https://archive.org/download/validatedid-facebook-media/3955749821116547.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1612970938"},{"anchor":"fb-1612880440","date":"09/02/2021","year":"2021","lang":"ES","type":"photo","text":"Últimos días para inscribirse al webinar gratuito organizado con nuestro partner Omicron Panama Corporation en #Panamá. Descubre los principales aspectos de la reglamentación jurídica que sustentan el uso de la firma electrónica en Panamá.\n\nRegístrate aquí: https://bit.ly/3q6vi99  \n\n#Firmaelectrónica #VIDsigner #webinar #webinargratuito","images":["https://archive.org/download/validatedid-facebook-media/3953170074707855.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1612880440"},{"anchor":"fb-1612535764","date":"05/02/2021","year":"2021","lang":"ES","type":"photo","text":"Mejora su nivel de servicio mediante la innovación con #firmaelectrónica #VIDsigner. Descubre cómo puedes hacer procesos más eficientes a través de webinar organizado con nuestro partner en #Argentina #EXA Corporate Business Solutions\n\nRegístrate aquí: https://bit.ly/3cHo1bZ\n\n#webinar #webinargratuito","images":["https://archive.org/download/validatedid-facebook-media/3943086145716248.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1612535764"},{"anchor":"fb-1612437061","date":"04/02/2021","year":"2021","lang":"ES","type":"photo","text":"Reduce los gastos de oficina como impresión, envío, escaneo y gestión de copias en papel gracias al uso de firmas electrónicas. Inscríbete al webinar gratuito que organizamos con nuestro partner en #México Think Smart y descubre cómo recoger la firma digital de un documento de manera segura, rápida y con validez jurídica.\n\nRegístrate aquí: https://bit.ly/36yj0ij\n\n#firmaelectrónica #VIDsigner #webinar #webinargratuito #RRHH #RecursosHumanos #teletrabajo","images":["https://archive.org/download/validatedid-facebook-media/3940097392681790.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1612437061"},{"anchor":"fb-1612361507","date":"03/02/2021","year":"2021","lang":"ES","type":"photo","text":"Participa en el WEBINAR GRATUITO organizado por Amedirh Recursos Humanos en #México y aprende a agilizar la contratación y gestión de empleados a distancia. En este webinar abordaremos la legalidad de las firmas electrónicas en casos de uso como los Recursos Humanos y el teletrabajo de conformidad con la regulación de las firmas electrónicas en México.\n\nRegístrate aquí: https://bit.ly/3tm3AHC\n\n#Firmaelectrónica #VIDsigner #webinar #webinargratuito #RRHH #RecursosHumanos #teletrabajo","images":["https://archive.org/download/validatedid-facebook-media/3937819062909623.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1612361507"},{"anchor":"fb-1611909943","date":"29/01/2021","year":"2021","lang":"ES","type":"photo","text":"La #firmaelectrónica es una facilitador para el sector de Self-Storage que permite gestionar la firma del cliente no presencial. Si te perdiste el webinar organizado por Asociación Española de Self Storage y nuestro partner Qualita Solutions & Consulting #Send2sign , aquí tienes el resumen y el caso de éxito de su implantación para la empresa Trasteros Y Almacenes: https://bit.ly/2LQGFCQ\n\n#webinar #trasterosonline #firmadigital #VIDsigner #VIDpartner #selfstorage #AESS","images":["https://archive.org/download/validatedid-facebook-media/3924431170915079.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1611909943"},{"anchor":"fb-1611571012","date":"25/01/2021","year":"2021","lang":"EN","type":"photo","text":"Validated ID relies on Salesforce for boosting our customer-centric approach. This service allows our teams to anticipate opportunities and enable the right automations and predictive analysis. \n\nRead our full collaboration story here: https://bit.ly/3i8fWOl\n\n#salesforce #CRM #VIDsigner #digitalsignature #esignature","images":["https://archive.org/download/validatedid-facebook-media/3913662548658608.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1611571012"},{"anchor":"fb-1611219007","date":"21/01/2021","year":"2021","lang":"EN","type":"photo","text":"Implementation of Validated ID's electronic signature service helps our partner United VARs to digitally sign all their annual contracts among their 50 partners and over 90 countries. Read the full success story in this post: https://bit.ly/2LKUkLI\n\n#successstory #electronicsignature #digitalsignature #VIDsigner","images":["https://archive.org/download/validatedid-facebook-media/3901711006520429.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1611219007"},{"anchor":"fb-1610552109","date":"13/01/2021","year":"2021","lang":"FR","type":"photo","text":"Les avantages des signatures électroniques sont nombreux: simplification des procédures, sécurité juridique renforcée, réduction des coûts et des délais... \n\nDécouvrez la signature électronique totalement intégrée dans Salesforce et tous ses avantages ce webinaire organisé avec notre partenaire #INSX. Saisissez cette occasion pour accélérer la transformation de votre entreprise.\n\nS'INSCRIRE: https://bit.ly/2KatUCU\n\n#signatureélectronique #salesforce #Webinar #ZéroPapier #TransformationDigitale","images":["https://archive.org/download/validatedid-facebook-media/3881027695255427.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1610552109"},{"anchor":"fb-1610365802","date":"11/01/2021","year":"2021","lang":"ES","type":"photo","text":"Las previsiones relativas al registro electrónico de apoderamientos, registro electrónico, registro de empleados públicos habilitados, punto de acceso general electrónico de la Administración y archivo único electrónico producirán efectos a partir del día 2 de abril de 2021. \n\nRegístrate en el webinar que organizamos junto a nuestro partner esPublico y te ayudaremos a aplicar una manera ágil y segura de relacionarte con los ciudadanos a través de la nuevas tecnologías.  ➡️ https://bit.ly/39oKNSG\n\n#eAdmin #AAPP #AdministraciónPública #TransformacionDigital #FirmaDigital #VIDsigner #FirmaElectrónica #VIDpartner #webinar","images":["https://archive.org/download/validatedid-facebook-media/3875357229155807.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1610365802"},{"anchor":"fb-1609149641","date":"28/12/2020","year":"2020","lang":"EN","type":"photo","text":"\"70% of the total waste in offices is made up of paper\" Statistic Brain Research Institute.  Implementing an #eSignature service can help the environment, cut costs, and increase security. \nTry now up to 40 digital signatures per year at no cost and discover all of the advantages of VIDsigner’s electronic signatures here: https://bit.ly/3aph9Pw  \n\n#ZeroPaper #eSignature #VIDsigner #ElectronicSignature #DigitalSignature","images":["https://archive.org/download/validatedid-facebook-media/3839933086031555.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1609149641"},{"anchor":"fb-1608717649","date":"23/12/2020","year":"2020","lang":"ES","type":"photo","text":"En VIDsigner utilizamos únicamente tablets de mercado que calibramos para recoger la información biométrica del firmante. Trabajamos también con fabricantes como FIXT Soportes Tablet que permiten disponer de soportes que facilitan la disposición de los dispositivos en espacios como control de accesos, controles de aforo, PLV, soluciones médicas, TPV, puntos de información... \n\nConsulta los soportes aquí: https://bit.ly/34oyhRv\n\n#tablets ##VIDsigner #FIXTSoportesTablets #FIXT","images":["https://archive.org/download/validatedid-facebook-media/3827956073895923.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1608717649"},{"anchor":"fb-1608631240","date":"22/12/2020","year":"2020","lang":"ES","type":"photo","text":"Validated ID obtiene el Nivel Alto del #ENS que otorga las máximas garantías de seguridad respecto a los sistemas certificados. Nuestro objetivo es proteger adecuadamente la información y los niveles de seguridad que son de aplicación tanto a los sistemas de las Administraciones Públicas como a sus proveedores del sector privado. Echa un vistazo: https://bit.ly/2WopY3S\n\n#AAPP #AdministraciónPública #VIDsigner","images":["https://archive.org/download/validatedid-facebook-media/3825516250806572.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1608631240"},{"anchor":"fb-1608544834","date":"21/12/2020","year":"2020","lang":"EN","type":"video","text":"There has never been a year like 2020. As we shape this changing reality together, we continue to work to protect and care for each other. Together We Are Strong. Happy 2021 🥂⭐🌲#ValidatedID #DreamTeam #Happy2021","images":[],"video":{"embed_url":"https://archive.org/embed/validatedid-facebook-media/885674385508444.mp4?ui-theme=dark","thumbnail_url":"https://archive.org/download/validatedid-facebook-media/885674385508444.mp4.thumbs/885674385508444.mp4_000001.jpg","title":"There has never been a year like 2020. As we shape this changing reality together, we continue to work to protect and care for each other. Together We Are Strong. Happy 2021 🥂⭐🌲#ValidatedID #DreamTeam #Happy2021"},"url":null,"pageRef":"facebook.html#fb-1608544834"},{"anchor":"fb-1608289053","date":"18/12/2020","year":"2020","lang":"EN","type":"photo","text":"Third place by Santander Developers !!\nCongrats to Xavier Vila Pueyo, Mauro Lucchini, Albert Solana Berengué and Alejandro Bean! #VIDchain improves how people share digital personal data with third parties in a standard, secure and easy way while fostering SSI adoption. \nCheck it out: https://bit.ly/2LHXhN7\n\n#HackingForTrust","images":["https://archive.org/download/validatedid-facebook-media/3815180138506850.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1608289053"},{"anchor":"fb-1608208357","date":"17/12/2020","year":"2020","lang":"FR","type":"photo","text":"La solution #GED DocuWare est 100% compatible en télétravail. Voici comment mettre en place un workflow associée à la signature électronique pour être totalement efficace et autonome. \n\nRevoir ce webinaire: https://bit.ly/3qdKFNE\n\n#VIDpartner #VIDsigner #signatureélectronique #signaturenumérique #CRM #GED","images":["https://archive.org/download/validatedid-facebook-media/3812681458756718.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1608208357"},{"anchor":"fb-1607596253","date":"10/12/2020","year":"2020","lang":"FR","type":"video","text":"Nous sommes ravis d'annoncer notre nouveau partenariat stratégique avec #INSX ! Grâce à cette collaboration, nous serons en mesure de faciliter les processus de signature intégrés avec@Salesforce pour leurs clients. Nous sommes heureux de rejoindre la famille !\n\nEn savoir plus: https://bit.ly/39Ummi9\n\n#DigitalSignature #VIDpartners #VIDsigner","images":[],"video":{"embed_url":"https://archive.org/embed/validatedid-facebook-media/213409913492921.mp4?ui-theme=dark","thumbnail_url":"https://archive.org/download/validatedid-facebook-media/213409913492921.mp4.thumbs/213409913492921.mp4_000001.jpg","title":"Nous sommes ravis d'annoncer notre nouveau partenariat stratégique avec #INSX ! Grâce à cette collaboration, nous serons en mesure de faciliter les processus de signature intégrés avec@Salesforce pour leurs clients. Nous sommes heureux de rejoindre la famille !\n\nEn savoir plus: https://bit.ly/39Ummi9\n\n#DigitalSignature #VIDpartners #VIDsigner"},"url":null,"pageRef":"facebook.html#fb-1607596253"},{"anchor":"fb-1607509632","date":"09/12/2020","year":"2020","lang":"EN","type":"photo","text":"Integrate VIDsigner into your product and benefit from the added value it provides. Join the #VIDpartner community and start growing with us. Check out all advantages of being a partner ➡️ https://bit.ly/30ywVm1\n\n#VIDsignerPartners #Partnership #Partner #VIDsignerCommunity","images":["https://archive.org/download/validatedid-facebook-media/3792162804141917.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1607509632"},{"anchor":"fb-1607339681","date":"07/12/2020","year":"2020","lang":"ES","type":"photo","text":"Elimina el papel, haz más eficientes tus procesos, obtén mejores rendimientos. Te invitamos a participar en este webinar de nuestro partner en #México Think Smart donde te mostraremos como mantener altos niveles de productividad mediante procesos paperless en los departamentos de #RRHH, #Finanzas, #Calidad e #Ingeniería.\n\nRegistrate aquí: https://bit.ly/3mxeerq\n\n#paperless #firmaelectrónica #transormacióndigital #webinar #México #VIDpartner #VIDsigner","images":["https://archive.org/download/validatedid-facebook-media/3787125394645658.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1607339681"},{"anchor":"fb-1607068661","date":"04/12/2020","year":"2020","lang":"ES","type":"photo","text":"Asista al webinar gratuito que compartiremos con nuestro partner en Panamá Omicron Panama Corporation y comience a cambiar el panorama de la productividad empresarial mediante la mejora de la eficiencia con firmas electrónicas legalmente seguras. \n\nRegístrate aquí: https://bit.ly/3mnVmL3\n\n#Webinar #FirmaElectrónica #VIDsigner #Panama #VIDpart #FirmaElectrónica #VIDsigner #Panama #VIDpart#vidpartner","images":["https://archive.org/download/validatedid-facebook-media/3778692398822291.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1607068661"},{"anchor":"fb-1606900405","date":"02/12/2020","year":"2020","lang":"ES","type":"photo","text":"¿Cómo cambiar el panorama de la productividad empresarial en Panamá? Inscríbase al webinar gratuito organizado junto a nuestro partner Omicron Panama Corporation y descubra cómo mejorar su eficiencia con firmas electrónicas legalmente seguras. \n\n➡️ ➡️ Regístrese aquí: https://bit.ly/2UtBxpD\n\nPonentes:\n👨‍💻 Daniel Translateur, VP Sales de Validated ID (VIDsigner)\n👨‍💻 Isael Pimentel Proyectos y Ventas de Aplicaciones Omicron Panamá\n\n#firmaelectrónica #transformacióndigital #Panama #Webinar #VIDsigner #VIDpartners","images":["https://archive.org/download/validatedid-facebook-media/3773433166014881.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1606900405"},{"anchor":"fb-1606821298","date":"01/12/2020","year":"2020","lang":"ES","type":"photo","text":"Tener tus procesos en papel hace que más del 45% de los archivos sea información duplicada, y peor aún, ¡el 80% nunca vuelve a ser consultada! Descubre cómo puedes hacer procesos más eficientes a través de webinar organizado con nuestro partner en México Think Smart \n\nRegistrate aquí para ambos webinars: https://bit.ly/3mxeerq\n\n📅 Jueves 3 de Diciembre\n▶️Firma Electrónica y sus Procesos sin Papel\n\n📅 Miércoles 9 de diciembre\n▶️ Control documental en RRHH y Procesos de Calidad.\n\n#firmaelectrónica #México #webinar #transformaciónDigital #VIDpartner #VIDsigner #paperless","images":["https://archive.org/download/validatedid-facebook-media/3770937432931121.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1606821298"},{"anchor":"fb-1606733996","date":"30/11/2020","year":"2020","lang":"ES","type":"photo","text":"El nuevo escenario global ha acelerado la incorporarción de servicios que aporten seguridad jurídica. En este sentido, las firmas electrónicas son un instrumento clave para eliminar la necesidad de desplazamientos y archivo físico. \n\nLee el artículo completo publicado de nuestra CMO Nuria Aguado para #InsurtechCommunityHub: https://bit.ly/33glgsV\n\n#Insurtech #FirmaElectrónica #FirmaDigital #VIDsigner","images":["https://archive.org/download/validatedid-facebook-media/3768153053209559.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1606733996"},{"anchor":"fb-1606141459","date":"23/11/2020","year":"2020","lang":"ES","type":"photo","text":"Nuevo acuerdo estratégico entre Validated ID y #NexTReT \nEsta alianza permite ofrecer un servicio de #firmadigital dentro de sistemas como #Sharepoint, #DocuWare, #Sage, #Salesforce, #Dynamics, o #SAP, entre otros. Más info: https://bit.ly/3o1eorp \n\n#FirmaElectrónica #FirmaDigital #TransformaciónDigital #VIDpartner","images":["https://archive.org/download/validatedid-facebook-media/3749485005076364.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1606141459"},{"anchor":"fb-1605783423","date":"19/11/2020","year":"2020","lang":"FR","type":"photo","text":"La mise en place d'une solution de GED (gestion électronique de documents) et workflow comme DocuWare associée à la signature électronique de #ValidatedID, vous permet d'être totalement efficace et autonome en télétravail. Inscrivez-vous au Webinar GED et signature électronique pour assurez la continuité de vos activités à distance: https://bit.ly/36DfNx6\n\n#GED #signatureélectronique #VIDpartner #webinar","images":["https://archive.org/download/validatedid-facebook-media/3738137049544493.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1605783423"},{"anchor":"fb-1605606736","date":"17/11/2020","year":"2020","lang":"ES","type":"photo","text":"¿Cómo gestionar al cliente no presencial en el sector storage? Inscríbete al webinar que presentaremos en #AESS (Asociación Española de Self Storage) el próximo 26 de noviembre a las 17.00 junto a nuestro partner #Send2sign : https://bit.ly/3kAsDkJ\n\n#webinar #trasterosonline #firmadigital #VIDsigner #VIDpartner #selfstorage","images":["https://archive.org/download/validatedid-facebook-media/3732540350104163.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1605606736"},{"anchor":"fb-1605535069","date":"16/11/2020","year":"2020","lang":"ES","type":"photo","text":"No te pierdas el #WEBINAR que impartiremos junto a nuestro partner #AtlasCloud el próximo miércoles a las 11.00 AM (CEST Time) sobre la integración de firma biométrica VIDsigner con Salesforce. Descubre cómo simplificar trámites y ahorrar tiempo y papel con nuestro servicio de firmas digitales integrado con tu software habitual.\n\nRegístrate aquí: https://bit.ly/36nLdYg\n\n#VIDpartner #FirmaDigital #FirmaElectrónica #firmaBiométrica #VIDsigner #Salesforce","images":["https://archive.org/download/validatedid-facebook-media/3730314556993409.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1605535069"},{"anchor":"fb-1605098590","date":"11/11/2020","year":"2020","lang":"EN","type":"photo","text":"#VIDsigner is an electronic signature service designed to be integrated with third-party solutions. Integrate VIDsigner into your product and benefit from the added value it provides. Join the #VIDpartner community and start growing with us. \n\nCheck out how to become a partner: https://bit.ly/2IvPmkk\n\n#VIDpartner #VIDsignerPartners #Partnership #Partner #VIDsignerCommunity #electronicsignature","images":["https://archive.org/download/validatedid-facebook-media/3716210351737163.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1605098590"},{"anchor":"fb-1605021893","date":"10/11/2020","year":"2020","lang":"ES","type":"photo","text":"Último día para inscríbirte al webinar organizado por nuestro partner Golive. Descubre cómo enviar documentos a firmar con Validated ID y #SageX3, una integración desarrollada para ganar en agilidad y experiencia de usuario. \n\nPonentes: Pedro Huertas, Sales manager #ValidatedID y Maria Valenzuela, Consultora Senior de Sage X3.\n\nApúntate aquí: https://bit.ly/38A4sAF \n\n#VIDsigner #webinar #transformacióndigital #firmaelectrónica #firmadigital","images":["https://archive.org/download/validatedid-facebook-media/3713829345308597.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1605021893"},{"anchor":"fb-1604930660","date":"09/11/2020","year":"2020","lang":"ES","type":"photo","text":"Apúntate al próximo webinar que organizamos junto a nuestro partner Rootstack - Web / Mobile Applications y descubre las ventajas que proporciona Validated ID para procesos de firma electrónica y de identidad digital en Colombia y Panamá.\n\nRegístrate aquí: https://bit.ly/32tNdgj\n\n#Firmadigital #firmaelectrónica #transformacióndigital #SSI #Colombia #Panama #webinar","images":["https://archive.org/download/validatedid-facebook-media/3710913252266873.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1604930660"},{"anchor":"fb-1604665476","date":"06/11/2020","year":"2020","lang":"FR","type":"photo","text":"Inscrivez-vous au webinaire organisé par notre partenaire Ricoh France le jeudi 12 novembre prochain. Dans ce webinar, nous verrons les bénéfices et comment intégrer la signature électronique de façon totalement transparente et sécurisée dans la solution GED SimplyGED de DocuWare, pour une dématérialisation complète de vos processus RH et Ventes.\n\nS’INSCRIRE: https://bit.ly/2JIWnz5 \n\n#webinaire #signatureélectronique #VIDsigner #RH #Ged #ValidatedID","images":["https://archive.org/download/validatedid-facebook-media/3702278336463698.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1604665476"},{"anchor":"fb-1604584681","date":"05/11/2020","year":"2020","lang":"EN","type":"photo","text":"🚀 🆕 We are pleased to announce the launch of our brand new website! After months in the works, all of our services for facilitating #electronicsignatures and #digitalidentity verification are presented here.\n\nOur main goal in launching this new website is to provide our partners with a more intuitive and user-friendly experience that clearly states how to add value to the existent software solutions, go to market quickly, and stand out from the competition by creating a joint proposition to your customers. \n\nStay tuned because more features are yet to come ;)\n\nWe sincerely hope that you enjoy the new website and all that it has to offer!\n\n➡️ www.validatedid.com\n\n#newwebsitelaunch #newwebsite #ValidatedID #DreamTeam #VIDsigner #VIDchain #VIDnews‼️","images":["https://archive.org/download/validatedid-facebook-media/3699547126736819.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1604584681"},{"anchor":"fb-1604569916","date":"05/11/2020","year":"2020","lang":"EN","type":"photo","text":"Be the first to test and give feedback to our solution in an open Self-Sovereign Identity ecosystem at #Odyssey2020 challenge. Our team is building the challenge focus on SSI domain and interoperability with existing services (legacy) and SSI vendors to foster adoption of SSI: SIOP (OpenID) and eIDAS Bridge.  \n\nApply to test our tool if you want to implement SSI in your solutions: https://bit.ly/3epyN5K \n\n#SSI #SelfSovereignIdentity #OpenID #API #Momentum #hackathon #VIDchain","images":["https://archive.org/download/validatedid-facebook-media/3699134580111407.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1604569916"},{"anchor":"fb-1604414626","date":"03/11/2020","year":"2020","lang":"ES","type":"photo","text":"Gracias a la interación de firma electrónica con Sage X3 ya es posible agilizar los procesos que requieren firma desde la misma plataforma de Sage. Apúntate al #webinar organizado con nuestro partner Golive para entender los los principales usos de la firma electrónica y cómo gestionar y enviar documentos a firmar desde el proceso habitual de trabajo con Sage X3\n\ncc Pedro Huertas Platero, Sales manager Validated ID y María Valenzuela, Consultora Senior de Sage X3.\n\nRegístrate aquí: https://bit.ly/35Z6rLQ \n\n#VIDsigner #SageX3  #webinar #transformacióndigital #firmaelectrónica #firmadigital","images":["https://archive.org/download/validatedid-facebook-media/3694407867250745.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1604414626"},{"anchor":"fb-1604310763","date":"02/11/2020","year":"2020","lang":"ES","type":"photo","text":"Enviar a firmar documentos dentro de Sage ya no puede ser más fácil. Regístrate en la demo que presentará nuestro compañero Xabier Martínez moderada por Ernesto Ignacio Gómez Tarragona de Colegio de Economistas de La Rioja, el próximo martes en el evento virtual de Oficina Evolutiva 2020. \n\nActividad: ¨Servicio de Firma Digital con Valor Jurídico VIDsigner y su integración con Sage¨\nFecha: MARTES, 03/11\nHora: 13:00\n\nInscrípciones: https://bit.ly/3oMR1D1 \n\n﻿#OficinaEvolutiva2020 #Sage #VIDsigner #FirmaDigital #eventovirtual","images":["https://archive.org/download/validatedid-facebook-media/3691138277577704.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1604310763"},{"anchor":"fb-1604059941","date":"30/10/2020","year":"2020","lang":"ES","type":"photo","text":"Conoce todas las ventajas de las firmas electrónicas de Validated ID para Costa Rica. Un evento organizado junto a nuestros partners VISEO, Siku, Itecsa Innovación Tecnológica. Esta es tu oportunidad de impulsar de manera segura la transformación digital en los procesos de trabajo. \n\nPresentan: Juan Esteban Durango Abogado en Derecho Digital #GoLegalcr y Daniel Translateur VP Sales de Validated ID. \n\nRegístrate aquí: https://bit.ly/35LcFPb\n\n#transformacióndigital #firmaelectrónica #CostaRica #RRHH #RecursosHumanos #Insurance #Seguros #Banking #AcuerdosDeServicio","images":["https://archive.org/download/validatedid-facebook-media/3683066618384870.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1604059941"},{"anchor":"fb-1603984349","date":"29/10/2020",
