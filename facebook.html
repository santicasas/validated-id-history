55399911151541.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1603185232"},{"anchor":"fb-1602664677","date":"14/10/2020","year":"2020","lang":"DE","type":"photo","text":"Wollen Sie Ihre Verträge digital abwickeln, Aktenberge abbauen und mit digitalen Identitäten Ihre Prozesse optimieren? \nAm 26. Oktober 2020 haben Sie beim 4. eIDAS Summit die Gelegenheit mehr über die eIDAS Verordnung, Vertrauensdienste und sichere Digitalisierung zu erfahren.\n\nUnser Kollege Martí Adroher wird einen Vortrag über die Beweisbarkeit und die Beweiskraft der fortgeschrittenen e-Signatur im Vergleich zur qualifizierten e-Signatur halten.\n\nMelden Sie sich jetzt kostenlos an und nehmen Sie digital teil! https://bit.ly/33XL11M \n\n#esignatur #VIDsigner #bitkom #eidasSummit #esignatur #VIDsigner #bitkom #eidasSummit #eidas20 #eidas20","images":["https://archive.org/download/validatedid-facebook-media/3639447236080142.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1602664677"},{"anchor":"fb-1602063826","date":"07/10/2020","year":"2020","lang":"EN","type":"photo","text":"Welcome aboard! Today we give our warmest welcome to Alexander Pineda Martinez, who will help us in our technical team as IT Support Technician. It’s great to have you with us. 😃 🤩\n\n#DreamTeam #ValidatedID","images":["https://archive.org/download/validatedid-facebook-media/3618294064862126.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1602063826"},{"anchor":"fb-1602061561","date":"07/10/2020","year":"2020","lang":"DE","type":"photo","text":"#VIDsigner ➡️ #BiometrischeSignatur \nDiese handgeschriebene Signatur wird in Präsenzszenarien verwendet und auf einem Tablet erstellt, das biometrische Informationen während des Signiervorgangs erfassen kann. \n\nDie gesammelten Beweise, zu denen unter anderem Geschwindigkeit, Neigung und ausgeübter Druck gehören, werden verschlüsselt, in das Dokument eingebettet und dienen der eindeutigen Identifizierung des Unterzeichners, wodurch ein Höchstmaß an Rechtssicherheit gewährleistet wird. \n\n➡️ ➡️  Mehr Info: https://bit.ly/3lq7smh","images":["https://archive.org/download/validatedid-facebook-media/3618219131536286.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1602061561"},{"anchor":"fb-1601898551","date":"05/10/2020","year":"2020","lang":"ES","type":"photo","text":"Último día para registrarse al WEBINAR GRATUITO sobre #FirmaElectrónica en #Argentina. Esta es tu oportunidad de mejorar tu nivel de servicio mediante la innovación con firma electrónica.\n\n📆 Fecha: martes, 6 de octubre de 2020\n⏰ Hora: 11:00 - 12:00 Time zone (GMT-3:00) Buenos Aires\n\nEn este webinar organizado junto a nuestro partner #EXACorporateBusinessSolutions compartiremos contigo:\n\n➡️ Conceptos de Firma Digital y Electrónica.\n➡️ Tipos de firmas electrónicas.\n➡️ Demostración práctica de cómo recoger una firma electrónica con #VIDsigner.\n\nRegístrate aquí: https://bit.ly/36hyGqG","images":["https://archive.org/download/validatedid-facebook-media/3612305225461010.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1601898551"},{"anchor":"fb-1601626519","date":"02/10/2020","year":"2020","lang":"FR","type":"photo","text":"Chez Validated ID, nous renforçons nos niveaux de sécurité afin de garantir une sécurité juridique maximale pour toutes vos transactions numériques. En tant que fournisseurs qualifiés de services électroniques de confiance, nous nous assurons que nos services répondent aux normes éthiques et sociales les plus élevées, comme le garantissent nos certifications en matière de normes de qualité (ISO 9001 et ISO 27001). \n\nVoir notre rapport sur le cadre juridique en France réalisé par Gide Loyrette Nouel ➡️ https://bit.ly/30qV2lM \n\n#cachetélectroniques  #eidas #signaturescertifiées #certificatdigital #TSP #lidentificationélectronique","images":["https://archive.org/download/validatedid-facebook-media/3602539733104226.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1601626519"},{"anchor":"fb-1601459205","date":"30/09/2020","year":"2020","lang":"ES","type":"photo","text":"¿Quieres saber más sobre la #FirmaElectrónica en #Argentina? Regístrate en nuestro próximo #webinar organizado junto a nuestro partner #EXACorporateBusinessSolutions. \n\nCompartiremos los diferentes fundamentos de #FirmaDigital y #FirmaElectrónica en #Argentina, así como una demostración práctica de cómo recoger una firma electrónica para un documento de manera segura, rápida y con validez jurídica, gracias a #VIDsigner.\n\nRegístrate aquí: https://bit.ly/36hyGqG\n\n📆 Fecha: martes, 6 de octubre de 2020\n⏰ Hora: 11:00 - 12:00 Time zone (GMT-3:00) Buenos Aires","images":["https://archive.org/download/validatedid-facebook-media/3596417950383071.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1601459205"},{"anchor":"fb-1601280047","date":"28/09/2020","year":"2020","lang":"ES","type":"photo","text":"Le invitamos a participar en nuestro siguiente #webinar gratuito \"Legalidad de la firma electrónica y firma digital en Colombia\" conducido por Erick Rincon Cardenas, abogado de la  Universidad del Rosario y presidente de Colombia Fintech y Daniel Translateur, VP Sales de Validated ID. \n\nRegístrese aquí: https://bit.ly/2S1sgUu \n\n#Firmadigital #Firmaelectrónica #VIDsigner #Colombia #RRHH #RecursosHumanos #teletrabajo #webinar","images":["https://archive.org/download/validatedid-facebook-media/3590149034343296.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1601280047"},{"anchor":"fb-1600936466","date":"24/09/2020","year":"2020","lang":"FR","type":"photo","text":"Dernier jour à #Documation2020 à #Paris. Notre équipe Martí Adroher un Jules Le Hir présente avec vous tous les détails de notre intégration avec DocuWare et comment elle peut aider votre entreprise à réduire les coûts et l’utilisation du papier, mais aussi à accélérer considérablement les procédures - assurant un haut retour sur investissement. \n\n#dématérialisation #digitalisation #GED #workflows #transfodigitale","images":["https://archive.org/download/validatedid-facebook-media/3577785568912976.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1600936466"},{"anchor":"fb-1600873839","date":"23/09/2020","year":"2020","lang":"ES","type":"photo","text":"Un gran evento bizbarcelona. Gracias por invitarnos!  Fue un placer participar en la mesa redonda ¨Corporates y Startups: alianzas que crean valor¨ junto a Maria Carmen Fernandez ,Marta Antunez, Ivan Caballero y Quino Fernández. cc Santi Casas","images":["https://archive.org/download/validatedid-facebook-media/3575538379137695.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1600873839"},{"anchor":"fb-1600858558","date":"23/09/2020","year":"2020","lang":"ES","type":"photo","text":"Descubre alianzas win-win entre corporates y startups hoy dentro de los programas de #OpenInnovation que se organizan en bizbarcelona. \n\nSanti Casas, CEO de #ValidatedID participa hoy a las 13:00 contando nuestra experiencia con el programa Cuatrecasas Acelera junto a Maria Carmen Fernandez , Marta Antunez , Ivan Caballero y Quino Fernández","images":["https://archive.org/download/validatedid-facebook-media/3574881729203360.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1600858558"},{"anchor":"fb-1600851303","date":"23/09/2020","year":"2020","lang":"EN","type":"photo","text":"What a great day at #Insurancechallenge2020. We are glad to have speakers at panel discussion launched by Community of Insurance to discuss the latest trends on #Insurtechs and how to contribute to shaping the future of insurance innovation.\n\n#InsurTech #Insurance #innovation #startups  #DigitalTransformation","images":["https://archive.org/download/validatedid-facebook-media/3574627615895438.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1600851303"},{"anchor":"fb-1600850516","date":"23/09/2020","year":"2020","lang":"ES","type":"photo","text":"Descubra los principales aspectos legales de la firma electrónica en #Colombia en nuestro próximo webinar gratuito. Compartiremos el proceso de certificación ONAC y la legalidad de las firmas electrónicas de VIDsigner en casos de uso como los de #RecursosHumanos y #teletrabajo. \n\nRegístrese aquí: https://bit.ly/361tHKU\n\nCc Daniel Translateur, Erick Rincon Cardenas\n\n#webinargratuito #Firmadigital #Firmaelectrónica #VIDsigner #RRHH","images":["https://archive.org/download/validatedid-facebook-media/3574602179231315.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1600850516"},{"anchor":"fb-1600770762","date":"22/09/2020","year":"2020","lang":"DE","type":"photo","text":"In unserem neuen Webinar \"Chancen der Digitalisierung in Deutschland” geben wir Ihnen einen Überblick über den aktuellen Stand der Digitalisierung in Deutschland und erklären Ihnen zudem, wie Sie Ihr Unternehmen agiler machen können - durch die einfache Implementation von elektronischen Signaturen. Zu Gast haben wir auch zwei von Validated ID's Kooperationspartnern - perview und Optanium Group - die Ihnen einen Einblick geben, wie Sie Ihr Dokumentenmanagement effizient digitalisieren können. \n\nRegistrieren Sie sich hier für das Webinar: https://bit.ly/2ZZlFOH \n\n#ZuhauseBleiben #Coronavirus #Digitalisierung #webinar #digitaleTransformation #ElektronischeSignaturen","images":["https://archive.org/download/validatedid-facebook-media/3571667822858084.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1600770762"},{"anchor":"fb-1600674246","date":"21/09/2020","year":"2020","lang":"EN","type":"photo","text":"#EBCVirtual 2020 has begun! Our CTO Ivan Basart is speaking about Transforming digital identity into Self Sovereign Identity just now. Later on, our PM at #VIDchain, Xavier Vila, will be participating at 10:15AM CET about Bringing Self-Sovereign Identity to Educational Certificates and Diplomas. \nJoin us: https://bit.ly/35X9aqC\n\n#Blockchain #SSI #SelfSovereignIdentity #DigitalIdentity","images":["https://archive.org/download/validatedid-facebook-media/3568348483190018.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1600674246"},{"anchor":"fb-1600247570","date":"16/09/2020","year":"2020","lang":"EN","type":"photo","text":"We are delighted to announce our new strategic partnership with United VARs ! Thanks to this collaboration, we'll be able to facilitate the 50+ United VARs members the signature processes for their customers. Happy to join the family! \n\nGet more info: https://bit.ly/35TbNtN \n\n#DigitalSignature #Strongerthanone","images":["https://archive.org/download/validatedid-facebook-media/3552958551395678.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1600247570"},{"anchor":"fb-1600065550","date":"14/09/2020","year":"2020","lang":"ES","type":"photo","text":"Contentos de trabajar en un win-win por la transformación digital del sector, el próximo jueves 17 de septiembre seremos sponsors del webinar organizado por #AESS sobre los Storage en Cloud \ncc Pol Karaso Boxmotions ➡️ ➡️  https://bit.ly/3hzSOqk \n\n#TransformaciónDigital #selfstorage #trasterosenlanube #Boxmotions #ValetStorage","images":["https://archive.org/download/validatedid-facebook-media/3546213598736840.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1600065550"},{"anchor":"fb-1599822037","date":"11/09/2020","year":"2020","lang":"ES","type":"video","text":"Comunícate sin riesgos con las nuevas herramientas digitales. La solución #RICsigner desarrollada por nuestro partner #RICDOC y su integración con firmas digitales #VIDsigner permite la trazabilidad de todos los documentos firmados y el máximo rendimiento para tu organización.\n\n#FirmaDigital #Partner #VIDpartner","images":[],"video":{"embed_url":"https://archive.org/embed/validatedid-facebook-media/367678307580997.mp4?ui-theme=dark","thumbnail_url":"https://archive.org/download/validatedid-facebook-media/367678307580997.mp4.thumbs/367678307580997.mp4_000001.jpg","title":"Comunícate sin riesgos con las nuevas herramientas digitales. La solución #RICsigner desarrollada por nuestro partner #RICDOC y su integración con firmas digitales #VIDsigner permite la trazabilidad de todos los documentos firmados y el máximo rendimiento para tu organización.\n\n#FirmaDigital #Partner #VIDpartner"},"url":null,"pageRef":"facebook.html#fb-1599822037"},{"anchor":"fb-1599725167","date":"10/09/2020","year":"2020","lang":"FR","type":"photo","text":"VIDsigner est un service de signatures électroniques conçu pour être intégré à des solutions tierces. Notre objectif est d’ajouter de la valeur aux solutions existantes. Intégrez VIDsigner dans votre produit et profitez de la valeur ajoutée qu’il apporte. Contactez-nous ! https://bit.ly/35m55vS\n\n#VIDpartenaires  #VIDsigner #Signaturesélectroniques #VIDpartner","images":["https://archive.org/download/validatedid-facebook-media/3533793696645497.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1599725167"},{"anchor":"fb-1599641365","date":"09/09/2020","year":"2020","lang":"ES","type":"photo","text":"Gracias a la integración de #VIDsigner en la solución de gestión integral de RRHH #Epsilon, nuestro partner Grupo Castilla puede ayudar a los departamentos de #RRHH agilizar y simplificar los trámites de comunicación, firma y custodia de todos los documentos formalizados entre empresa y empleado. \n\nDescubre cómo firmar digitalmente documentos con Epsilon ➡️ https://bit.ly/2R6E6Mm \n\n#VIDpartner #API #Partnership #VIDsignerCommunity #RecursosHumanos","images":["https://archive.org/download/validatedid-facebook-media/3530677243623809.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1599641365"},{"anchor":"fb-1599573799","date":"08/09/2020","year":"2020","lang":"ES","type":"photo","text":"Felizmente anunciamos nuestro acuerdo con Insercop. Una gran oportunidad para ayudar a las empresas a optimizar sus procesos integrales de negocio a la transformación digital y con seguridad jurídica gracias a las firmas electrónicas #VIDsigner. ¿Le gustaría multiplicar sus oportunidades de negocio? Obtenga más información: Insercop\n\n#firmadigital #firmaelectrónica #transformacióndigital #colombia","images":["https://archive.org/download/validatedid-facebook-media/3528152333876300.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1599573799"},{"anchor":"fb-1599558890","date":"08/09/2020","year":"2020","lang":"EN","type":"photo","text":"By using #VIDsigner biometric and remote signatures, integrated with its Salesforce workflow, the energy company Gashogar Energía benefited its employees and customers and was able to focus on the company's core. A successful case study developed with our partner #AtlasCloud \n\nRead it here: https://bit.ly/3mbeA7g \n\n#successCase #EnergyComapny #DigitalTransformation #VIDsigner #DigitalSignature #ElectronicSignature #RemoteSignature #BiometricSignature","images":["https://archive.org/download/validatedid-facebook-media/3527582913933242.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1599558890"},{"anchor":"fb-1599471876","date":"07/09/2020","year":"2020","lang":"EN","type":"photo","text":"The integration with #VIDsigner electronic signature enables your team to send documents to be signed directly from their usual software (such as #SageX3, #Salesforce, #SharePoint, and many others) and start closing deals with speed and legal security. Check out some of our integrations at our YouTube channel: https://bit.ly/2R0ynrJ\n\n#digitalsignature #ElectronicSignature #SignPDF","images":["https://archive.org/download/validatedid-facebook-media/3524551290903071.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1599471876"},{"anchor":"fb-1599124902","date":"03/09/2020","year":"2020","lang":"ES","type":"photo","text":"Ayudamos a las Administraciones Públicas en la gestión 100% electrónica de los expedientes. Gracias a la integración de las firmas digitales de #VIDsigner con la mayoría de gestores de expedientes estamos permitiendo la eliminación total del papel en ayuntamientos y diputaciones. Regístrate al #webinar que que ofreceremos el 8 de Septiembre a las 12:00h para una demostración práctica https://bit.ly/34Jb3GS \n\n#AAPP #AdministraciónPública #Ley392015 #ceropapel #oficinasinpapel #webinar #FirmaDigital #FirmaElectrónica #FirmaBiometrcia #FirmaBIO","images":["https://archive.org/download/validatedid-facebook-media/3512394202118780.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1599124902"},{"anchor":"fb-1599037230","date":"02/09/2020","year":"2020","lang":"EN","type":"photo","text":"We have designed our service #VIDsigner to be integrated in hours. Go to market quickly and stand out from the competition by creating a joint value proposition to your customers. Your partner opportunity starts here! ➡️ https://bit.ly/3lAe8iH\n\n#digitalsignature #ElectronicSignature  #VIDPartners #Partnership","images":["https://archive.org/download/validatedid-facebook-media/3509176512440549.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1599037230"},{"anchor":"fb-1598950484","date":"01/09/2020","year":"2020","lang":"EN","type":"photo","text":"Discover the main benefits of VIDsigner's digital signature service in our next multilanguage #webinars next Monday 07/09. Join us for a free practical demo on how to collect a digital signature in a safe and easy way. \nRegister here: \n🇬🇧 https://bit.ly/3gDy7cq\n🇪🇸 https://bit.ly/2FXyhyz\n🇫🇷 https://bit.ly/2EJwlJD\n🇩🇪 https://bit.ly/2EGYCAn\n\n#VIDsigner #DigitalSignature #ElectronicSignature #Webinar","images":["https://archive.org/download/validatedid-facebook-media/3506013346090199.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1598950484"},{"anchor":"fb-1598861748","date":"31/08/2020","year":"2020","lang":"EN","type":"photo","text":"Check out the 2nd panel of the #EBCvirtual, where our colleague Xavi Vila together with Lluís Alfons Ariño from #EBSI, Hennie Bulstra from #EBSI and Alea Fairchild from #CONSTANTIAINSTITUTE, will be discussing how #SSI can be brought Diplomas. Register here: https://bit.ly/3b3G8Gx\n\n#Blockchain #SSI #SelfSovereignIdentity #DigitalIdentity","images":["https://archive.org/download/validatedid-facebook-media/3502856069739260.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1598861748"},{"anchor":"fb-1598614372","date":"28/08/2020","year":"2020","lang":"ES","type":"photo","text":"#VIDsigner incluye una variedad de métodos de firma diferentes, que pueden ser combinados para adaptarse a las necesidades en cada momento. Aquí puedes empezar a probar hasta 40 firmas digitales remotas al año sin coste, regístrate y empieza a mejorar la manera de firmar y enviar documentos a firmar para tu empresa: https://bit.ly/2QKROER\n\n#FirmaElectrónica #FirmaDigital #FirmaRemota #FirmaBio #FirmaAvanzada","images":["https://archive.org/download/validatedid-facebook-media/3494221153936085.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1598614372"},{"anchor":"fb-1598519747","date":"27/08/2020","year":"2020","lang":"EN","type":"photo","text":"We are pleased to announce that on the 23rd of September we will be at #InsuranceWorldChallenges2020, the event made for #Startup and #Insurtech. Don't miss the presentation of our CMO Nuria Aguado about #VIDsigner service and how it helps to gather consents to your daily documents in a safe and easy environment. \n\nCheck the agenda: https://bit.ly/2Qs1cg6\n\nSee you soon: Community of Insurance, #Weecover, Docplanner, Surne Seguros y Pensiones, Emerid System","images":["https://archive.org/download/validatedid-facebook-media/3490774704280730.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1598519747"},{"anchor":"fb-1598437331","date":"26/08/2020","year":"2020","lang":"EN","type":"photo","text":"How to choose a legally secure and user-friendly digital signature service for your clients? Our solution #VIDsigner enables the simultaneous use of different types of e-signature to cover every need. Thanks to our experience, we’re able to advise our partners on how to boost the experience for their customers: https://bit.ly/2EFz5r9 \n\n#digitalsignature #ElectronicSignature #signpdf","images":["https://archive.org/download/validatedid-facebook-media/3487821967909337.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1598437331"},{"anchor":"fb-1598350270","date":"25/08/2020","year":"2020","lang":"ES","type":"photo","text":"Disminuye el tiempo dedicado al papeleo administrativo con #VIDsigner. Al agilizar y acelerar los procesos de recruiting y onboarding, y simplificar los procesos de gestión, los profesionales de Recursos Humanos tienen más tiempo para dedicar a otro tipo de tareas añadiendo así más valor a su trabajo. Descubre más ventajas de las firmas digitales VIDsigner para #RRHH ➡️ ➡️ https://bit.ly/2Yv6ufk\n\n#FirmaDigital #Esignature #recursoshumanos","images":["https://archive.org/download/validatedid-facebook-media/3484789918212542.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1598350270"},{"anchor":"fb-1598248719","date":"24/08/2020","year":"2020","lang":"EN","type":"photo","text":"We are very honoured to announce that our CTO, Ivan Basart, will be speaking at the European Blockchain Convention Virtual 2020 together with Daniël Du Seuil, Convenor,\nEuropean Self Sovereign Identity Framework – ESSIF, Lone Fonss Schroder, CEO at Concordium and Pelle Brændgaard CEO at Notabene. Glad to be supporting this great event! Check out the agenda: https://bit.ly/3j6cNOm\n\n#Blockchain #SSI #SelfSovereignIdentity #DigitalIdentity","images":["https://archive.org/download/validatedid-facebook-media/3481297975228403.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1598248719"},{"anchor":"fb-1597915735","date":"20/08/2020","year":"2020","lang":"EN","type":"photo","text":"Over 1500 customers and 140 partners across 32 countries are using already our digital signature services. Join the #VIDsigner community and expand your opportunities to digitally transform your customers’ businesses. ➡️ https://bit.ly/3l3uxfd\n\n#VIDsigner #DigitalSignatures #VIDsignerPartners #PartnerNetwork","images":["https://archive.org/download/validatedid-facebook-media/3469578826400318.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1597915735"},{"anchor":"fb-1597832953","date":"19/08/2020","year":"2020","lang":"EN","type":"photo","text":"Meet our sales team this week ;) Alvaro Miranda is BDR & PAM Growth-driven professional, with 4+ years of experience in business development roles helping clients to leverage their capacities on the age of digital transformation. Feel free to reach him if you have any questions! https://bit.ly/3aDhJal \n\n#dreamteam #salesteam #ValidatedID","images":["https://archive.org/download/validatedid-facebook-media/3466580970033437.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1597832953"},{"anchor":"fb-1597740093","date":"18/08/2020","year":"2020","lang":"ES","type":"photo","text":"#VIDsigner E-Delivery permite tener una comunicación electrónica fehaciente con plena validez legal de tus notificaciones. Este servicio es más rápido y eficiente que cualquier otro método tradicional basado en papel. Si te perdiste el webinar, ahora puedes volver a verlo aquí: https://bit.ly/3kWzHta\n\n#comunicacionesFehacientes #EmailCertificado #CorreoElectronicoCertificado #VIDsignerEDelivery #edelivery","images":["https://archive.org/download/validatedid-facebook-media/3463674673657400.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1597740093"},{"anchor":"fb-1597647164","date":"17/08/2020","year":"2020","lang":"ES","type":"photo","text":"💡 Los 7 valores añadidos de las firmas digitales #VIDsigner para #RRHH ➡️\n1️⃣ Ahorro en costes de gestión \n2️⃣ Ahorro en tiempo dedicado \n3️⃣ Mejor experiencia de usuario \n4️⃣ Eliminan errores humanos\n5️⃣ Reducen el impacto medioambiental\n6️⃣ Facilitan las comunicaciones\n7️⃣ Agilizan y aceleran los procesos de recruiting y onboarding\n\nDescubre más beneficios del uso de #FirmaElectrónica: https://bit.ly/2Cz50Jp   \n\n#RRHH #RecursosHumanos #FirmaDigital #TransformaciónDigital","images":["https://archive.org/download/validatedid-facebook-media/3460586600632874.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1597647164"},{"anchor":"fb-1597391643","date":"14/08/2020","year":"2020","lang":"ES","type":"photo","text":"Descubre el poder de la transformación digital y #GoPaperless. No te pierdas el webinar que ofrecen nuestros partners en México Think Smart y empieza a evolucionar tus procesos, mejorando los tiempos de procesamiento, aprobaciones y búsquedas de documentos. Implementa #firmaelectrónica: https://bit.ly/2PURHWs\n\n#Webinar #thinksmart #firmadigital #VIDsigner","images":["https://archive.org/download/validatedid-facebook-media/3452137238144477.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1597391643"},{"anchor":"fb-1597313283","date":"13/08/2020","year":"2020","lang":"ES","type":"photo","text":"Contacta con nuestro partner en Bogotá #IPM International Project Management que integra el servicio de firmas multicanal de Validated ID y recibe un paquete de 𝗙𝗜𝗥𝗠𝗔𝗦 𝗧𝗢𝗧𝗔𝗟𝗠𝗘𝗡𝗧𝗘 𝗚𝗥𝗔𝗧𝗜𝗦. Regístrate y empieza a firmar todos tus documentos de manera electrónica: https://bit.ly/3ambveU \n\n#IPM #ipmconsulting #FirmasElectrónicas #FirmaDigital #TransformaciónDigital #VIDsigner","images":["https://archive.org/download/validatedid-facebook-media/3449509301740604.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1597313283"},{"anchor":"fb-1597229635","date":"12/08/2020","year":"2020","lang":"ES","type":"photo","text":"Las firmas electrónicas #VIDsigner no solo se pueden usar desde cualquier lugar, sino que además permiten reducir drásticamente el uso de papel y el impacto ambiental y mejoran nuestra productividad. Descubre qué empresas confían ya en nosotros: https://bit.ly/344yEld\n\n#ceropapel #medioambiente #firmaelectronica #firmadigital #partners","images":["https://archive.org/download/validatedid-facebook-media/3446752255349642.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1597229635"},{"anchor":"fb-1597145997","date":"11/08/2020","year":"2020","lang":"FR","type":"photo","text":"Signatures électroniques VIDsigner sans représenter une lourde tâche et sans nécessiter d’installation compliquée. Pour garantir la sécurité, nous émettons une double validation par email et OTP (One Time Password) sur les smartphones de vos clients afin de garantir leur identité. \n\nEssai gratuit jusqu’à 40 signatures numériques par an: https://bit.ly/3gZSiCx\n\n#Signaturesélectroniques #signaturesnumériques #VIDsigner #OTP","images":["https://archive.org/download/validatedid-facebook-media/3443877285637139.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1597145997"},{"anchor":"fb-1597057462","date":"10/08/2020","year":"2020","lang":"ES","type":"photo","text":"Firma electrónica #VIDsigner es la solución perfecta para dar cumplimiento a la Ley 39/2015 en entornos presenciales. Nuestras soluciones de firma electrónica permiten generar al momento documentos  para ser firmados directamente por el ciudadano. Más info: https://bit.ly/33N83Zw    \n\n#VIDsigner #FirmaElectronica #ZeroPapel #AdministarciónPública","images":["https://archive.org/download/validatedid-facebook-media/3441007789257422.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1597057462"},{"anchor":"fb-1597057036","date":"10/08/2020","year":"2020","lang":"ES","type":"photo","text":"Firma electrónica #VIDsigner es la solución perfecta para dar cumplimiento a la Ley 39/2015 en entornos presenciales. Nuestras soluciones de firma electrónica permiten generar al momento documentos para ser firmados directamente por el ciudadano. Más info: http://ow.ly/D58A30qH6Z2 \n\n#VIDsigner #FirmaElectronica #firmadigital #ZeroPapel #AdministarciónPública #AAPP","images":["https://archive.org/download/validatedid-facebook-media/3440999332591601.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1597057036"},{"anchor":"fb-1596799497","date":"07/08/2020","year":"2020","lang":"ES","type":"photo","text":"Nuestro partner #RICDOC ayuda a sus clientes a optimizar sus procesos de gestión documental, consiguiendo para ellos importantes beneficios y ahorro en costes. \nConoce el caso de éxito de nuestra colaboración: https://bit.ly/30ywVm1\n\ncc Txema Ramirez #Partners #VIDsigner #ValidatedID","images":["https://archive.org/download/validatedid-facebook-media/3432571173434417.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1596799497"},{"anchor":"fb-1596705001","date":"06/08/2020","year":"2020","lang":"DE","type":"photo","text":"Die digitalen Signaturservices von VIDsigner sind durch die Europäische Verordnung (EG) Nr. 910/2014/EU (eIDAS) als Trust Service Provider anerkannt. Registrieren Sie sich und probieren Sie unseren Service aus - vollkommen kostenfrei! 40 elektronische Signaturen pro Jahr – vollkommen kostenlos ➡️ https://bit.ly/2Di7wUR\n\n#elektronischeSignaturen #digitalenSignaturservices #VIDsigner #DigitaleSignaturen","images":["https://archive.org/download/validatedid-facebook-media/3429490137075854.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1596705001"},{"anchor":"fb-1596613069","date":"05/08/2020","year":"2020","lang":"ES","type":"photo","text":"VIDsigner es un servicio concebido para aportar valor a las soluciones existentes, acelerando y simplificando el proceso de obtención de firma de los clientes. \nConoce las ventajas de ser partner 🤝🏻 https://bit.ly/30ywVm1 \n\n#partners #partnership #partnerprogram #VIDsigner #ValidatedID","images":["https://archive.org/download/validatedid-facebook-media/3426357717389096.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1596613069"},{"anchor":"fb-1596537992","date":"04/08/2020","year":"2020","lang":"EN","type":"photo","text":"The range of tablets currently supported for signing with VIDsigner BIO is very wide and available for the three main platforms: #Android, #iOS and #Windows. For VIDsigner we have made a strong commitment to using only tablets with stylus with the ability to capture pressure and fully display the document, something a simple signature pad is not able to do. All our recommended models are calibrated by our technical team. Check more info here: https://bit.ly/3i6IQ00 \n\n#tablets #VIDsigner #ElectronicSignature #BioSignature","images":["https://archive.org/download/validatedid-facebook-media/3423794430978758.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1596537992"},{"anchor":"fb-1596443706","date":"03/08/2020","year":"2020","lang":"EN","type":"photo","text":"If you are looking for a digital experience that cuts the need for paper while improving the current inefficiencies - no matter where the employees are, check out our solution of electronic signature #VIDsigner to ensure speed, security and adaptability online. \n\nGet more info ➡️➡️ http://ow.ly/UwdL30qXdxL \n\n#DigitalSignature #Esignature #RRHH #HumanResource","images":["https://archive.org/download/validatedid-facebook-media/3420718331286368.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1596443706"},{"anchor":"fb-1596182534","date":"31/07/2020","year":"2020","lang":"ES","type":"photo","text":"Descubre cómo la firma digital puede ayudar a tu empresa a atraer y a mantener a los mejores profesionales 🎯, así como también a automatizar procesos internos. Encuentra más detalles aquí: http://ow.ly/UV9z30qXdRH \n\n#RRHH #RecursosHumanos #FirmaElectrónica #FirmaDigital #TransformaciónDigital","images":["https://archive.org/download/validatedid-facebook-media/3411958118829056.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1596182534"},{"anchor":"fb-1596098711","date":"30/07/2020","year":"2020","lang":"ES","type":"photo","text":"🌍 Descubre el marco legal en de las firmas realizadas con #VIDsigner para #LATAM en países como Chile, Colombia, Costa Rica, Panamá o Perú. ➡️  http://ow.ly/WY3330pWtya    \n\n#CumplimientoLegal #FirmaElectrónica #MarcoLegal  #FirmaDigital","images":["https://archive.org/download/validatedid-facebook-media/3409180949106773.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1596098711"},{"anchor":"fb-1596009684","date":"29/07/2020","year":"2020","lang":"EN","type":"photo","text":"Meet our Sales team this week ;) Cedric Guillou is Sales & Partners Account Manager for the French market with over 10 years of experience in the ICT sector. Feel free to reach him if you have any questions! https://www.linkedin.com/in/cedricguillou/\n\n#DreamTeam #ValidatedID #SalesTeam","images":["https://archive.org/download/validatedid-facebook-media/3406205426070992.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1596009684"},{"anchor":"fb-1595925047","date":"28/07/2020","year":"2020","lang":"ES","type":"photo","text":"Nominados en la categoría Claims/Underwriting/Digital ecosystem en #InsuranceChallenges en los #SealAwards 2020, como una de las startups que más ayudan a la transformación digital del sector asegurador. Gracias Community of Insurance \nhttp://ow.ly/i6HP50AH0Nv\n\n#Insurtech #Insurance #DigitalEcosystem #startups #transformaciónDigital #SectorAsegurador","images":["https://archive.org/download/validatedid-facebook-media/3403475819677286.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1595925047"},{"anchor":"fb-1595835628","date":"27/07/2020","year":"2020","lang":"ES","type":"photo","text":"Únete al webinar organizado por nuestro partner en Argentina #EXACorporateBusinessSolutions para conocer normativas de firma digital y su aplicación en documentos digitales. Regístrate aquí: https://lnkd.in/dedxGby \n\n#FirmaDigital #FirmaElectrónica #Digitalización #VIDsigner","images":["https://archive.org/download/validatedid-facebook-media/3400611386630396.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1595835628"},{"anchor":"fb-1595581615","date":"24/07/2020","year":"2020","lang":"FR","type":"photo","text":"Vous souhaitez plus d'informations sur la validité des signatures électroniques de Validated ID en France? Téléchargez le rapport de #GideLoyretteNouela ivos tradicionales en las empresas. #VIDsigner facilita la gestión de los contratos de trabajo de manera totalmente electrónica a través de la firma biométrica, centralizada, remota o una combinación de ellas. Sigue leyendo y descubre el caso de éxito de Orden Hospitalaria San Juan de Dios Aragón San Rafael - Pagina oficial: http://ow.ly/ovOV30qKj66 \n\nSi estás evaluando soluciones de firma electrónica, puedes contactarnos para recibir más información sobre cómo podemos ayudar a tu organización. \n\n﻿#FirmaElectrónica #RRHH #TransformaciónDigital","images":["https://archive.org/download/validatedid-facebook-media/3238400142851522.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1590655812"},{"anchor":"fb-1590570776","date":"27/05/2020","year":"2020","lang":"EN","type":"photo","text":"Don’t miss today’s #webinar ¨E-signatures in an e-verchanging world¨ presented by our partner DocuWare. Learn how electronic signatures are being used today and its importance in an ever changing business landscape. Register for webinar: http://ow.ly/cDm830qJZfI \n\ncc Richard Moss, Regional Sales Director, DocuWare\nDaniel Translateur, VP Sales, Validated ID \n\n#electronicsignature #esignature #digitalsignatures","images":["https://archive.org/download/validatedid-facebook-media/3236006199757583.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1590570776"},{"anchor":"fb-1590481584","date":"26/05/2020","year":"2020","lang":"ES","type":"photo","text":"¿Cómo mantener la comunicación, gestionar solicitudes y seguir prestando servicios en tiempos del COVID-19? Apúntate al webinar organizado por nuestro partner Artaiz Asesoría Tecnológica en colaboración con Kuorum.org, #NetbossComunicaciones y Ayuntamiento de Tarifa Oficial para conocer las soluciones tecnológicas en ayuntamientos. Apúntate aquí: http://ow.ly/N0Vt30qJmIH\n\ncc Oscar Acedos, Matias Nso, José María Fernandez Del Arco, Fernando García Iglesias, Ángel Peinado\n\n#AAPP #firmadigital #firmaelectrónica #webinar  #transformacióndigital #Covid19","images":["https://archive.org/download/validatedid-facebook-media/3233587966666073.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1590481584"},{"anchor":"fb-1590399435","date":"25/05/2020","year":"2020","lang":"EN","type":"photo","text":"Due to COVID-19, doctors and patients have increasingly been resorting to digital health solutions as lockdown rules have drastically curtailed the possibility of face-to-face consultations. Sometimes to their surprise, they have discovered that many of these solutions deliver positive, cost-effective medical and health benefits. \n\nInteresting study conducted by PwC Strategy& GmbH in collaboration with the Spitzenverband Digitale Gesundheitsversorgung: http://ow.ly/RxZN30qI48l\n\n#Healthcare #health #digitalhealth #Covid19 #digitaltransformation","images":["https://archive.org/download/validatedid-facebook-media/3231330740225129.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1590399435"},{"anchor":"fb-1590054372","date":"21/05/2020","year":"2020","lang":"ES","type":"photo","text":"¿Quieres saber cómo enviar a firmar desde cualquier lugar y gestionar online tus documentos firmados?  Apúntate al webinar de mañana organizado por nuestros partners Ricoh España sobre firma digital remota de #VIDsigner y su integración con DocuWare. \n\nRegístrate aquí: http://ow.ly/pBm430qI4qs\n\n#firmadigital #FirmaRemota #webinar","images":["https://archive.org/download/validatedid-facebook-media/3221543441203859.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1590054372"},{"anchor":"fb-1589967525","date":"20/05/2020","year":"2020","lang":"ES","type":"photo","text":"El Ajuntament de Salou apuesta por la transformación de las administraciones pública y dio un paso más en la innovación digital gracias a la implantación de la firma biométrica #VIDsigner. \nLee el caso de éxito completo aquí: http://ow.ly/AVKc30qCZL8\n \nUna integración realizada con nuestro partner #Peakway\ncc Jesus Redon \n\n#FirmaDigital #CeroPapel #InnovadoresPúblicos #AdministraciónElectrónica","images":["https://archive.org/download/validatedid-facebook-media/3219043478120522.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1589967525"},{"anchor":"fb-1589884256","date":"19/05/2020","year":"2020","lang":"DE","type":"photo","text":"🇩🇪 Möchten Sie wissen, wie Sie in jeder Situation einfach und sicher elektronische Signaturen erhalten können?Melden Sie sich für unser #WEBINAR am 25. Mai um 10 Uhr an, um mehr über die Vorteile der Signaturlösung von #VIDsigner zu erfahren http://ow.ly/UiVq30qD4Ar\n\n#DigitaleSignaturen #ElektronischeSignaturen","images":["https://archive.org/download/validatedid-facebook-media/3216631591695044.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1589884256"},{"anchor":"fb-1589873613","date":"19/05/2020","year":"2020","lang":"ES","type":"photo","text":"Descubre un nuevo caso de uso para las empresas enfocadas en formación profesional después de publicarse la Resolución SEPE con medidas extraordinarias para hacer frente al COVID-19. Échale un vistazo: http://ow.ly/XyPh30qHlIv\n\n#FirmaBiométrica #firmadigital #FirmaElectrónica #remote #FirmaRemote #Formación #FormaciónProfesional #SEPE #VIDsigner","images":["https://archive.org/download/validatedid-facebook-media/3216381525053384.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1589873613"},{"anchor":"fb-1589808243","date":"18/05/2020","year":"2020","lang":"EN","type":"photo","text":"Welcome aboard! Today we give our warmest welcome to Johana Guerrero, who will join the team as VIDsigner’s Product Manager, and Marta Jamardo who will help us in the Administration department. It’s great to have you with us. #DreamTeam #ValidatedID","images":["https://archive.org/download/validatedid-facebook-media/3214497855241751.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1589808243"},{"anchor":"fb-1589542817","date":"15/05/2020","year":"2020","lang":"EN","type":"photo","text":" Xavier Alvarez #CaixaCapitalRisc, Almudena Trigo #BeAbleCapital, Olivier Wolff SimpleCloud y nuestro CEO Santi Casas\n\nInscríbete aquí: http://ow.ly/t7C530qCQ3g","images":["https://archive.org/download/validatedid-facebook-media/3177025152322355.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1588579316"},{"anchor":"fb-1588247412","date":"30/04/2020","year":"2020","lang":"EN","type":"photo","text":"LAST CALL! Sign up for today’s #WEBINAR hosted by our Dutch partner DocVisie to learn about the benefits of #VIDsigner signature solution. Register here:  http://ow.ly/NAc530qBYzH","images":["https://archive.org/download/validatedid-facebook-media/3167910479900489.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1588247412"},{"anchor":"fb-1588151100","date":"29/04/2020","year":"2020","lang":"ES","type":"photo","text":"Como colaboradores del proyecto #AceleraPymes Red.es\nayudamos a las pymes y autónomos para atenuar el impacto del COVID-19 en su actividad y fomentar su digitalización con soluciones de teletrabajo. En el siguiente link puedes consultar todo el listado de proveedores para PYMES: http://ow.ly/ACxp30qBEMA Y si necesitas firmar o enviar a firmar documentos, te regalamos firmas gratis para que puedas hacerlo hasta el 31 de Mayo: http://ow.ly/eaaK30qu7kE\n\n#AceleraPyme #Autonomos #Pymes #FirmaElectronica #COVID19 #digitalización #teletrabajo","images":["https://archive.org/download/validatedid-facebook-media/3165303450161192.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1588151100"},{"anchor":"fb-1588068585","date":"28/04/2020","year":"2020","lang":"EN","type":"photo","text":"How are you keeping compliant while working remotely? Check this article via UK Health Show and let us introduce our free digital signatures service during COVID 19: http://ow.ly/9SbY30qBlvX","images":["https://archive.org/download/validatedid-facebook-media/3163011210390416.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1588068585"},{"anchor":"fb-1587996950","date":"27/04/2020","year":"2020","lang":"ES","type":"photo","text":"“Ya no hay vuelta atrás en el cambio tecnológico” Gracias Oscar Granados del El País y #ElPaísRetina por hablar con nosotros sobre la lectura positiva de la adaptación que están viviendo las #startups en España #StayPositive #Techforgood\n\n📰 Lee artículo completo: http://ow.ly/KWdX30qB6Ob","images":["https://archive.org/download/validatedid-facebook-media/3161129917245212.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1587996950"},{"anchor":"fb-1587973314","date":"27/04/2020","year":"2020","lang":"FR","type":"photo","text":"🇫🇷 La transition numérique du secteur de la santé avec la\nsignature électronique. Chaque jour dans les centres de santé, un grand nombre de documents sont signés manuellement. Avec la signature électronique, il n’est plus nécessaire d’imprimer, de scanner ou d’accumuler physiquement le papier. Téléchargez le white paper sur la signature numérique en Santé en France ➡️ http://ow.ly/DbBr30qusfe\n\n#Santé #SignatureNumérique #VIDsigner #SignatureElectronique #Sociaux #France","images":["https://archive.org/download/validatedid-facebook-media/3160487920642745.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1587973314"},{"anchor":"fb-1587720750","date":"24/04/2020","year":"2020","lang":"FR","type":"photo","text":"🇫🇷 Découvrez les avantages de la signature électronique afin d'améliorer l'expérience utilisateur de manière simple et sécurisée lors de vos processus de travail habituels, pendant le #webinar presenté par notre collègue Danna OUN ➡️➡️ S'INSCRIRE: http://ow.ly/rdhJ30qzcdV","images":["https://archive.org/download/validatedid-facebook-media/3153464604678410.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1587720750"},{"anchor":"fb-1587634852","date":"23/04/2020","year":"2020","lang":"ES","type":"photo","text":"¿Quieres conocer la forma más fácil y segura de obtener firmas electrónicas en cualquier escenario? Inscríbete al #WEBINAR -1584359434","date":"16/03/2020","year":"2020","lang":"EN","type":"photo","text":"Today’s technology is helping us for remote working and we’re committed to help organizations to succeed in their digital transition in a seamless way. Check out the 3 top benefits of remote digital signatures at http://ow.ly/DIbT30qqaaO\n\n#digitalselling #digitalsales #sales #esignatures #digitalsignatures #electronicsignatures #futureofwork\n#remotework","images":["https://archive.org/download/validatedid-facebook-media/3063607660330772.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1584359434"},{"anchor":"fb-1584098979","date":"13/03/2020","year":"2020","lang":"ES","type":"photo","text":"Gracias a la implantación de la firma biométrica #VIDsigner realizada por #Peakway y su integración con GADD - Grupo Meana, S.A. se consigue un paso más en la transformación de las administraciones públicas. \n\nPara más información: http://bit.ly/33caen1\n\nM. Carme Noguer, Coordinadora de Organización, Personas y Administración Electrónica Oficina de Promoció Econòmica de Manlleu Ajuntament de Manlleu destaca: \n\n#TransformaciónDigital #AdministracionPública #FirmaDigital #FirmaElectronica #VIDsigner #AAPP","images":["https://archive.org/download/validatedid-facebook-media/3056906291000909.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1584098979"},{"anchor":"fb-1584013147","date":"12/03/2020","year":"2020","lang":"ES","type":"photo","text":"🚀🚀 #WEBINAR para Administraciones Públicas, \nMartes, 2️⃣5️⃣ de MARZO.\n\nEn este webinar compartiremos cómo recoger la firma digital manuscrita del ciudadano de una manera segura, rápida y con validez jurídica, en cumplimiento con la Ley 39/2015. \n\n➡️➡️ Regístrate aquí: http://ow.ly/32nq30qoG05\n\ncc Fernando Pino y Xavier Sancliment \n\n#AdministarciónesPúblicas #AAPP #FirmaElectonica #VIDsigner #FirmaDigital #Peakway","images":["https://archive.org/download/validatedid-facebook-media/3054729257885279.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1584013147"},{"anchor":"fb-1583940073","date":"11/03/2020","year":"2020","lang":"EN","type":"photo","text":"Working From Home. Here is how to make remote work go smoothly, manage clients and remote employees, and maintain productivity: http://bit.ly/2vOJLjv\n\n#digitalselling #digitalsales #sales #esignatures #digitalsignatures #electronicsignatures #futureofwork\n#remotework","images":["https://archive.org/download/validatedid-facebook-media/3052892008069004.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1583940073"},{"anchor":"fb-1583930400","date":"11/03/2020","year":"2020","lang":"ES","type":"video","text":"Gracias Cadena SER y La Ventana de Carles Francino + su equipo cc Xavi Dorado por esta entrevista a Santi Casas sobre la identidad digital soberana (SSI) en Europa. \n\nPara nosotros es un honor participar junto a otros actores en el proyecto #EBSI para que en 2022 Europa tenga su ID soberana basada en blockchain. \n\ncc Xavi Vila, Albert Solana, Alex Bean","images":[],"video":{"embed_url":"https://archive.org/embed/validatedid-facebook-media/1109990252726437.mp4?ui-theme=dark","thumbnail_url":"https://archive.org/download/validatedid-facebook-media/1109990252726437.mp4.thumbs/1109990252726437.mp4_000001.jpg","title":"Gracias Cadena SER y La Ventana de Carles Francino + su equipo cc Xavi Dorado por esta entrevista a Santi Casas sobre la identidad digital soberana (SSI) en Europa. \n\nPara nosotros es un honor participar junto a otros actores en el proyecto #EBSI para que en 2022 Europa tenga su ID soberana basada en blockchain. \n\ncc Xavi Vila, Albert Solana, Alex Bean"},"url":null,"pageRef":"facebook.html#fb-1583930400"},{"anchor":"fb-1583832265","date":"10/03/2020","year":"2020","lang":"DE","type":"photo","text":"Durch die Kooperation von Validated ID und DocuWare steht DocuWare-Nutzern eine elektronische Signaturlösung zur Verfügung, mit der sich Prozesse beschleunigen lassen und gleichzeitig sichere Workflows durch den Einsatz eines Trust Service Providers gewährleistet werden. \n\nErfahren Sie mehr: http://ow.ly/zgNB30qnHHY\n\n#elektronischeunterschrift #elektronischesignatur #papierlos #vidsigner","images":["https://archive.org/download/validatedid-facebook-media/3050117975013074.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1583832265"},{"anchor":"fb-1583751395","date":"09/03/2020","year":"2020","lang":"FR","type":"photo","text":"📢Validated ID travaille sur l’EBSI pour l’identité digitale souveraine en Europe. Cette initiative conjointe au sein du projet #EBSI (The European Blockchain Services Infrastructure) a pour objectif qu’en 2022 l’Europe ait une identité souveraine basée sur le blockchain. \nGrâce à laquelle, chaque citoyen aura le pouvoir sur ses données et pourra toutes les réunir (papiers d’identité, permis de conduire, certificats d’études, historique santé ou documents financiers) dans un portefeuille digital. \n\n➡️➡️ http://ow.ly/Vv3G30qolcB\n\n#ViDchainIDWallet #ViDchainWallet  #Blockchain #DigitalIdentity #VIDchain","images":["https://archive.org/download/validatedid-facebook-media/3048026865222185.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1583751395"},{"anchor":"fb-1583499245","date":"06/03/2020","year":"2020","lang":"EN","type":"photo","text":"Ready to rock #blockchain solutions for the real world! \n\nFinally arrived the final day of the European competition #Blockchers, the project launched by Validated ID in collaboration with Factory Matters, about the use of Blockchain in the education sector. \n\nSee you next monday in #Frankfurt. \n\ncc Pol Fañanás and Xavier Vila  \n\n#Blockchers #Blockchain #Horizon2020 #SSI","images":["https://archive.org/download/validatedid-facebook-media/3041596775865194.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1583499245"},{"anchor":"fb-1583486709","date":"06/03/2020","year":"2020","lang":"EN","type":"photo","text":"📰 6 ways electronic signature technology benefits your business. Learn from our integration with DocuWare about the advantages of #ElectronicSignatures: \nmore security, easier compliance, more efficient workflow, mobile access, and cost and space savings from less paper use. \n\nRead more ➡️ http://ow.ly/ecPT30qgWar\n\n#ElectronicSignatures  #VIDsigner","images":["https://archive.org/download/validatedid-facebook-media/3041282915896580.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1583486709"},{"anchor":"fb-1583415422","date":"05/03/2020","year":"2020","lang":"EN","type":"photo","text":"What a great event #ENGAGEconference in Arnhem (NL).  college Martí Adroher attended to the conference and shared our #eSignature innovation with digital leaders from all over the world. Thanks to the organization!\n\n#Engage #DigitalSignature #eSignature #ElectronicSignature #SSI #Security","images":["https://archive.org/download/validatedid-facebook-media/3039237852767753.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1583415422"},{"anchor":"fb-1583235962","date":"03/03/2020","year":"2020","lang":"ES","type":"photo","text":"Hoy en #CNIS2020 nuestro equipo está compartiendo \nlas experiencias de #TransformacionDigital de la #AAPP gracias a la #FirmaElectrónica #ViDSigner, solución perfecta para una administración 100% electrónica, cumpliendo con la ley 39/2015. \n\nIntegración con esPublico y gladtolink\n\n#AdministracionElectronica #FirmaElectronica #AA\n\nCC Santi Casas, Pedro Huertas, Ramón Bernabéu, Nuria Aguado, Oscar Acedos","images":["https://archive.org/download/validatedid-facebook-media/3034884266536445.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1583235962"},{"anchor":"fb-1583228202","date":"03/03/2020","year":"2020","lang":"ES","type":"photo","text":"Si estás #hoy en #CNIS2020, te invitamos que a las 16:00 vengas a la Sala 7, donde nuestro CEO Santi Casas  acompañado a Beatriz Caparrós Montagud, Vanesa Vilaseca Figueruelo de #AyuntamientoDeCunit y Jesus Redon de Ajuntament de Salou  compartirán las soluciones de #FirmaElectrónica en materia de registro y en movilidad. \n\nIntegración de #VIDsigner con el sistema de gestión de expedientes esPublico y como solución en desplazamientos con gladtolink.\n\n#AdministracionElectronica #FirmaDigital #AAPP #AdministarciónPública","images":["https://archive.org/download/validatedid-facebook-media/3034700549888150.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1583228202"},{"anchor":"fb-1583146462","date":"02/03/2020","year":"2020","lang":"ES","type":"photo","text":"Nos vemos en Madrid el 03 y 04 de marzo en el #CNIS2020 de CNIS. Congreso Nacional de Innovación y Servicios Públicos, dónde compartiremos las experiencias de #TransformacionDigital de la #AAPP gracias a la firma electrónica #ViDSigner, la solución perfecta para dar cumplimiento a la Ley 39/2015.  \n\n#AdministracionElectronica #FirmaDigital #AAPP #AdministarciónPública  #FirmaElectonica","images":["https://archive.org/download/validatedid-facebook-media/3032635593427979.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1583146462"},{"anchor":"fb-1582904580","date":"28/02/2020","year":"2020","lang":"EN","type":"photo","text":"What a great day for the #VIDchain team! Our work with Self-Sovereign Digital Identity #SSI has been selected for the Odyssey Hackathon 2020  #OdysseyHack \nSee you in Groningen soon!\n\n👩‍🚀👨‍🚀 The best 105 teams\n🚀🚀 2.000 time travellers\n🏆€200.000 cash rewards\n⚡️Let’s shape the 21st century!!\n\n#Odyssey2020 #hackathon #blockchain #AI #tech #UNsdg","images":["https://archive.org/download/validatedid-facebook-media/3026642277360644.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1582904580"},{"anchor":"fb-1582887039","date":"28/02/2020","year":"2020","lang":"ES","type":"photo","text":"Un placer haber compartido ayer con todos vosotros los beneficios que proporciona #VIDsigner en #OTDChallenge2020. Muchísimas gracias a nuestro partner Artaiz Asesoría Tecnológica por acogernos. \n\ncc Fernando García Iglesias Oscar Acedos de Juan \n\n#FirmaElectronica #VIDsigner #FirmaDigital","images":["https://archive.org/download/validatedid-facebook-media/3026074240750781.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1582887039"},{"anchor":"fb-1582808164","date":"27/02/2020","year":"2020","lang":"ES","type":"photo","text":"Encantados de formar parte de la \"Innovación y Digitalización de la AAPP en País Vasco\". Nuestro compañero Xabier Martínez ha compartido hoy las soluciones de firma electrónica #VIDsigner para #AdministracionesPúblicas en Bilbao. Muchísimas gracias a todos los ponentes, participantes y co-sponsors por compartir este día tan productivo. cc Gfi España Ibermática  Esri SocInfo\n\ncc Javier Bikandi Jaime Del Barrio Pison Angel Cancelo  Díaz de durana Blanca Eusko Jaurlaritza - Gobierno Vasco  Ayuntamiento de Vitoria-gasteiz Manu Roibal #BilbaoTIK \n\n#AAPP #FirmaElectronica #VIDsigner #AdministraciónPublica #FirmaDigital #Ley392015","images":["https://archive.org/download/validatedid-facebook-media/3024167537608118.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1582808164"},{"anchor":"fb-1582796122","date":"27/02/2020","year":"2020","lang":"EN","type":"photo","text":"It was a great #VC night at #AntigaFàbricaEstrellaDamm this week. We’re proud sponsors of BCN Startup Grind and had a great night within the #TechSpiritBarcelona week. Great #venturecapital event with Lina Chong, from Target Global VC , Brian Caulfield #DraperEsprit, Sara Secall from #Inveready, and Roma Jelinskaite from our investors #CaixaCapitalRisc  #SGBCN","images":["https://archive.org/download/validatedid-facebook-media/3023853900972815.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1582796122"},{"anchor":"fb-1582727065","date":"26/02/2020","year":"2020","lang":"ES","type":"photo","text":"Hoy estamos en el evento kick-off partners 2020 #BreakingBarriers organizado por Exact en Madrid. Nuestros compañeros Pedro Huertas y Oscar Acedos comparten nuestros distintos tipos de #FirmaElectrónica #VIDsigner que se combinan entre sí para adaptarse a las necesidades de equipos y personas. \n\ncc afinsoftware Auren Blc Nubedocs  JNC Construtora","images":["https://archive.org/download/validatedid-facebook-media/3022202451137960.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1582727065"},{"anchor":"fb-1582715820","date":"26/02/2020","year":"2020","lang":"ES","type":"photo","text":"Validated ID trabaja en #EBSI para la identidad digital soberana en Europa. Esta iniciativa conjunta dentro del proyecto EBSI (The European Blockchain Services Infrastructure) avanza con el objetivo de que en 2022 Europa tenga su ID soberana basada en #blockchain. \n\nGracias a ello, cada ciudadano tendrá poder sobre sus datos y los podrá reunir todos (identidad, permiso de conducir, de estudios, salud o financieros) en una cartera digital.\n\nSigue leyendo: http://ow.ly/ihnf30qkQ5D\n\n#ViDchainIDwallet #CarteraViDchain #Blockchain #IdentidadDigital #VIDchain","images":["https://archive.org/download/validatedid-facebook-media/3021921901166015.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1582715820"},{"anchor":"fb-1582711691","date":"26/02/2020","year":"2020","lang":"ES","type":"photo","text":"Hoy elEconomista.es, en su especial #TICInnova, publica una buena entrevista sobre Validated ID y nuestro trabajo en la firma electrónica y en las identidades soberanas #SSI\n¡Gracias! https://lnkd.in/g_9VCxH\n\nCC Santi Casas, Jaume Fuentes, Ivan Basart y Fernando Pino #VIDsigner #VIDchain","images":["https://archive.org/download/validatedid-facebook-media/3021819534509585.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1582711691"},{"anchor":"fb-1582632316","date":"25/02/2020","year":"2020","lang":"EN","type":"photo","text":"Glad to share with you that our joint project with Universitat Rovira i Virgili - URV for LEDGER on how to link digital identities (SSI) with Open ID has been selected for the next phase! \n\nMoving forward to the final phase with up to €200K in funding cc NGI - The Next Generation Internet #DSMeu European Commission \nhttps://www.ngi.eu/opencalls/ledger/\n\n#NextGenerationInternet #venturebuilder #equityfree #humancentric solutions using #decentralized #technologies blockchain DLT #peertopeer #datagovernance #privacybydesign #citizendatagovernance","images":["https://archive.org/download/validatedid-facebook-media/3019893311368874.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1582632316"},{"anchor":"fb-1582626244","date":"25/02/2020","year":"2020","lang":"ES","type":"photo","text":"27 de febrero en el COIIB. Colegio de Ingenieros Industriales de Bizkaia te invitamos a la jornada ¨Innovación y Digitalización de la AAPP en País Vasco¨. \n\nEl ponente Manu Roibal hablará sobre innovación y digitalización en el Ayuntamiento de Bilbao, y participaremos junto a José Luís Olabarri de Ibermática, Gfi España y Esri. Nuestro compañero Xabier Martínez compartirá la solución de #FirmaElectronica de VIDsigner para solucionar la atención presencial al ciudadano y las actuaciones en movilidad para una AAPP 100% digital. \n\nInscríbete: http://ow.ly/vstD30qhli1 \n\n#AAPP #FirmaElectronica #VIDsigner #AdministraciónPublica #FirmaDigital #Ley392015","images":["https://archive.org/download/validatedid-facebook-media/3019747168050155.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1582626244"},{"anchor":"fb-1582548014","date":"24/02/2020","year":"2020","lang":"EN","type":"video","text":"What a great last week in Frankfurt at #FutureCongress together with our partner Optanium Group \nMany interesting conversations with clients and interested in digitization. We are glad to see that Germany is starting to move towards a digital future!\n\nBig thanks to Marcel Nebel and Richard Kirchberg at Optanium for having us and \nshowcasing our integrated solution!\n\nCc Carlos Romero","images":[],"video":{"embed_url":"https://archive.org/embed/validatedid-facebook-media/1927387907386467. rl":null,"pageRef":"facebook.html#fb-1454184369"},{"anchor":"fb-1454092365","date":"29/01/2016","year":"2016","lang":"ES","type":"photo","text":"Últimos días de nuestra oferta #ViDSigner\nPrueba la #firmabiométrica de ViDSigner y no dejes que ni un solo papel te aparte nunca más de lo realmente importante...hasta el 31 Enero Alta Gratis y primer mes de prueba gratis!!\nwww.validatedid.com/vidclinicas","images":["https://archive.org/download/validatedid-facebook-media/1128406570517567.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1454092365"},{"anchor":"fb-1454010960","date":"28/01/2016","year":"2016","lang":"ES","type":"photo","text":"Hoy es el #Díadelaproteccióndedatos \n¿Cuál es el nivel de #ciberseguridad de tu empresa?\nhttp://www.ticbeat.com/seguridad/cual-es-el-nivel-de-ciberseguridad-de-tu-empresa/","images":["https://archive.org/download/validatedid-facebook-media/1127879330570291.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1454010960"},{"anchor":"fb-1453925882","date":"27/01/2016","year":"2016","lang":"PT","type":"photo","text":"Incibe publica un ‘ranking’ de los principales incidentes de #ciberseguridad en 2015\nhttp://www.redseguridad.com/actualidad/info-tic/incibe-publica-un-ranking-de-los-principales-incidentes-de-ciberseguridad-en-2015","images":["https://archive.org/download/validatedid-facebook-media/1127423947282496.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1453925882"},{"anchor":"fb-1453930875","date":"27/01/2016","year":"2016","lang":"ES","type":"photo","text":"Yahoo realiza la mayor publicación de datos de la historia para ayudar a la ciencia http://bit.ly/1Sk53Xn\n\nSe trata de la mayor publicación de datos de la historia, poniendo a disposición de la comunidad científica y técnica más de 110.000 millones de registros (acciones e interacciones con los servicios de la empresa). \n\n#innovación  #ciencia  #tecnología","images":["https://archive.org/download/validatedid-facebook-media/1127452067279684.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1453930875"},{"anchor":"fb-1453827310","date":"26/01/2016","year":"2016","lang":"ES","type":"photo","text":"¿Qué presencia tiene la mujer en las empresas tecnológicas?\nhttp://bit.ly/1KCuFso\n\nLa participación de la mujer en al empresa tecnológica supone un mayor retorno de la inversión y aporta un 12% más de beneficio que las lideradas por hombres. Sin embargo, todavía hay una brecha muy grande en este sector, donde el hombre sigue siendo el género más presente, con diferencia\n#mujer  #tecnología","images":["https://archive.org/download/validatedid-facebook-media/1126803227344568.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1453827310"},{"anchor":"fb-1453838217","date":"26/01/2016","year":"2016","lang":"ES","type":"photo","text":"#ViDSigner no sólo es una solución de #firmaelectrónica ideal para el sector #Salud, también para administración pública, recursos humanos, distribución...\nPara más información:\nwww.validatedid.com\nSi tienes una #clínica aquí www.validatedid.com/vidclinicas","images":["https://archive.org/download/validatedid-facebook-media/1126852024006355.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1453838217"},{"anchor":"fb-1453749507","date":"25/01/2016","year":"2016","lang":"ES","type":"photo","text":"La UE ultima la aprobación de la Directiva de #ciberseguridad.\nLa norma, pendiente de aprobación en la Eurocámara, dicta medidas de prevención y respuesta ante los ciberataques\nhttp://www.eleconomista.es/legislacion/noticias/7301026/01/16/La-UE-ultima-la-aprobacion-de-la-Directiva-de-ciberseguridad.html","images":["https://archive.org/download/validatedid-facebook-media/1126342487390642.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1453749507"},{"anchor":"fb-1453664880","date":"24/01/2016","year":"2016","lang":"ES","type":"photo","text":"#ViDSigner es la solución de #firmaelectrónica manuscrita que se integra con tu software de gestión clínica.\nEstos son nuestros partners tecnológicos.\nhttp://www.validatedid.com/#partners\n#salud #AdministraciónPública #RRHH #Distribución","images":["https://archive.org/download/validatedid-facebook-media/1125769704114587.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1453664880"},{"anchor":"fb-1453584682","date":"23/01/2016","year":"2016","lang":"ES","type":"photo","text":"Avances en gestión clínica: El futuro de las historias clínicas electrónicas son las apps  http://sco.lt/8fzQWX \n\nLa adopción de la #HCE ha ido en aumento constante a lo largo de la última década hasta configurarse en un pilar de la práctica sanitaria moderna. Pese a su aumento, la satisfacción con los sistemas de HCE ha empezado a dar señales de alarma en el contexto americano, tal como recoge el estudio Medscape EHR 2014.\n\nLos resultados muestran déficits de las HCE en tres grandes ámbitos: usabilidad, interoperabilidad y privacidad.","images":["https://archive.org/download/validatedid-facebook-media/1125307837494107.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1453584682"},{"anchor":"fb-1453491900","date":"22/01/2016","year":"2016","lang":"ES","type":"photo","text":"Recuerda!! \nHemos prorrogado nuestra oferta hasta el 31 de Enero.\nSolicita tu prueba gratis, #ViDSigner la solución de #firmaelectrónica manuscrita que se integra con tu software de gestión clínica.\nwww.validatedid.com/vidclinicas","images":["https://archive.org/download/validatedid-facebook-media/1124765054215052.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1453491900"},{"anchor":"fb-1453369184","date":"21/01/2016","year":"2016","lang":"ES","type":"photo","text":"#ViDSigner: la reinvención de la #firmaelectrónica","images":["https://archive.org/download/validatedid-facebook-media/1124024220955802.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1453369184"},{"anchor":"fb-1453406100","date":"21/01/2016","year":"2016","lang":"ES","type":"photo","text":"¿Debería regularse la protección de datos médicos obtenidos a través de apps y wearables?\nhttp://www.comparteinnovacion.philips.es/tendencias-en-salud/articulos/deberia-regularse-la-proteccion-de-datos-medicos-obtenidos-a-traves-de-apps-y-wearables\nResulta de gran importancia poder recabar toda la información posible proveniente de hospitales o centros de salud. Sin embargo, el dilema surge cuando hablamos de datos referentes a la salud de personas; información que en ocasiones es susceptible de divulgación y que es parte de la vida privada.\n#ciberseguridad #bigdata #innovación","images":["https://archive.org/download/validatedid-facebook-media/1124256757599215.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1453406100"},{"anchor":"fb-1453321545","date":"20/01/2016","year":"2016","lang":"ES","type":"photo","text":"OpenMind se hace eco del lado más humano de los avances tecnológicos médicos durante 2015\nhttp://bancaresponsable.com/openmind-divulgacion-medicina-2015/\n#innovación #Tecnología","images":["https://archive.org/download/validatedid-facebook-media/1123761710982053.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1453321545"},{"anchor":"fb-1453233919","date":"19/01/2016","year":"2016","lang":"ES","type":"photo","text":"#ViDSigmer #FirmaBiométrica disponible en #IpadPro, #Surface4Pro y #NotePro.\nEn la foto Santi Casas, CEO Validated ID con los tres modelos.\nVisita www.validatedid.com para más información.\nOferta especial hasta fin de mes sector #Salud www.validatedid.com/vidclinicas","images":["https://archive.org/download/validatedid-facebook-media/1123210317703859.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1453233919"},{"anchor":"fb-1453145700","date":"18/01/2016","year":"2016","lang":"ES","type":"photo","text":"OLVÍDATE DE LOS PAPELES EN TU CLÍNICA\nPrueba la firma biométrica de ViDSigner y no dejes que ni un solo papel te aparte nunca más de lo realmente importante.\nAlta Gratis y primer mes de prueba gratis!!*\n*Promoción prorrogada hasta 31 Enero 2016!!\nww
