<style>

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  [hidden] { display: none !important; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #151A35;
    color: #ccd6f6;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: #0d1229;
    border-bottom: 3px solid #00BF71;
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo-area { display: flex; align-items: center; gap: 0.5rem; }
  .logo-image { height: 30px; width: auto; display: block; }
  .header-subtitle { font-size: 0.85rem; color: #8892b0; margin-left: 0.5rem; }

  .header-network-nav { margin-left: auto; display: flex; gap: 0.5rem; }
  .header-network-btn {
    background: transparent;
    border: 1px solid #2a3a5a;
    color: #ccd6f6;
    border-radius: 6px;
    padding: 0.35rem 0.7rem;
    font-size: 0.8rem;
    font-weight: 700;
    cursor: pointer;
    text-decoration: none;
  }
  .header-network-btn:hover { border-color: #00BF71; color: #00BF71; }
  .header-network-btn.active {
    background: #00BF71; border-color: #00BF71; color: #0d1229; cursor: default;
  }

  .layout { display: flex; flex: 1; min-height: 0; }

  .sidebar {
    width: 220px; min-width: 220px;
    background: #0d1229;
    padding: 1.5rem 1rem;
    position: sticky;
    top: 67px;
    height: calc(100vh - 67px);
    overflow-y: auto;
    border-right: 1px solid #2a3a5a;
  }

  .filter-section { margin-bottom: 1.5rem; }
  .filter-title {
    font-size: 0.7rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1px;
    color: #00BF71; margin-bottom: 0.6rem;
  }
  .checkbox-label {
    display: flex; align-items: center; gap: 0.5rem;
    padding: 0.3rem 0; cursor: pointer;
    font-size: 0.88rem; color: #ccd6f6; user-select: none;
  }
  .checkbox-label:hover { color: #fff; }
  .checkbox-label input[type=checkbox] {
    accent-color: #00BF71; width: 14px; height: 14px; cursor: pointer;
  }
  .clear-btn {
    width: 100%; background: transparent;
    border: 1px solid #2a3a5a; color: #8892b0;
    padding: 0.4rem 0.8rem; border-radius: 4px;
    cursor: pointer; font-size: 0.82rem; margin-top: 0.5rem; transition: all 0.2s;
  }
  .clear-btn:hover { border-color: #00BF71; color: #00BF71; }

  main { flex: 1; padding: 1.5rem; overflow-y: auto; min-width: 0; }

  .results-bar { font-size: 0.85rem; color: #8892b0; margin-bottom: 1rem; }
  .results-bar span { color: #00BF71; font-weight: 700; }

  .badge {
    font-size: 0.68rem; font-weight: 600;
    padding: 0.12rem 0.45rem; border-radius: 3px; white-space: nowrap;
  }
  .badge-year { background: #00BF71; color: #0d1229; }

  footer {
    background: #0d1229; border-top: 1px solid #2a3a5a;
    text-align: center; padding: 1rem; font-size: 0.8rem; color: #8892b0;
  }
  footer a { color: #00BF71; text-decoration: none; }


  .post-card {
    background: #1e2a4a;
    border: 1px solid #2a3a5a;
    border-radius: 8px;
    padding: 1rem 1.1rem;
    margin-bottom: 1rem;
    transition: border-color 0.15s;
    scroll-margin-top: 80px;
  }
  .post-card:hover { border-color: #3a4a6a; }
  .post-card.highlighted {
    border-color: #00BF71;
    box-shadow: 0 0 0 2px rgba(0,191,113,0.2);
  }

  .post-header {
    display: flex; align-items: center; gap: 0.5rem;
    margin-bottom: 0.6rem; flex-wrap: wrap;
  }
  .post-date { font-size: 0.78rem; color: #8892b0; }

  .badge-type {
    font-size: 0.68rem; font-weight: 600;
    padding: 0.12rem 0.45rem; border-radius: 3px;
    background: #2a3a5a; color: #ccd6f6;
    border: 1px solid #3a4a6a;
  }

  /* ── LAYOUT POST: text esquerra / media dreta ── */
  .post-body {
    display: flex;
    gap: 1rem;
    align-items: flex-start;
  }
  .post-text-col {
    flex: 1;
    min-width: 0;
  }
  .post-media-col {
    flex: 0 0 260px;
    width: 260px;
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }

  .post-text {
    font-size: 0.88rem; color: #ccd6f6;
    line-height: 1.55; white-space: pre-wrap;
    word-break: break-word; margin-bottom: 0.4rem;
  }
  .post-text.no-text { color: #4a5a7a; font-style: italic; }

  /* Imatges dins la columna de media */
  .post-img-wrap {
    position: relative; cursor: pointer;
    border-radius: 6px; overflow: hidden;
    border: 1px solid #2a3a5a; width: 100%;
  }
  .post-img-wrap img {
    width: 100%; height: 180px; object-fit: cover;
    display: block; transition: opacity 0.3s;
  }
  .post-img-wrap img.loading { opacity: 0; }
  .post-img-wrap:hover img { opacity: 0.85; }

  /* VÍDEO */
  .post-video-wrap {
    position: relative; cursor: pointer;
    border-radius: 6px; overflow: hidden;
    border: 1px solid #2a3a5a; width: 100%;
  }
  .post-video-wrap img {
    width: 100%; height: 160px; object-fit: cover;
    display: block; transition: opacity 0.3s;
  }
  .post-video-wrap img.loading { opacity: 0; }
  .post-video-wrap:hover img { opacity: 0.75; }
  .video-play-btn {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 52px; height: 52px; border-radius: 50%;
    background: rgba(0,191,113,0.85);
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .video-play-btn::after {
    content: '';
    border-style: solid;
    border-width: 10px 0 10px 18px;
    border-color: transparent transparent transparent #0d1229;
    margin-left: 3px;
  }
  .video-title {
    font-size: 0.75rem; color: #8892b0;
    padding: 0.4rem 0.5rem;
    background: #0d1229; border-top: 1px solid #2a3a5a;
  }

  /* LIGHTBOX VÍDEO */
  .lb-video-wrap {
    width: min(860px, 90vw);
    aspect-ratio: 16/9;
  }
  .lb-video-wrap iframe {
    width: 100%; height: 100%; border: none; border-radius: 4px;
  }

  .img-count-badge {
    position: absolute; bottom: 6px; right: 6px;
    background: rgba(0,0,0,0.75); color: #fff;
    font-size: 0.7rem; font-weight: 700;
    padding: 0.1rem 0.4rem; border-radius: 3px;
  }

  .imatges-link {
    display: inline-block; margin-top: 0.5rem;
    font-size: 0.75rem; color: #00BF71; text-decoration: none;
    opacity: 0.7;
  }
  .imatges-link:hover { opacity: 1; }

  /* PAGINACIÓ */
  .pagination {
    display: flex; align-items: center; justify-content: center;
    gap: 0.5rem; padding: 1.5rem 0; flex-wrap: wrap;
  }
  .page-btn {
    background: transparent; border: 1px solid #2a3a5a;
    color: #ccd6f6; border-radius: 6px;
    padding: 0.35rem 0.7rem; font-size: 0.85rem;
    cursor: pointer; transition: all 0.2s; min-width: 36px;
  }
  .page-btn:hover { border-color: #00BF71; color: #00BF71; }
  .page-btn.active { background: #00BF71; border-color: #00BF71; color: #0d1229; font-weight: 700; }
  .page-btn:disabled { opacity: 0.3; cursor: default; }
  .page-info { font-size: 0.82rem; color: #8892b0; padding: 0 0.5rem; }

  /* LIGHTBOX */
  .lightbox {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.92); z-index: 1000;
    align-items: center; justify-content: center;
    flex-direction: column; padding: 2rem;
  }
  .lightbox.open { display: flex; }
  .lightbox img {
    max-width: 90vw; max-height: 78vh; object-fit: contain;
    border-radius: 4px; box-shadow: 0 0 60px rgba(0,0,0,0.8);
  }
  .lightbox-meta { margin-top: 1rem; text-align: center; max-width: 600px; }
  .lightbox-date { font-size: 0.8rem; color: #00BF71; font-weight: 700; margin-bottom: 0.4rem; }
  .lightbox-caption { font-size: 0.88rem; color: #ccd6f6; line-height: 1.5; }
  .lightbox-close {
    position: absolute; top: 1.5rem; right: 1.5rem;
    background: transparent; border: none; color: #ccd6f6;
    font-size: 2rem; cursor: pointer; line-height: 1;
  }
  .lightbox-close:hover { color: #00BF71; }
  .lightbox-nav {
    position: absolute; top: 50%; transform: translateY(-50%);
    background: rgba(255,255,255,0.1); border: none; color: #fff;
    font-size: 2rem; cursor: pointer; padding: 0.5rem 0.8rem; border-radius: 4px;
  }
  .lightbox-nav:hover { background: rgba(0,191,113,0.3); }
  .lightbox-prev { left: 1rem; }
  .lightbox-next { right: 1rem; }

  @media (max-width: 900px) {
    .post-body { flex-direction: column; }
    .post-media-col { flex: none; width: 100%; flex-direction: row; flex-wrap: wrap; }
    .post-img-wrap { flex: 1; min-width: 140px; }
    .post-video-wrap { flex: 1; min-width: 200px; }
  }
  @media (max-width: 700px) {
    .sidebar { display: none; }
  }
</style>

<script>
const POSTS = [{"anchor":"fb-1764765528","date":"03/12/2025","year":"2025","lang":"ES","type":"photo","text":"𝗚𝗿𝗮𝗰𝗶𝗮𝘀 𝗽𝗼𝗿 𝗮𝗰𝗼𝗺𝗽𝗮ñ𝗮𝗿𝗻𝗼𝘀 𝗲𝗻 𝗲𝘀𝘁𝗲 𝗽𝗲𝗿𝗳𝗶𝗹 𝗱𝘂𝗿𝗮𝗻𝘁𝗲 𝘁𝗼𝗱𝗼 𝗲𝘀𝘁𝗲 𝘁𝗶𝗲𝗺𝗽𝗼. 💚 \nAhora damos un paso adelante y centralizamos toda la información en Signaturit.\n\n📌 Allí compartiremos noticias, eventos, webinars, contrataciones y novedades de producto. ¿Te vienes con nosotros?\n\n👉 Sigue la cuenta oficial de Signaturit y no te pierdas nada.","images":["https://archive.org/download/validatedid-facebook-media/1441424317988934.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1764765528"},{"anchor":"fb-1761486291","date":"26/10/2025","year":"2025","lang":"EN","type":"photo","text":"With Signaturit – I just got recognised as one of their top fans! 🎉","images":["https://archive.org/download/validatedid-facebook-media/1407449501386416.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1761486291"},{"anchor":"fb-1759237778","date":"30/09/2025","year":"2025","lang":"ES","type":"multiPhoto","text":"🚨 ¡Atención, seguidores de #ValidatedID!\n\nSeguimos compartiendo contenido de valor... pero desde una nueva casa.\nTodas nuestras novedades, actualizaciones de producto y noticias de empresa las publicamos ahora en 👉 Signaturit\n\n🔔 #OpenBanking, #WeAreHiring, #Webinars, #Eventos, #ActualizacionesPartners…\nSon solo algunos de los temas que ya estamos compartiendo. ¿Los has visto?\n\n¡No te pierdas nada — síguenos y mantente al día! 💡\n\n#SignaturitGroup #DigitalTrust #FirmaElectrónica #TechUpdates #ValidatedID","images":["https://archive.org/download/validatedid-facebook-media/1381491897315510.jpg","https://archive.org/download/validatedid-facebook-media/1381491883982178.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1759237778"},{"anchor":"fb-1758193971","date":"18/09/2025","year":"2025","lang":"ES","type":"photo","text":"📢 ¡Cambio importante!\nA partir de ahora, todas las noticias y contenidos de Validated ID estarán centralizadas en las redes de #SignaturitGroup.\nNo te pierdas novedades, lanzamientos y mucho más.\n\nDale like y síguenos aquí 👉 Signaturit Group Facebook\n\n#ValidatedID #SignaturitGroup #Novedades","images":["https://archive.org/download/validatedid-facebook-media/1369975175133849.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1758193971"},{"anchor":"fb-1748255342","date":"26/05/2025","year":"2025","lang":"ES","type":"multiPhoto","text":"📸 Momentos destacadoss de la Asamblea General del European Wallet Consortium #EWC25# en Estocolmo.\n\nLa semana pasada, nuestros compañeros Ivan Basart y Andreas Abraham representaron a Validated ID en el encuentro anual del #EWC — un espacio inspirador para la colaboración y el avance del futuro de la identidad digital en Europa 🇪🇺.\n\nDesde marcos de confianza hasta la interoperabilidad de las carteras, estamos orgullosos de contribuir a construir un ecosistema EUDI Wallet seguro y centrado en el usuario.\n\n💡 ¡Grandes conversaciones, grandes mentes y una visión compartida de lo que viene!\n\n#signaturitgroup #EWC #EUDIWallet #IdentidadDigital #eIDAS2 #ValidatedID #VIDwallet #EWCAssembly #Innovación #Estocolmo","images":["https://archive.org/download/validatedid-facebook-media/1268362791961755.jpg","https://archive.org/download/validatedid-facebook-media/1268362815295086.jpg","https://archive.org/download/validatedid-facebook-media/1268362801961754.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1748255342"},{"anchor":"fb-1747206798","date":"14/05/2025","year":"2025","lang":"ES","type":"video","text":"Es oficial! La adquisición de Validated ID ha sido aprobada y el acuerdo definitivo se firmó. 🔏 Desde Validated ID nos unimos con entusiasmo a Signaturit Group para seguir construyendo juntos el futuro de la identidad digital y la confianza electrónica en #Europa.\n\n¡Estamos listos para crecer más fuertes, juntos! 💙\n#ValidatedID #SignaturitGroup #OneTeam","images":[],"video":{"embed_url":"https://archive.org/embed/validatedid-facebook-media/2119613878502630.mp4?ui-theme=dark","thumbnail_url":"https://archive.org/download/validatedid-facebook-media/2119613878502630.mp4.thumbs/2119613878502630.mp4_000001.jpg","title":"Es oficial! La adquisición de Validated ID ha sido aprobada y el acuerdo definitivo se firmó. 🔏 Desde Validated ID nos unimos con entusiasmo a Signaturit Group para seguir construyendo juntos el futuro de la identidad digital y la confianza electrónica en #Europa.\n\n¡Estamos listos para crecer más fuertes, juntos! 💙\n#ValidatedID #SignaturitGroup #OneTeam"},"url":null,"pageRef":"facebook.html#fb-1747206798"},{"anchor":"fb-1745917278","date":"29/04/2025","year":"2025","lang":"ES","type":"photo","text":"🚀 ¡Seguimos creciendo! En Validated ID damos la bienvenida a Almerimatik Sistemas Informáticos S.A. como nuevo #VIDpartner.\n\nUna empresa líder en soluciones tecnológicas integrales, especializada en sistemas informáticos, #ERP, #TPV, #gestiónpolicial, #videovigilancia, #ciberseguridad y mucho más.\n\nCon esta alianza, reforzamos nuestro compromiso de acercar la firma electrónica segura y la identidad digital a más sectores y empresas, de la mano de un partner con una sólida trayectoria en innovación tecnológica.\n\n🤝 ¡Bienvenidos a la familia VIDsigner!\n\n#ValidatedID #VIDsigner #VIDidentity #VIDpartner #FirmaElectrónica #IdentidadDigital #TransformaciónDigital #Almerimatik #Ciberseguridad #Innovación","images":["https://archive.org/download/validatedid-facebook-media/1246183500846351.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1745917278"},{"anchor":"fb-1744206770","date":"09/04/2025","year":"2025","lang":"ES","type":"multiPhoto","text":"🎤 ¡Recién salido del escenario en #DocuWorld2025!\nNuestro compañero Martí ha ofrecido una ponencia muy inspiradora titulada: Firmas electrónicas en el nuevo Reglamento Europeo, eIDAS 2\" ✍️🇪🇺\n\nCon la llegada del #eIDAS2 , los servicios de confianza y la identidad digital cobran un papel protagonista en la transformación digital europea. Martí ha explicado cómo las firmas electrónicas cualificadas y las carteras digitales (EUDI Wallets) serán elementos clave en este nuevo ecosistema de transacciones digitales seguras y transfronterizas.\n\nMuchas gracias a DocuWare  por organizar este gran evento anual para partners y por seguir impulsando un futuro digital más seguro y eficiente. 💙\n\n💬 ¿No pudiste asistir? ¡Hablemos! Estaremos encantados de compartir los principales aprendizajes.\n\n#ValidatedID #VIDsigner #VIDwallet #VIDidentity #eIDAS2 #DocuWorld #IdentidadDigital #FirmaElectrónica #TransformaciónDigital #EUDIwallet #EUwallet","images":["https://archive.org/download/validatedid-facebook-media/1227424252722276.jpg","https://archive.org/download/validatedid-facebook-media/1227424466055588.jpg","https://archive.org/download/validatedid-facebook-media/1227424446055590.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1744206770"},{"anchor":"fb-1744190333","date":"09/04/2025","year":"2025","lang":"ES","type":"multiPhoto","text":"🇩🇪 ¡Saludos desde #Berlín!\nNuestro equipo — Santi, Jordi, Carlota, Cedric y Martí — está presente en #DocuWorld2025, el evento anual de partners organizado por DocuWare 🙌\n\nHoy arranca una jornada llena de innovación, colaboración y transformación digital. Estamos encantados de conectar con toda la comunidad de #DocuWare y de compartir cómo Validated ID aporta confianza, identidad digital y firma electrónica segura al ecosistema. 🖊️🔐\n\n👋 Ven a visitarnos, salúdanos y hablemos sobre el futuro de los flujos digitales seguros.\n\n#ValidatedID #VIDsigner #VIDidentity #IdentidadDigital #FirmaElectrónica #Berlín2025","images":["https://archive.org/download/validatedid-facebook-media/1227209492743752.jpg","https://archive.org/download/validatedid-facebook-media/1227209476077087.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1744190333"},{"anchor":"fb-1744031426","date":"07/04/2025","year":"2025","lang":"ES","type":"photo","text":"DICE Ecosystem 2025: Construyendo el futuro de la identidad digital 🔐✨ #TrustSquare organizo uno de los eventos más innovadores sobre identidad digital descentralizada, y en Validated ID hemos tenido el honor de patrocinar, participar y compartir nuestra visión. 💬🌍\n\nDesde el reglamento #eIDAS2 hasta los retos de interoperabilidad, credenciales verificables y casos de uso reales: DICE Ecosystem ha puesto el foco en lo que realmente importa para construir el futuro de la identidad digital en Europa.\n\n¿Qué lo hizo diferente?\n✅ Sesiones lideradas por los propios asistentes (formato unConference)\n✅ Debates sobre EUDI Wallet, SwissID, ZKP y privacidad\n✅ Casos de uso concretos y desafíos clave de adopción\n\nEn este artículo te contamos por qué la interoperabilidad es clavey vómo la privacidad y el control del usuario están marcando la evolución 👉 https://www.validatedid.com/es/blog/post/dice-ecosystem-2025-building-the-future-of-digital-identity\n\n#IdentidadDigital #VIDwallet #VIDidentoty #EUDIwallet #EUwallet #CredencialesVerificables #Interoperabilidad #DICE2025 #WalletDigital #TrustedData #ValidatedID #SSI #PrivacidadDigital","images":["https://archive.org/download/validatedid-facebook-media/1225360956261939.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1744031426"},{"anchor":"fb-1743592593","date":"02/04/2025","year":"2025","lang":"ES","type":"photo","text":"🔐 El futuro de la identidad digital es offline.\nDamos la bienvenida a #ProximityFlow en #VIDwallet: verificación de identidad sin conexión, segura y totalmente sin internet. 🚫🌐\n\nDesde abrir puertas hasta alquilar coches, usar máquinas expendedoras o hacer check-in en hoteles — la identidad está en todas partes. Pero… ¿y si pudieras verificarla en tiempo real, de forma directa y sin necesidad de conexión?\n\n🚀 Nuevo blog: 📲 Descubre cómo Proximity Flow en #VIDwallet está habilitando potentes casos de uso reales, basado en el estándar ISO 18013-5 mDL y alineado con #eIDAS2.\n\n👉 Aprende cómo funciona, dónde se aplica y por qué es un avance clave para el futuro de la identidad segura y centrada en la privacidad.\n\n🔎 Léelo aquí: https://lnkd.in/dEsVQEEn \n🎥 ¡No te pierdas el vídeo demo incluido!\n\n#IdentidadDigital #ProximityFlow #VerificaciónOffline #eIDAS2 #VIDwallet #CredencialesVerificables #LicenciaConducirMóvil #ValidatedID","images":["https://archive.org/download/validatedid-facebook-media/1220265220104846.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1743592593"},{"anchor":"fb-1742891032","date":"25/03/2025","year":"2025","lang":"ES","type":"photo","text":"🚀 ¡Llega la era de los wallets de identidad digital! ¿Estás preparado? Este jueves en #CNIS2025, hablaremos sobre el despliegue del nuevo modelo de identidad digital impulsado por el reglamento #eIDAS2, que marca un antes y un después en la forma en que ciudadanos y administraciones gestionan la identidad. \n\n🗓️ JUEVES 27 de marzo 2025\n 🕔 17:20 - 18:00 h\n 📍 Sala 7 | TransformAAPP — CNIS 2025, #Madrid\nAgenda - https://lnkd.in/dth-KJxv\n\nEn esta sesión, tres actores clave compartirán visión y experiencia:\n 🔹 #ValidatedID, con una visión del momento actual del despliegue de wallets.\n 🔹 #AOC - Open Government of Catalonia, presentando el proyecto #IdCAT Wallet, alineado con eIDAS2.\n 🔹 #Peakway, explorando casos de uso reales para administraciones locales.\n\n👉 ¡No te lo pierdas! La identidad digital descentralizada ya está aquí, y está transformando la relación entre el ciudadano y lo público.\n\n#CNIS25 #AAPP #IdentidadDigital #CarteraIdentidadDigital #EUWallet #EUDIwallet #AdministraciónPública #VIDwallet #VIDidentity","images":["https://archive.org/download/validatedid-facebook-media/1212669620864406.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1742891032"},{"anchor":"fb-1742821321","date":"24/03/2025","year":"2025","lang":"ES","type":"photo","text":"📢 [WEBINAR] Claves para el cumplimiento legal en los procesos de #RRHH \n🔐 Evita sanciones y optimiza la gestión de:\n ✔️ Firma de contratos\n ✔️ Gestión de nóminas\n ✔️ Otros procesos exigidos por la ley\n\nNo te pierdas esta formación práctica gratuita organizada por nuestro partner #Yunbit. Inscríbete aquí: https://lnkd.in/dicecGuM\n\n🗓 Fecha: 3 de abril de 2025\n 🕛 Hora: 12:00h CET\n🎙️ Ponentes: Juan Conde CEO en Yunibit y Fernando Pino, CLO & Co-Fundador en Validated ID\n\n🎯 ¡Una oportunidad para mejorar competencias digitales y transformar tus procesos de RRHH con seguridad legal!","images":["https://archive.org/download/validatedid-facebook-media/1211952784269423.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1742821321"},{"anchor":"fb-1742223370","date":"17/03/2025","year":"2025","lang":"ES","type":"multiPhoto","text":"⚖️ [COMPLIANCE] ¡Nuevos logros en seguridad y cumplimiento en Validated ID! 🔐 Porque nuestro mayor valor es tu tranquilidad, seguimos elevando nuestros estándares en seguridad y confianza digital.\n\n✅ Ahora contamos con la certificación #ENS de #NivelAlto 🚀 garantizando la máxima protección en entornos críticos, especialmente en el sector público. \n✅ Hemos completado la transición a la #ISO27001:2022, asegurando que nuestra gestión de seguridad de la información cumple con las normativas más exigentes a nivel internacional.\n\n💡 Más seguridad, más confianza, más tranquilidad para ti. \n\nSeguimos trabajando para ofrecer soluciones de firma electrónica e identidad digital con los mayores estándares de seguridad y confianza. 💪 \n\n#ENS #ISO27001 #Seguridad #Compliance #ConfianzaDigital #IdentidadDigital #FirmaElectrónica #ValidatedID","images":["https://archive.org/download/validatedid-facebook-media/1205810914883610.jpg","https://archive.org/download/validatedid-facebook-media/1205811028216932.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1742223370"},{"anchor":"fb-1741804005","date":"12/03/2025","year":"2025","lang":"CA","type":"photo","text":"Signatura amb #VIDsigner de l'acord pels governs locals intel·ligents al #CGD2025","images":["https://archive.org/download/validatedid-facebook-media/1201614658636569.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1741804005"},{"anchor":"fb-1741792211","date":"12/03/2025","year":"2025","lang":"ES","type":"multiPhoto","text":"✅ VIDsigner BIO, clave en el acto de firma del Acuerdo Institucional 🔏 en el Congrés Govern Digital 2025 #CGD2025\n\nHoy, gracias a #VIDsignerBIO, se ha firmado de manera digital, segura y con plena validez legal el Acuerdo Institucional para promover Gobiernos Locales Inteligentes. \n\nEste compromiso, respaldado por líderes del ámbito público, busca mejorar los servicios públicos mediante el uso de datos e inteligencia artificial, impulsando la transformación digital en la administración. \n\nLa firma de representantes clave del ámbito público: \n#AyuntamientoBarcelona  Diputació de Barcelona  Generalitat de Catalunya #diputaciódeTarragona #diputaciógirona  #diputacionlleida #AOC \n\nCon VIDsigner BIO, seguimos facilitando procesos digitales seguros y eficientes para la administración. \n\n#Peakway #ValidatedID #VIDsigner #FirmaElectronica #GobiernoInteligente #GovernDigital #FirmaBiometrica #AAPP cc Signaturit","images":["https://archive.org/download/validatedid-facebook-media/1201487025315999.jpg","https://archive.org/download/validatedid-facebook-media/1201486995316002.jpg","https://archive.org/download/validatedid-facebook-media/1201487008649334.jpg","https://archive.org/download/validatedid-facebook-media/1201487068649328.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1741792211"},{"anchor":"fb-1741186098","date":"05/03/2025","year":"2025","lang":"ES","type":"multiPhoto","text":"📢 ¡Grandes noticias desde el #MWC25!  \n\nNuestro compañero y estrella de ponencias Ivan Basart  ha representado a Validated ID en el Pabellón de España, presentando el futuro de la #identidaddigital en la UE con la #EUDIwallet. 🌍🔐  \n\nUn paso clave hacia una identidad digital más segura, interoperable y accesible para todos los ciudadanos europeos. ¡Orgullosos de formar parte de esta revolución! 🚀  \n\n#DigitalIdentity #EUDIWallet #redes #InnovaciónEuropea #eidas2 #VIDidentity #SpainMWC","images":["https://archive.org/download/validatedid-facebook-media/1194867355977966.jpg","https://archive.org/download/validatedid-facebook-media/1194867412644627.jpg","https://archive.org/download/validatedid-facebook-media/1194867379311297.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1741186098"},{"anchor":"fb-1741084341","date":"04/03/2025","year":"2025","lang":"ES","type":"video","text":"🎥 ✨ ¡Validated ID en la pantalla grande de #MWC25 ! … Bueno, casi 😜  Si aún no has encontrado nuestro stand en MWC 2025, no te preocupes: te lo ponemos fácil. 📍 Estamos en Pabellón de España – Hall 4, Stand 14. 🚀\n\n📢 Spoiler alert: No hay alfombra roja, pero sí mucha innovación. \n\n#ValidatedID #MWC25 #SpainMWC25  #REDes #SpanishPavilion","images":[],"video":{"embed_url":"https://archive.org/embed/validatedid-facebook-media/608029562143047.mp4?ui-theme=dark","thumbnail_url":"https://archive.org/download/validatedid-facebook-media/608029562143047.mp4.thumbs/608029562143047.mp4_000001.jpg","title":"🎥 ✨ ¡Validated ID en la pantalla grande de #MWC25 ! … Bueno, casi 😜  Si aún no has encontrado nuestro stand en MWC 2025, no te preocupes: te lo ponemos fácil. 📍 Estamos en Pabellón de España – Hall 4, Stand 14. 🚀\n\n📢 Spoiler alert: No hay alfombra roja, pero sí mucha innovación. \n\n#ValidatedID #MWC25 #SpainMWC25  #REDes #SpanishPavilion"},"url":null,"pageRef":"facebook.html#fb-1741084341"},{"anchor":"fb-1741083241","date":"04/03/2025","year":"2025","lang":"ES","type":"multiPhoto","text":"🌍 📲  #MWC2025 – Día 2: Más innovación, más conexiones, más futuro! \n\nEl segundo día de MWC está en marcha y la energía en el Pabellón de España (Hall 4, Stand 14) sigue a tope. 🔥 🚀 \n\nHoy continuamos explorando cómo la #identidadDigital y la #firmaElectrónica están transformando los negocios, conectando con líderes del sector y descubriendo nuevas oportunidades.\n\n ¡Te esperamos! 🚀\n\n#MWC25 #SpainMWC25 #REDes #SpanishPavilion #DigitalIdentity #VIDsigner #VIDidentity #ValidatedID Signaturit","images":["https://archive.org/download/validatedid-facebook-media/1193762636088438.jpg","https://archive.org/download/validatedid-facebook-media/1193762596088442.jpg","https://archive.org/download/validatedid-facebook-media/1193762649421770.jpg","https://archive.org/download/validatedid-facebook-media/1193762689421766.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1741083241"},{"anchor":"fb-1740997375","date":"03/03/2025","year":"2025","lang":"EN","type":"multiPhoto","text":"🌍📲 MWC 2025 kicks off – Come say hi! 🚀\nThe first day of #MWC25 is here, and what better way to start than inviting you for a #coffee ☕ while we chat about the future of digital identity and e-signatures? 🔐📲 \n📍 Find us at the Spanish Pavilion – Hall 4, Stand 14\n\n☕ We’ll be waiting with coffee and great conversations!\n\n🔥 Cutting-edge technology, meaningful connections, and endless opportunities await. Are you ready?\n\n#MWC25 #SpainMWC25 #REDes #SpanishPavilion #DigitalIdentity #eSignatures #VIDidentity hashtag#VIDsigner #Networking #Innovation #ValidatedID Signaturit","images":["https://archive.org/download/validatedid-facebook-media/1192914922839876.jpg","https://archive.org/download/validatedid-facebook-media/1192914902839878.jpg","https://archive.org/download/validatedid-facebook-media/1192914929506542.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1740997375"},{"anchor":"fb-1740941934","date":"02/03/2025","year":"2025","lang":"","type":"photo","text":"Photos","images":["https://archive.org/download/validatedid-facebook-media/1192434256221276.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1740941934"},{"anchor":"fb-1738835106","date":"06/02/2025","year":"2025","lang":"ES","type":"photo","text":"📣 Noticias emocionantes: ¡Validated ID une fuerzas con Signaturit Group! Estamos orgullosos de compartir que Validated ID pasa a formar parte de la familia Signaturit Group. \n\nEste movimiento estratégico marca un importante paso adelante en nuestra misión de ofrecer soluciones de transacciones digitales seguras e innovadoras. Al unir fuerzas con Signaturit Group, combinamos nuestra experiencia para ofrecer soluciones aún más completas para potenciar la transformación digital en todo el mundo. \n\n🔗 Descubre más sobre esta emocionante asociación y nuestra visión de futuro aquí: https://www.validatedid.com/es/blog/post/validated-id-joins-signaturit-group-to-strengthen-leadership-in-trusted-electronic-services \n\n#IdentidadDigital #TransformaciónDigital #Innovación #LiderazgoEuropeo #ewallet #biometric","images":["https://archive.org/download/validatedid-facebook-media/1172429954888373.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1738835106"},{"anchor":"fb-1738056855","date":"28/01/2025","year":"2025","lang":"ES","type":"photo","text":"🏢 ¿Cómo #MSV optimizó la gestión inmobiliaria con firmas digitales? ✍️ En un sector tan dinámico como el inmobiliario, #MSVHousing logró transformar su gestión con la implementación de #VIDsigner, agilizando procesos y reduciendo tiempos. 🚀\n\nDescubre cómo lograron:\n✅ Simplificar la firma de documentos clave.\n✅ Mejorar la experiencia de los clientes.\n✅ Impulsar la sostenibilidad al reducir el uso de papel.\n\n💡 Lee el caso de éxito completo y descubre cómo llevar tu negocio al siguiente nivel 👉 https://www.validatedid.com/es/blog/post/msv-gestion-de-viviendas-optimizada-con-las-firmas-digitales-vidsigner\n\n#FirmaElectronica #ValidatedID  #CasoDeÉxito #TransformaciónDigital","images":["https://archive.org/download/validatedid-facebook-media/1165498328914869.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1738056855"},{"anchor":"fb-1736776298","date":"13/01/2025","year":"2025","lang":"ES","type":"photo","text":"Cuenta atrás 📅: ¡Menos de 2 meses para MWC 2025! 🗓️ del 3 al 6 de marzo\n¡Validated ID vuelve al Pabellón de España 🇪🇸 en el #MWC2025 ! 📍 PABELLÓN 4, Stand 14.\n\nPor tercer año consecutivo, hemos sido seleccionados por RED.es para mostrar nuestras soluciones #VIDidentity y #VIDsigner. No te pierdas la oportunidad de ver cómo estamos dando forma al futuro de #IdentidadDigital y #FirmaElectrónica. 🔐 ¡Nos vemos en el evento! 🚀🎉","images":["https://archive.org/download/validatedid-facebook-media/1153721636759205.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1736776298"},{"anchor":"fb-1734509487","date":"18/12/2024","year":"2024","lang":"ES","type":"video","text":"Halloween puede robar la Navidad, 🎅🏼🎄\npero nadie debe robar tu identidad. 🚫\nPorque lo auténtico es irrepetible, \ncuidamos lo que te hace único. 💚 \n\n¡Disfruta de unas fiestas sin estrés y seguras! 🌟\n\n#ValidatedID #VIDidentity #VIDsigner #FirmaElectrónica #IdentidadDigital","images":[],"video":{"embed_url":"https://archive.org/embed/validatedid-facebook-media/1098362935158523.mp4?ui-theme=dark","thumbnail_url":"https://archive.org/download/validatedid-facebook-media/1098362935158523.mp4.thumbs/1098362935158523.mp4_000001.jpg","title":"Halloween puede robar la Navidad, 🎅🏼🎄\npero nadie debe robar tu identidad. 🚫\nPorque lo auténtico es irrepetible, \ncuidamos lo que te hace único. 💚 \n\n¡Disfruta de unas fiestas sin estrés y seguras! 🌟\n\n#ValidatedID #VIDidentity #VIDsigner #FirmaElectrónica #IdentidadDigital"},"url":null,"pageRef":"facebook.html#fb-1734509487"},{"anchor":"fb-1734425731","date":"17/12/2024","year":"2024","lang":"ES","type":"video","text":"🎄 Al igual que Kevin protege su casa, nosotros protegemos tu identidad. 🔐  Porque lo auténtico es irrepetible, cuidamos lo que te hace único.💎 ¡Felices fiestas! \n\n#validatedID #VIDidentity #VIDsigner #Identidad #IdentidadDigital","images":[],"video":{"embed_url":"https://archive.org/embed/validatedid-facebook-media/2410878305955695.mp4?ui-theme=dark","thumbnail_url":"https://archive.org/download/validatedid-facebook-media/2410878305955695.mp4.thumbs/2410878305955695.mp4_000001.jpg","title":"🎄 Al igual que Kevin protege su casa, nosotros protegemos tu identidad. 🔐  Porque lo auténtico es irrepetible, cuidamos lo que te hace único.💎 ¡Felices fiestas! \n\n#validatedID #VIDidentity #VIDsigner #Identidad #IdentidadDigital"},"url":null,"pageRef":"facebook.html#fb-1734425731"},{"anchor":"fb-1733397030-1","date":"05/12/2024","year":"2024","lang":"ES","type":"none","text":"🚀 Gracias a #noticiasdependencia por mencionar a #Validated ID y #ADDInformática  ✨ Nos sentimos orgullosos de que nuestro acuerdo con ADD Informática, que integra las soluciones de firma electrónica #VIDsigner en el software de #ResiPlus® para la gestión de residencias, haya sido destacado.\n\nEsta integración refleja el impacto de nuestra tecnología en la digitalización del sector de la dependencia, mejorando la experiencia del cliente y asegurando la validez jurídica de cada firma electrónica. 🙌\n\nLee la noticia completa aquí: https://dependencia.info/noticia/7527/\n\n#FirmaElectrónica  #Residencias #Digitalización #ValidatedID #TransformaciónDigital","images":[],"video":null,"url":null,"pageRef":"facebook.html#fb-1733397030-1"},{"anchor":"fb-1733306233","date":"04/12/2024","year":"2024","lang":"ES","type":"photo","text":"[PRODUCT UPDATE] #VIDsignerRemote \n\n🚀 ¡El nuevo diseño de VIDsigner Remote ya está disponible!  🚀 \nGracias a los valiosos comentarios de nuestros usuarios durante la fase de producción, hemos logrado una interfaz más intuitiva y eficiente. Este lanzamiento es un paso clave en nuestra evolución, brindando una experiencia mejorada en la firma electrónica. \n\n#ValidatedID #VIDsigner #FirmaElectrónica #REdiseño #Remote #ProductUpdates","images":["https://archive.org/download/validatedid-facebook-media/1123272329804136.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1733306233"},{"anchor":"fb-1732791582","date":"28/11/2024","year":"2024","lang":"ES","type":"multiPhoto","text":"🚀 Gran jornada en Palma de Mallorca 🚀\n\nNuestro CEO, Santi Casas, y Pedro Huertas Platero, Account Manager, están hoy en #PalmaDeMallorca participando en un evento organizado por nuestro #VIDpartner #GrupoDynasoft.\n\nUna excelente oportunidad para explorar los casos de uso de firma electrónica #VIDsigner en el sector hotelero y turístico. Además de compartir cómo #VIDidentity está ayudando a los hoteles a digitalizar la gestión de identidades y mejorar la seguridad en la autenticación de clientes.\n\nAgradecemos a #grupodynasoft por la invitación y a todos los asistentes por su interés.\n\n#ValidatedID #VIDpartner #GrupoDynasoft #FirmaElectrónica #TransformaciónDigital #Hoteles #Turismo","images":["https://archive.org/download/validatedid-facebook-media/1118486806949355.jpg","https://archive.org/download/validatedid-facebook-media/1118486796949356.jpg","https://archive.org/download/validatedid-facebook-media/1118486813616021.jpg","https://archive.org/download/validatedid-facebook-media/1118486870282682.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1732791582"},{"anchor":"fb-1732719491-1","date":"27/11/2024","year":"2024","lang":"ES","type":"none","text":"Descubre cómo las firmas electrónicas #VIDsigner integradas dentro de las soluciones SAP pueden optimizar sus transacciones digitales ➡️ https://ow.ly/fSjE50UgJzy\n\nLas empresas que gestionan diariamente muchos documentos se pueden beneficiar de la integración de las firmas electrónicas VIDsigner con #SAP obteniendo la firma de sus documentos dentro de sus soluciones 🧩 #SuccessFactors, #BusinessOne, #ByDesign, #S4HANA y #ECC desde el mismo sistema SAP y con menores costes. 💰","images":[],"video":null,"url":null,"pageRef":"facebook.html#fb-1732719491-1"},{"anchor":"fb-1732529530-1","date":"25/11/2024","year":"2024","lang":"ES","type":"none","text":"🚀 Caso de Éxito: La Universitat de Vic – Universitat Central de Catalunya optimiza la gestión de convenios de prácticas con #VIDsigner 🚀\n\nLa #UVic-UCC ha transformado la gestión de sus convenios de prácticas gracias a la firma electrónica VIDsigner. Con esta solución, lograron automatizar el proceso, mejorar la seguridad de los documentos y garantizar su validez legal, incluso sin certificados digitales.\n\nGracias a esta integración con #Peakway y VIDsigner, la universidad ha mejorado la eficiencia y simplificado procesos complejos, siempre cumpliendo con los más altos estándares legales.\n\nDescubre cómo VIDsigner puede transformar la gestión de documentos en tu institución. 👉 [https://ow.ly/W1vy50UeFSk]\n\n#TransformaciónDigital #FirmaElectrónica #VIDsigner #InnovaciónEducativa #TecnologíaEducativa","images":[],"video":null,"url":null,"pageRef":"facebook.html#fb-1732529530-1"},{"anchor":"fb-1732183514","date":"21/11/2024","year":"2024","lang":"ES","type":"multiPhoto","text":"[CASOS DE USO #VIDsigner] #FirmaElectrónica en #Hoteles\n¿Por qué los hoteles deberían integrar procesos de firma electrónica? Consigue aquí tu brochure completo y gratuito de Firma Electrónica VIDsigner para Hoteles ➡️  ➡️ https://ow.ly/XZx850U7h3Y","images":["https://archive.org/download/validatedid-facebook-media/1112882057509830.jpg","https://archive.org/download/validatedid-facebook-media/1112882030843166.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1732183514"},{"anchor":"fb-1731593803","date":"14/11/2024","year":"2024","lang":"ES","type":"photo","text":"🚀 ¡Gran noticia! ➡️ https://ow.ly/QtBR50U6ZyN \nEstamos muy emocionados de anunciar que Validated ID ha sido seleccionada por Red.es para participar en el Pabellón de España en el #MWC2025, por tercer año consecutivo. \n\nEstamos listos para este gran evento y emocionados por seguir liderando el camino hacia la transformación digital. ¡Nos vemos en el MWC 2025!  #SpainMWC25 #MWC25 #ValidatedID","images":["https://archive.org/download/validatedid-facebook-media/1107486794716023.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1731593803"},{"anchor":"fb-1731575398-1","date":"14/11/2024","year":"2024","lang":"ES","type":"none","text":"🚀 Optimiza tu proceso de firma de documentos con #VIDsigner y SAP 🚀\nCon VIDsigner integrado en SAP, podrás automatizar la firma de contratos, órdenes y más, directamente desde tu sistema ERP. Ahorra tiempo, reduce el uso de papel y cumple con las normativas legales de forma segura y eficiente.\n\n✔️ Firmas electrónicas seguras y trazables\n✔️ Integración fluida con SAP SuccessFactors, Business One, S/4HANA\n✔️ Flexibilidad con diferentes métodos de firma: BIO, REMOTA, CENTRALIZADA\n\n🔗 ¡Descubre cómo VIDsigner puede mejorar tu productividad! https://www.validatedid.com/es/blog/post/mejorar-productividad-con-firma-electronica-y-sap\n\n#SAP #FirmaElectrónica #TransformaciónDigital #VIDsigner #Innovación #Automatización #eIDAS #Sostenibilidad","images":[],"video":null,"url":null,"pageRef":"facebook.html#fb-1731575398-1"},{"anchor":"fb-1731419816","date":"12/11/2024","year":"2024","lang":"ES","type":"photo","text":"🌟 Vichy Catalan agiliza la firma de documentos con #VIDsigner \n\nLa implementación de la solución de firma electrónica VIDsigner, integrada con Gladtolink, ha proporcionado a Vichy Catalan una serie de beneficios, permitiendo la recopilación y explotación de información para obtener conclusiones importantes:\n\n📈 Mayor control y trazabilidad de los documentos.\n📈 Acceso instantáneo a los documentos desde cualquier lugar o por cualquier usuario que necesite acceder a la información.\n📈 Obtención de datos sobre los documentos firmados por usuarios específicos, delegaciones o tipos de firma utilizados.\n\nGracias a nuestra colaboración con #GOLIVESERVICES, Vichy Catalan ha mejorado su eficiencia operativa, logrando un incremento del 39% en los documentos firmados el año pasado. \n\n👉 Lee  más: https://ow.ly/sJef50U576H \n\nEn Validated ID, estamos orgullosos de apoyar a Vichy Catalan en su camino hacia un futuro más sostenible y eficiente.\n\n#eSignature #DigitalTransformation #ValidatedID #Innovation #Sustainability #VichyCatalan","images":["https://archive.org/download/validatedid-facebook-media/1105845128213523.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1731419816"},{"anchor":"fb-1731062753-1","date":"08/11/2024","year":"2024","lang":"ES","type":"none","text":"💡 Consejo útil para el sector sanitario: Agiliza tus firmas con #VIDsigner 💡\n\nEn el mundo de la sanidad, donde cada segundo cuenta, la firma de documentos es un aspecto crítico que no debe ser pasado por alto. Con VIDsigner, #ClínicasDentales, #Fisioterapeutas y #CentrosEstéticos pueden optimizar la forma en que gestionan la firma de documentos esenciales. ¿Qué beneficios obtienes?\n\n➡️ Consentimiento informado: Facilita la obtención de consentimientos firmados de manera rápida y segura, asegurando que los pacientes estén bien informados.\n➡️ Contratos laborales: Agiliza el proceso de firma de contratos, permitiendo que el personal y los proveedores firmen de manera remota y eficiente.\n➡️ Formularios de pacientes: Permite a los pacientes firmar electrónicamente formularios de historial médico y otros documentos necesarios, mejorando la experiencia del paciente y reduciendo el uso de papel.\n\nRecuerda: Implementar VIDsigner es simple, ya que está integrado con más de 150 software de gestión.\n\n👉 ¿Te gustaría saber más sobre cómo firma electrónica puede facilitar la firma de documentos en tu clínica? ¡Visita nuestra web! https://ow.ly/cRsg50U2VVs\n\n#Sanidad #FirmaElectrónica #VIDsigner  #ValidatedID #TransformaciónDigital #EficienciaSanitaria","images":[],"video":null,"url":null,"pageRef":"facebook.html#fb-1731062753-1"},{"anchor":"fb-1730816360","date":"05/11/2024","year":"2024","lang":"ES","type":"multiPhoto","text":"Hoy, nuestro equipo se trasladó a #Madrid para participar en el Showroom de Innovación sobre Identidad Descentralizada y #eIDAS2, organizado por #MASORANGE. \n\nNuestro CEO, Santi Casas, lideró una formación integral sobre identidad descentralizada en el ecosistema #Telco. Durante la sesión, realizó una demostración práctica de #VIDwallet, destacando cómo esta solución, junto con nuestros servicios de #VIDidentity, puede transformar la gestión de la seguridad y la privacidad de los datos en el sector de telecomunicaciones. 💡🔐\n\nQueremos expresar nuestro agradecimiento a #MASORANGE por la invitación y a todos los asistentes por su entusiasmo al participar en esta importante conversación sobre el futuro de la identidad digital. \n\nGracias a iniciativas como esta, podemos seguir forjando un camino hacia un ecosistema Telco más seguro y eficiente, donde la innovación y la confianza son los pilares de cada interacción.\n\n#ValidatedID #SSI #Telecomunicaciones #IdentidadDigital","images":["https://archive.org/download/validatedid-facebook-media/1100230655441637.jpg","https://archive.org/download/validatedid-facebook-media/1100230648774971.jpg","https://archive.org/download/validatedid-facebook-media/1100230685441634.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1730816360"},{"anchor":"fb-1730802721","date":"05/11/2024","year":"2024","lang":"ES","type":"none","text":"Desde todo el equipo de Validated ID, queremos expresar nuestro más sincero dolor por las pérdidas y el sufrimiento que la #DANA ha infligido en muchas zonas de España, especialmente en #Valencia, #Andalucía, #CastillaLaMancha, #Murcia o más recientemente, en #Cataluña. En estos momentos tan difíciles, nuestros pensamientos están con todos los que han sido afectados: #amigos, #familiares, #compañeros, #partners y #clientes. \n\nEs desgarrador presenciar el impacto de esta tragedia en tantas vidas. Sin embargo, también queremos resaltar la increíble #solidaridad que hemos visto en nuestras comunidades. La capacidad de las personas para unirse y apoyarse mutuamente en momentos de crisis es verdaderamente inspiradora. \n\n#Juntos, a pesar de la adversidad, podemos enfrentar cualquier desafío. 🖤 💚 \n\n#Solidaridad #ApoyoComunitario #Esperanza #Unidos #Resiliencia #Crisis #Fuerza #Recuperación #DANA","images":[],"video":null,"url":null,"pageRef":"facebook.html#fb-1730802721"},{"anchor":"fb-1730299280","date":"30/10/2024","year":"2024","lang":"ES","type":"multiPhoto","text":"🏆 ¡Un gran reconocimiento para Validated ID!\n\nHoy, nuestro CEO Santi Casas y Fernando Riera, Account Manager, tuvieron el honor de recibir un galardón de agradecimiento de #GrupoCastilla durante su evento de partners en #Madrid.\n\nAgradecemos a Grupo Castilla por este reconocimiento y su apoyo incondicional. ¡Juntos, seguimos impulsando el futuro de #FirmaElectrónica y la gestión documental en el ámbito de #RRHH!\n\n#ValidatedID #GrupoCastilla #FirmaElectrónica #TransformaciónDigital #Partners #PartnerGCConnect2024","images":["https://archive.org/download/validatedid-facebook-media/1095542755910427.jpg","https://archive.org/download/validatedid-facebook-media/1095542629243773.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1730299280"},{"anchor":"fb-1729851917","date":"25/10/2024","year":"2024","lang":"ES","type":"multiPhoto","text":"Ayer, nuestro CTO, Ivan Basart, participó en la Jornada Anual de la Digital Catalonia Alliance (DCA) - Blockchain en el panel \"Aproximación a las soluciones de Identidad Digital y a las necesidades de modelos de negocio.\"\n\nLa charla giró en torno a la crucial importancia de la #IdentidadDigital en un entorno empresarial en constante evolución. Expertos como Alex Rosales, Jordi Estapé y Jose Francisco Ruiz compartieron perspectivas sobre cómo estas soluciones son clave para asegurar la autenticidad y confianza en las interacciones digitales.\n\nEstamos emocionados por seguir avanzando en este campo y contribuir a un futuro donde la identidad digital garantice seguridad y confianza. \n\n#i2CAT #GeneralitatdeCatalunya #blockchain #ValidatedID #SSI #VIDwallet","images":["https://archive.org/download/validatedid-facebook-media/1091421839655852.jpg","https://archive.org/download/validatedid-facebook-media/1091421826322520.jpg","https://archive.org/download/validatedid-facebook-media/1091421832989186.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1729851917"},{"anchor":"fb-1729595601-1","date":"22/10/2024","year":"2024","lang":"ES","type":"none","text":"🚀 Grandes noticias de nuestro partner #AlephSOFTWARE 🎉\nSu software #GPN6, además de estar disponible en el #MicrosoftAzure Marketplace, está integrado con #VIDidentity, nuestra solución de identidad basada en #wallet, compatible con #eIDAS2.\nDescubre más sobre esta emocionante colaboración en este post 👉 https://bit.ly/3Yeq25K","images":[],"video":null,"url":null,"pageRef":"facebook.html#fb-1729595601-1"},{"anchor":"fb-1729509686","date":"21/10/2024","year":"2024","lang":"ES","type":"none","text":"¡Gracias por ser parte de #VIDpartners2024! 🌟\nHemos preparado un resumen especial en nuestro blog donde encontrarás los momentos más destacados de la velada, desde los premios hasta los insights más valiosos que compartimos. \n\nLee el reportaje completo 👉🏻https://bit.ly/4feBvcC \n\nGracias a todos los que hicieron de este evento un éxito. ¡Nos vemos en la próxima edición! 🙌\n\n#Networking #ValidatedID #VIDpartners2024 #ResumenEvento #Barcelona","images":[],"video":null,"url":null,"pageRef":"facebook.html#fb-1729509686"},{"anchor":"fb-1729014322","date":"15/10/2024","year":"2024","lang":"","type":"video","text":"","images":[],"video":{"embed_url":"https://archive.org/embed/validatedid-facebook-media/523453603874076.mp4?ui-theme=dark","thumbnail_url":"https://archive.org/download/validatedid-facebook-media/523453603874076.mp4.thumbs/523453603874076.mp4_000001.jpg","title":"523453603874076.mp4"},"url":null,"pageRef":"facebook.html#fb-1729014322"},{"anchor":"fb-1728980678-1","date":"15/10/2024","year":"2024","lang":"ES","type":"none","text":"🎥 ¡Revive los mejores momentos de #VIDpartners2024! 🎉\nSi te lo perdiste o simplemente quieres revivirlo, aquí te dejamos el video resumen del evento. ¡No te lo pierdas! 🔗 https://youtu.be/017UIgCb0ZU?si=DnhCpoBLYNUGskLR\n\n¡Comparte tus momentos favoritos con nosotros usando #VIDpartners2024! Nos encantaría ver cómo viviste esta gran noche.\n\n#Networking #Innovación #MomentosÚnicos #VIDpartners2024 #ValidatedID","images":[],"video":null,"url":null,"pageRef":"facebook.html#fb-1728980678-1"},{"anchor":"fb-1728571487","date":"10/10/2024","year":"2024","lang":"ES","type":"photo","text":"Hoy en Barcelona, Validated ID celebra su evento anual de partners.\n¡Que ganas de compartir las novedades con nuestros compañeros de viaje!\n#VIDpartners24","images":["https://archive.org/download/validatedid-facebook-media/1078886100909426.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1728571487"},{"anchor":"fb-1724671251","date":"26/08/2024","year":"2024","lang":"EN","type":"photo","text":"🩺 ✍️ Transform document management in #Healthcare with #VIDsigner \nOur e-signature solution offers a unique paperless experience for the healthcare industry, enabling the digital signing of patient records, lab reports, informed consents, and more.\n\n🔍 Download our white paper here ➡️ https://bit.ly/3YgctAC \n\n#Healthcare #ElectronicSignature #DigitalTransformation #InnovationInHealthcare #FutureOfHealthcare","images":["https://archive.org/download/validatedid-facebook-media/1042442864553750.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1724671251"},{"anchor":"fb-1724058759-1","date":"19/08/2024","year":"2024","lang":"ES","type":"none","text":"[CASO DE ÉXITO] 🏨 Hipotels Hotels & Resorts lleva más de 40.000 documentos firmados de forma satisfactoria por parte de los clientes, consiguiendo reducir el tiempo de espera en el registro de llegada de los clientes. ➡ https://bit.ly/3J8LO3z\n\nEs un claro ejemplo de cómo las firmas electrónicas #VIDsigner tienen un impacto positivo en la gestión hotelera ➡ https://bit.ly/3J8LO3z\n\n#firmaelectronica #firmadigital #Hotels #checkin #PMS #ValidatedID","images":[],"video":null,"url":null,"pageRef":"facebook.html#fb-1724058759-1"},{"anchor":"fb-1722857443","d atedID #CyberGreenProof #Innovación #sostenibilidad","images":["https://archive.org/download/validatedid-facebook-media/1022622816535755.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1722346578"},{"anchor":"fb-1721738031","date":"23/07/2024","year":"2024","lang":"ES","type":"photo","text":"¿Te has preguntado si tu firma biométrica es realmente segura? 🤔\nA diferencia de muchos proveedores que ofrecen una simple imagen de una firma manuscrita, VIDsigner dispone de una verdadera firma biométrica avanzada. ¡Y te contamos por qué es tan importante!\n\n🔒 Seguridad y autenticidad superior: Captura de características físicas y comportamentales únicas.\n⚖️ Evidencias sólidas: Las mismas pruebas utilizadas por peritos caligráficos en procesos judiciales.\n\n👉 Lee el artículo completo aquí https://bit.ly/4cROEra\n¡Asegura tus documentos con la tecnología más avanzada y confiable! 🚀\n \n#FirmaBiométrica #VIDsigner #Seguridad #Innovación","images":["https://archive.org/download/validatedid-facebook-media/1017708500360520.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1721738031"},{"anchor":"fb-1721642106-1","date":"22/07/2024","year":"2024","lang":"ES","type":"none","text":"🏖️ ¡Las vacaciones están en pleno apogeo! ¿Quieres ofrecer a tus clientes una experiencia sin estrés desde el momento de su llegada? Descubre cómo VIDsigner puede transformar las gestiones hoteleras. https://bit.ly/3zShPf1\n\n📱 Con VIDsigner, tus clientes pueden firmar contratos de reserva y documentos desde sus propios dispositivos móviles, eliminando el papeleo engorroso y agilizando el proceso de check-in. La firma electrónica de Validated ID cumple con las normativas más estrictas, garantizando seguridad y legalidad.\n\n🏨 Este verano, facilita las gestiones hotelerasccon VIDsigner y dedica más tiempo a lo que realmente importa: ofrecer experiencias inolvidables a los huéspedes.\n\n🔍 Lee nuestro blog para saber más sobre cómo VIDsigner puede mejorar tus operaciones hoteleras ➡️ https://bit.ly/3zShPf1","images":[],"video":null,"url":null,"pageRef":"facebook.html#fb-1721642106-1"},{"anchor":"fb-1721314723","date":"18/07/2024","year":"2024","lang":"ES","type":"photo","text":"🚀 Mejorando la facturación electrónica en las Pymes 🚀\nValidated ID, B2Brouter y PIMEC han llegado a un acuerdo de colaboración para optimizar la gestión de la facturación electrónica y mejorar la seguridad en las pequeñas y medianas empresas (pymes). \n¡Estamos listos para apoyar a las pymes en su camino hacia la digitalización segura y eficiente!\nConoce más detalles 👉 https://bit.ly/4bRoaVt","images":["https://archive.org/download/validatedid-facebook-media/1014353940695976.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1721314723"},{"anchor":"fb-1721296847","date":"18/07/2024","year":"2024","lang":"ES","type":"photo","text":"Aprovecha la oportunidad para revisar y optimizar tu integración en nuestro Marketplace 👉 https://bit.ly/3SaHcz7 .\n\nSi eres un proveedor de software independiente o has desarrollado un conector, asegúrate de que tu sección esté bien destacada y actualizada. \n\n🔍🔧 Revisa y mejora:\n➡ Destaca tu integración con nuestros servicios.\n➡ Mantén tu información actualizada.\n➡ Refuerza tu presencia digital.\n\nMaximiza el valor de tu asociación con Validated ID y hagamos que este verano sea todo un éxito. ¡Vamos por más!\n\nVer Marketplace ➡ https://bit.ly/3SaHcz7\n\n#VIDsigner  #B2BB #ValidatedID #Integraciones","images":["https://archive.org/download/validatedid-facebook-media/1014171270714243.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1721296847"},{"anchor":"fb-1721209903","date":"17/07/2024","year":"2024","lang":"ES","type":"photo","text":"🚀 ¿Sabes por qué tantos #CEOs optan por las firmas digitales #VIDsigner tras hacer un estudio de mercado? ➡️ https://bit.ly/43Lxs1o\n\n💡 VIDsigner es una herramienta de firma segura y fácil de usar, cumple con los más altos estándares europeos e internacionales 🌍, personaliza el proceso de firma y proporciona un registro de auditoría.\n\nAl implementar VIDsigner en los procesos empresariales, se puede lograr una importante eficiencia operativa y ahorros de hasta el 83%.\n\n¿Quieres saber más? ➡️ https://bit.ly/43Lxs1o","images":["https://archive.org/download/validatedid-facebook-media/1013442450787125.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1721209903"},{"anchor":"fb-1721045649-1","date":"15/07/2024","year":"2024","lang":"ES","type":"none","text":"Mejora la experiencia del paciente, incrementa la productividad de tu personal y optimiza los procesos con una solución completamente digital. 📈💼\nDescubre cómo la firma electrónica de documentos en el ámbito sociosanitario 🏥  y descubre cómo transformar tu organización.\n👉 https://bit.ly/3Wlgm9L\n\n#VIDsigner #Eficiencia #SaludDigital #FirmaElectrónica","images":[],"video":null,"url":null,"pageRef":"facebook.html#fb-1721045649-1"},{"anchor":"fb-1720780717","date":"12/07/2024","year":"2024","lang":"ES","type":"none","text":"Para este fin de semana veraniego, te traemos una lectura refrescante e inspiradora. 🍹📖\nDescubre cómo Vichy Catalan ha digitalizado su red comercial implementando las firmas electrónicas VIDsigner, integradas con gladtolink, gracias a la colaboración con GOLIVE SERVICES y Validated ID.\n✨ Resultados : \n➡ +39% de documentos firmados en 2023 vs. año anterior. \n➡ Procesos más rápidos y seguros con trazabilidad completa. \n➡ Reducción del uso de papel, alineándose con la sostenibilidad.\n¡No te pierdas esta historia de éxito! 🌟 \nLeer más 👉 https://bit.ly/45gAT2m\nhashtag#FirmaDigital hashtag#FirmaElectrónica hashtag#ValidatedID","images":[],"video":null,"url":null,"pageRef":"facebook.html#fb-1720780717"},{"anchor":"fb-1720518175-1","date":"09/07/2024","year":"2024","lang":"EN","type":"none","text":"Discover the future of digital identity with #EUDIwallet!\nDid you know that the EU Digital Identity Wallet can protect your data and facilitate access to online services? With VIDwallet, we ensure the security and privacy of your information\n\n 🔒 How does VIDwallet secure your personal data?\n📱 What benefits does #DigitalIdentityWallet offer in your daily life?\n🌍 Why is VIDwallet important for everyone in the EU?\nDon't miss our latest blog to get all the answers.\n\nRead the full article here 👉 https://bit.ly/4eUZ8Y8","images":[],"video":null,"url":null,"pageRef":"facebook.html#fb-1720518175-1"},{"anchor":"fb-1720178881-1","date":"05/07/2024","year":"2024","lang":"ES","type":"none","text":"¿Te perdiste nuestra ponencia en el #CNIS? ¡No te preocupes! Aquí tienes la grabación para que puedas ver cómo #VIDidnetity está transformando la identidad digital en las Administraciones Públicas junto a nuestro partner #Peakway  ➡   https://youtu.be/mk8LbOtQJRw?si=Vjhbza44R35a4ybO","images":[],"video":null,"url":null,"pageRef":"facebook.html#fb-1720178881-1"},{"anchor":"fb-1719910388","date":"02/07/2024","year":"2024","lang":"ES","type":"photo","text":"¡El pasado viernes, el equipo de Validated ID disfrutó de actividad de Team Building en bcnKITCHEN! \nLa cocina 🍳 se convirtió en una excelente excusa para potenciar cualidades esenciales como la organización, cooperación, compañerismo y liderazgo. A través de la preparación de deliciosos platos, reforzamos nuestras habilidades de comunicación y trabajo en equipo 🤝, creando sinergias y mejorando nuestra cohesión.\nEn Validated ID, estamos comprometidos con nuestros recursos humanos y la sostenibilidad. Actividades como esta no solo mejoran el bienestar del equipo, sino que también refuerzan nuestro compromiso con prácticas responsables y sostenibles. 🌱\n¡Gracias a bcnKITCHEN y a todo el equipo de Validated ID por su participación y entusiasmo! Seguiremos buscando maneras de crecer juntos y fortalecer nuestro entorno de trabajo saludable y sostenible. 🌍\n#TeamBuilding #Cocina 🍴 #TrabajoEnEquipo 🤝 #RecursosHumanos #Sostenibilidad #validatedID","images":["https://archive.org/download/validatedid-facebook-media/1002849081846462.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1719910388"},{"anchor":"fb-1719821603-1","date":"01/07/2024","year":"2024","lang":"ES","type":"none","text":"Desde siempre, en Validated ID hemos confiado en la importancia de los derechos humanos, el trabajo justo, la protección del medio ambiente y la lucha contra la corrupción.\n💚 Nuestras acciones hablan por sí solas:\nUsamos eficientemente los recursos naturales 🌿\nParticipamos activamente en iniciativas de responsabilidad social 🤲\nEstamos comprometidos con la transparencia y la ética en todas nuestras relaciones comerciales 📊\nDescubre más sobre nuestro compromiso y cómo estamos haciendo la diferencia en nuestro último blog post. https://bit.ly/3VICc5L\n \nhashtag#ValidatedID hashtag#PactoMundialONU hashtag#DesarrolloSostenible hashtag#ODS hashtag#TenemosUnPacto con la hashtag#Sostenibilidad","images":[],"video":null,"url":null,"pageRef":"facebook.html#fb-1719821603-1"},{"anchor":"fb-1719405633","date":"26/06/2024","year":"2024","lang":"ES","type":"multiPhoto","text":"¡Hoy, el co-founder y CLO de Validated ID, Fernando Pino, y nuestro CEO, Santi Casas, participaron en la celebración del 25º aniversario de los servicios de confianza en #Madrid!\n\nCon la reciente publicación del Reglamento #eIDAS2, este evento de #ASEPEC es crucial para fortalecer el papel de los Prestadores de Servicios de Confianza en esta nueva era digital. \n\nMuchísimas gracias a #ECIJA por acogernos en su casa y a todos los ponentes por sus presentaciones.","images":["https://archive.org/download/validatedid-facebook-media/998595908938446.jpg","https://archive.org/download/validatedid-facebook-media/998595922271778.jpg","https://archive.org/download/validatedid-facebook-media/998595915605112.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1719405633"},{"anchor":"fb-1719392355","date":"26/06/2024","year":"2024","lang":"ES","type":"multiPhoto","text":"🌟 Ayer, en #CNIS24, tuvimos una sesión inspiradora titulada «Iniciando el camino hacia el uso de las carteras digitales». 🇪🇺 \n\nEn esta ponencia, exploramos cómo el nuevo Reglamento #eIDAS2 está redefiniendo la #IdentidadDigital y los ponentes Santi Casas, Xavier Sancliment y Lluís Alfons compartieron experiencias y herramientas clave para una implementación exitosa en las entidades públicas.\n\n¡Gracias a todos los asistentes por su participación y a nuestros ponentes por sus valiosas aportaciones! Juntos, estamos construyendo un futuro más seguro y eficiente para la identidad digital en el ámbito público. 🚀🔐\n\n#VIDidentity #TransformAAPP #EUDIwallet #AdministracionesPúblicas #InnovaciónDigital #AAPP #CarteraDigital","images":["https://archive.org/download/validatedid-facebook-media/998454152285955.jpg","https://archive.org/download/validatedid-facebook-media/998454145619289.jpg","https://archive.org/download/validatedid-facebook-media/998454175619286.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1719392355"},{"anchor":"fb-1719316664","date":"25/06/2024","year":"2024","lang":"ES","type":"photo","text":"Hoy, junto a nuestro partner #Peakway, participamos en el #CNIS24,  mostrando cómo nuestra solución #VIDidnetity está transformando la identidad digital en las Administraciones Públicas. \n\n¡No te pierdas nuestra ponencia «Iniciando el camino hacia el uso de las carteras digitales» esta tarde a las 17:30 en Sala 7 | TransformAAPP y descubre cómo estamos liderando el cambio hacia una identidad más segura y eficiente! \n\n#CNIS #IdentidadDigital #eIDAS2 #VIDwallet  #InnovaciónTecnológica #AAPP","images":["https://archive.org/download/validatedid-facebook-media/997780895686614.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1719316664"},{"anchor":"fb-1718880587","date":"20/06/2024","year":"2024","lang":"ES","type":"photo","text":"¡Cuenta atrás para el XIV Congreso #CNIS2024! 🚀 El próximo 25 de junio, únete a nosotros para hablar sobre el camino hacia el uso de las carteras digitales y el impacto del nuevo modelo de identidad #eIDAS2.","images":["https://archive.org/download/validatedid-facebook-media/994021929395844.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1718880587"},{"anchor":"fb-1718804408-1","date":"19/06/2024","year":"2024","lang":"FR","type":"none","text":"Dans la vie quotidienne d'un hôpital, de nombreuses interactions nécessitent la signature des patients et du personnel médical. ✍🏼\n\nVous pouvez maintenant commencer à améliorer la productivité dans votre hôpital et sécuriser les données et la documentation sensibles avec les signatures numériques #VIDsigner.\n\n➡️ https://bit.ly/3jsMDav\n\n#signatureelectronique #signaturenumerique #productivite #secteursante","images":[],"video":null,"url":null,"pageRef":"facebook.html#fb-1718804408-1"},{"anchor":"fb-1718703050-1","date":"18/06/2024","year":"2024","lang":"EN","type":"none","text":"💡 Discover in this short video why #VIDsigner #Centralized is the perfect digital signature service to sign with a certificate a large number of documents at once from anywhere on any device at any time.\n\n➡️ https://bit.ly/3t7wSMi\n\n#DigitalSignature #electronicsignature #paperless","images":[],"video":null,"url":null,"pageRef":"facebook.html#fb-1718703050-1"},{"anchor":"fb-1718604253","date":"17/06/2024","year":"2024","lang":"ES","type":"photo","text":"¡Todo listo para el XIV Congreso CNIS! \nAcompáñanos la próxima semana al  #cnis2024 en la ponencia🎤 «Iniciando el camino hacia el uso de las carteras digitales» para explicar el impacto del nuevo modelo de identidad del #eIDAS2  \nContaremos con la participación de:\nSanti Casas, CEO de ValidatedID\nLluis Ariño, CIO – Director TI & Convenor del caso de uso de Diplomas del European Blockchain Partnership en la Universidad Rovira i Virgili\nXavier Sancliment, CEO de Peakway\n🗓️ Día: 25 de junio, 2024\n🕔 Hora: 5:30 PM - 6:00 PM\n📍 Localización: Sala 7 | TransformAAPP\n\n¡No te lo pierdas! Será una excelente oportunidad para aprender y conectar con líderes del sector. #CNIS2024 #VIDidentity #vidwallet","images":["https://archive.org/download/validatedid-facebook-media/991738252957545.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1718604253"},{"anchor":"fb-1718354540","date":"14/06/2024","year":"2024","lang":"ES","type":"photo","text":"¡Estaremos presentes en el próximo evento de ASEPEC para conmemorar el 25º aniversario de los servicios de confianza! Con la reciente publicación del Reglamento hashtag#eIDAS2, este evento es fundamental para fortalecer el papel de los Prestadores de Servicios de Confianza en esta nueva era.\n25 años después, ¡es hora de hashtag#RebootingTrustServices! Este es un momento crucial para avanzar en la confianza digital y asegurar que nuestros servicios sigan siendo líderes en seguridad y fiabilidad.\n🔒 ¡Nos vemos allí para seguir construyendo un futuro más seguro y confiable!\nPaloma LLaneza Nacho Alamillo Domingo Julián Inza Lluís Alfons A. Alonso Hurtado Bueno Ramiro Muñoz Raúl Rubio","images":["https://archive.org/download/validatedid-facebook-media/989778006486903.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1718354540"},{"anchor":"fb-1718275304-1","date":"13/06/2024","year":"2024","lang":"ES","type":"none","text":"Di adiós a las contraseñas! 🔒 Ahora puedes acceder a VIDsigner Centralized de manera segura, rápida y sin contraseñas con VIDwallet. 🚀 Descarga nuestra aplicación VIDidentity 📲 y disfruta de una autenticación más simple y eficiente. ➡ https://bit.ly/3z0zwIS\n#VIDwallet #VIDsigner #VIDidentity #electronicsignature #digitalsignature #passwordless #authentication","images":[],"video":null,"url":null,"pageRef":"facebook.html#fb-1718275304-1"},{"anchor":"fb-1718275255-1","date":"13/06/2024","year":"2024","lang":"ES","type":"none","text":"Di adiós a las contraseñas! 🔒 Ahora puedes acceder a VIDsigner Centralized de manera segura, rápida y sin contraseñas con VIDwallet. 🚀 Descarga nuestra aplicación VIDidentity 📲 y disfruta de una autenticación más simple y eficiente. ➡ https://bit.ly/3z0zwIS\n#VIDwallet #VIDsigner #VIDidentity #electronicsignature #digitalsignature #passwordless #authentication","images":[],"video":null,"url":null,"pageRef":"facebook.html#fb-1718275255-1"},{"anchor":"fb-1718275252-1","date":"13/06/2024","year":"2024","lang":"ES","type":"none","text":"Di adiós a las contraseñas! 🔒 Ahora puedes acceder a VIDsigner Centralized de manera segura, rápida y sin contraseñas con VIDwallet. 🚀 Descarga nuestra aplicación VIDidentity 📲 y disfruta de una autenticación más simple y eficiente. ➡ https://bit.ly/3z0zwIS\n#VIDwallet #VIDsigner #VIDidentity #electronicsignature #digitalsignature #passwordless #authentication","images":[],"video":null,"url":null,"pageRef":"facebook.html#fb-1718275252-1"},{"anchor":"fb-1718097560-1","date":"11/06/2024","year":"2024","lang":"ES","type":"none","text":"💡 Descubre en este vídeo por qué la firma biométrica de #VIDsigner transforma y moderniza la Administración Pública.\n🎬 https://youtu.be/B-k71HBPAcY?feature=shared\n\nLas firmas electrónicas de VIDsigner integradas en la plataforma de #Gestiona #esPublico permiten a las #AAPP acercar los trámites al ciudadano y facilitar la firma en instancias y solicitudes, además de gestionar y tramitar documentos de manera totalmente digital. \n\n#administracionpublica #firmaelectronica #firmadigital #Gestiona #esPublico","images":[],"video":null,"url":null,"pageRef":"facebook.html#fb-1718097560-1"},{"anchor":"fb-1718011489","date":"10/06/2024","year":"2024","lang":"EN","type":"photo","text":"When placing an order online, replying to an email 📩, or using social media accounts, we leave behind data that providers store and manage. We don't keep this #Digitalidentity in a #DigitalWallet, so in most cases, we have no control over what happens to our data or who can view it.\n\nThis is why companies and users are starting to use #SSI for their #identity and master data management.\n\nWe invite you to read our #Whitepaper on the history of #SSI and how it will impact our lives for good: https://bit.ly/4c9TLlJ\n\n#VIDidentity #ValidatedID #VIDwallet","images":["https://archive.org/download/validatedid-facebook-media/986982513433119.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1718011489"},{"anchor":"fb-1717669696","date":"06/06/2024","year":"2024","lang":"ES","type":"none","text":"📢 [CASO DE ÉXITO] Vichy Catalan mejora su gestión documental con #VIDsigner, gladtolink y #GOLIVE \n\nVichy Catalan ha digitalizado su red comercial implementando las firmas electrónicas #VIDsigner, integradas con el #Gladtolink, gracias a la colaboración con #GOLIVE y Validated ID.\n\n🚀 Resultados Tangibles:\n➡ +39 % documentos firmados en 2023 vs. año anterior.\n➡ Procesos más rápidos y seguros con trazabilidad completa.\n➡ Reducción del uso de papel, alineándose con la sostenibilidad.\n\n💬 ¿Quieres saber más? Puedes leer el caso de éxito completo aquí: https://bit.ly/45gAT2m \n\nEste caso de éxito también está disponible en:\nInglés 👉 https://bit.ly/3Xd1POu \nFrancés 👉 https://bit.ly/3KxXg9Q \nAlemán 👉 https://bit.ly/3KsO72m \n\n#Digitalización #FirmasElectrónicas #ValidatedID","images":[],"video":null,"url":null,"pageRef":"facebook.html#fb-1717669696"},{"anchor":"fb-1717584934","date":"05/06/2024","year":"2024","lang":"ES","type":"photo","text":"🏡 🔑 Transformación digital en el sector inmobiliario: ¡Las firmas electrónicas al rescate! 🏢 En el dinámico mundo inmobiliario, la eficiencia es clave. Con #VIDsigner, puedes agilizar el proceso de cierre de contratos, asegurando una experiencia rápida y segura para tus clientes.\n\n🔹 Firma remota y presencial \n🔹 Cumplimiento normativo #eIDAS \n🔹 Integrados con más de 150 software\n\nDescubre cómo nuestras firmas electrónicas están revolucionando el sector inmobiliario 👉   https://www.validatedid.com/es/blog/post/firma-electronica-para-hoteles","images":["https://archive.org/download/validatedid-facebook-media/983443490453688.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1717584934"},{"anchor":"fb-1717494901-1","date":"04/06/2024","year":"2024","lang":"ES","type":"none","text":"[Caso de éxito] Las firmas electrónicas manuscritas #VIDsigner BIO optimizan la gestión de documentos de las clínicas dentales #ClearDent \n\n➡ ¿Cuál fue el mayor desafío para Cleardent a la hora de lograr que sus pacientes firmaran documentos importantes?\n\n➡ ¿De qué manera la integración de VIDsigner en el gestor Mulhacen Soft ha simplificado los procesos de firma en las Clínicas Cleardent?\n\nLee el caso de éxito completo aquí:  https://www.validatedid.com/es/blog/post/las-firmas-electronicas-manuscritas-vidsigner-bio-optimizan-la-gestion-de-documentos-de-las-clinicas-dentales-cleardent-","images":[],"video":null,"url":null,"pageRef":"facebook.html#fb-1717494901-1"},{"anchor":"fb-1717412355","date":"03/06/2024","year":"2024","lang":"EN","type":"multiPhoto","text":"We were in Kosovo last week to train our stakeholders with the Government of Kosovo, concerning the new Identity Wallet. This has been a 2-year project, led in partnership with #Bit4id, aimed at launching a new digital identity in Kosovo, to which our #Wallet is an essential element. Do you want to find out more about this project? Please read here: https://lnkd.in/dvYfeh4d \n#VIDidentity #DreamTeam Mauro Lucchini & Pablo Cosio \n\n#DigitalIdentity #Wallet #IdnetityWallet #SSI #VIDwallet","images":["https://archive.org/download/validatedid-facebook-media/981993757265328.jpg","https://archive.org/download/validatedid-facebook-media/981993770598660.jpg","https://archive.org/download/validatedid-facebook-media/981993737265330.jpg","https://archive.org/download/validatedid-facebook-media/981993807265323.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1717412355"},{"anchor":"fb-1716456632","date":"23/05/2024","year":"2024","lang":"EN","type":"photo","text":"Download our #whitepaper to get a clear understanding of the main reasons why #humanresources should implement digital signatures to streamline recruiting and onboarding, reduce costs, and protect the environment. \nhttps://bit.ly/3Jsnw4f\n\n﻿#digitalsignature #electronicsignature #recruiting #humanresources #VIDsigner","images":["https://archive.org/download/validatedid-facebook-media/974229421375095.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1716456632"},{"anchor":"fb-1715765100-1","date":"15/05/2024","year":"2024","lang":"ES","type":"none","text":"[CASO DE ÉXITO #VIDpartner] 🤩 #MulhacenSoft ha fortalecido su liderazgo en el sector de gestión de clínicas médicas 🏥 al integrar las firmas electrónicas #VIDsigner y asociarse con Validated ID.\n\nDescubre cómo esta colaboración ha mejorado la eficiencia y seguridad en la operación de clínicas. ➡ https://bit.ly/44H1tBg\n\n#FirmasElectrónicas #ValidatedID","images":[],"video":null,"url":null,"pageRef":"facebook.html#fb-1715765100-1"},{"anchor":"fb-1715329000-1","date":"10/05/2024","year":"2024","lang":"ES","type":"none","text":"#ADDInformática integra en su software #ResiPlus el servicio de firma electrónica #VIDsigner con el fin de ayudar a sus clientes a gestionar la firma de los documentos de forma segura y sin necesidad de salir de su herramienta de trabajo habitual. \n\nSigue leyendo la nota de prensa en #DependenciasInfo : https://bit.ly/4bbJPb8\n\n#ValidatedID #VIDpartner #Residencias #FirmaElectrónica","images":[],"video":null,"url":null,"pageRef":"facebook.html#fb-1715329000-1"},{"anchor":"fb-1715245104","date":"09/05/2024","year":"2024","lang":"ES","type":"photo","text":"¡Saludos desde #Bilbao! 🤙 Estamos en pleno evento organizado por nuestro partner, Grupo Castilla, presentando nuestra innovadora solución #SaaS de firmas electrónicas junto a nuestros colegas de Validated ID, Xabier Martínez y Fernando Riera. ¡Estamos listos para compartir cómo cambiamos los flujos de trabajo con #VIDsigner! Let's Go 🚀 🚀\n\ncc Marcos Torres #GCOnTour #FirmasElectrónicas #ValidatedID","images":["https://archive.org/download/validatedid-facebook-media/963475845783786.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1715245104"},{"anchor":"fb-1715088325","date":"07/05/2024","year":"2024","lang":"EN","type":"multiPhoto","text":"Today, our co-founders Santi Casas and Ivan Basart are at the #EBSIEcosystemDay event in #Brussels. Our team, together with our #VIDpartner #IVIS, are presenting our case for the #EBSI Early Adopters Wave 3, focusing on Public Administrations Interoperability.\n\nGet to know more about this project here : https://lnkd.in/dDg4Hqna","images":["https://archive.org/download/validatedid-facebook-media/962145025916868.jpg","https://archive.org/download/validatedid-facebook-media/962145019250202.jpg","https://archive.org/download/validatedid-facebook-media/962145055916865.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1715088325"},{"anchor":"fb-1714463504","date":"30/04/2024","year":"2024","lang":"EN","type":"photo","text":"🌟 Breaking News: Today marks a significant milestone with the publication of a new regulation in the Official Journal of the 🇪🇺 #EuropeanUnion, shaping the landscape of digital trust services. Effective May 20, 2024, this regulation signals a collaborative effort by the Council and the Parliament to advance digital trust in the #EU. Keep an eye out for the first set of implementing acts for #EUDIWallet and electronic attribute attestations, slated for publication by November 21, 2024. Let's embrace this transformative journey together!\n\n#EuropeanUnionRegulation #DigitalTrustTransformation #VIDwallet\n\nENG ➡ https://lnkd.in/druAtxgQ\nESP ➡ https://lnkd.in/dm8nK256","images":["https://archive.org/download/validatedid-facebook-media/956873759777328.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1714463504"},{"anchor":"fb-1714130908","date":"26/04/2024","year":"2024","lang":"EN","type":"multiPhoto","text":"Last night at #Docuworld2024 #Berlin was a dazzling success! 🌟 Congratulations to all our #VIDpartners and DocuWare #Champions award winners 🏆 Great job everyone Ricoh España, #RICSolutions, #GrupoSolitium","images":["https://archive.org/download/validatedid-facebook-media/953978026733568.jpg","https://archive.org/download/validatedid-facebook-media/953978006733570.jpg","https://archive.org/download/validatedid-facebook-media/953977990066905.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1714130908"},{"anchor":"fb-1714037512","date":"25/04/2024","year":"2024","lang":"EN","type":"photo","text":"🌟 Today's the day! Our team is thrilled to be part of #Docuworld2024 in #Berlin today! 🚀 Stop by our booth to meet us and get to know all the news about #VIDsigner electronic signatures integrated in DocuWare.","images":["https://archive.org/download/validatedid-facebook-media/953208046810566.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1714037512"},{"anchor":"fb-1713967723","date":"24/04/2024","year":"2024","lang":"EN","type":"photo","text":"🚀 Qualified Trusted Service Providers like Validated ID are crucial for a decentralized identity approach that respects privacy. 🌐 Dive into our latest blog post to learn more about #eIDAS2 and Digital Identity Revolution in Europe 🇪🇺 written by Santi Casas CEO of Validated ID ➡ https://www.validatedid.com/en/blog/post/eidas2-and-the-digital-identity-revolution-in-europe \n\n#eIDAS #DigitalIdentity #ValidatedID #QTSP #DecentralizedIdentity #privacy","images":["https://archive.org/download/validatedid-facebook-media/952632713534766.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1713967723"},{"anchor":"fb-1713792603","date":"22/04/2024","year":"2024","lang":"ES","type":"photo","text":"🌟✍️ ¡Barcelona Activa elige #VIDsigner para revolucionar sus procesos!! ✍️🌟\nJunto a nuestro partner #Peakway estamos orgullosos de ser parte del éxito de Barcelona Activa al mejorar la seguridad y validez legal de los documentos firmados electrónicamente. 💻🚀 \n#BarcelonaActiva #FirmasElectrónicas #ValidatedID #VIDpartner","images":["https:/
