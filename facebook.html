/archive.org/download/validatedid-facebook-media/951065350358169.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1713792603"},{"anchor":"fb-1713447857","date":"18/04/2024","year":"2024","lang":"EN","type":"multiPhoto","text":"Last week, we had the privilege of attending the General Assembly of The EU Digital Wallet Consortium (EWC) in #Amsterdam, where our VIDidentity Business Development Manager Andreas Abraham represented us.\n\nThis significant meeting saw robust participation from 140 consortium members, representatives of the #EU, and others interested from across Europe, all dedicated to advancing the development and implementation of the EU Digital Identity Wallet.\n\nIf you wish, you can read more about this event here: https://lnkd.in/dZZV9_mK\n\n#EWC #eIDAS2 #VIDidentity #VIDwallet #ValidatedID #IdentityWallet #DigitalIdentity","images":["https://archive.org/download/validatedid-facebook-media/948277377303633.jpg","https://archive.org/download/validatedid-facebook-media/948277370636967.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1713447857"},{"anchor":"fb-1713293410","date":"16/04/2024","year":"2024","lang":"ES","type":"multiPhoto","text":"🌟 ¡Por fin empezó el evento de Ricoh Latin America, Inc! #RicohSummit2024 en #Panamá! 🇵🇦✨ ¡Estamos preparados para una semana llena de inspiración, aprendizaje y networking! 👋 #ValidatedID #FirmaElectrónica #VIDsigner #VIDpartner","images":["https://archive.org/download/validatedid-facebook-media/947046507426720.jpg","https://archive.org/download/validatedid-facebook-media/947046517426719.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1713293410"},{"anchor":"fb-1713267294-1","date":"16/04/2024","year":"2024","lang":"EN","type":"none","text":"Expand your service portfolio and increase your revenue by offering #VIDsigner, our multichannel e-signature SaaS solutions, to your customers.\n🚀 Why should you become a #ValidatedID partner?\nCheck it out here: https://www.validatedid.com/en/blog/post/why-become-a-validated-id-partner","images":[],"video":null,"url":null,"pageRef":"facebook.html#fb-1713267294-1"},{"anchor":"fb-1712850214","date":"11/04/2024","year":"2024","lang":"ES","type":"photo","text":"¡Gracias a #RICSolutions por invitarnos a su increíble jornada donde la #Sostenibilidad y la #Tecnología se unen para transformar el mundo empresarial! Fue muy inspirador ser parte de esta experiencia y compartir ideas para un futuro más sostenible.\n\nEnhorabuena a todos los ponentes que hoy presentaron sus proyectos inspiradores: Cadena Sala de #Okticket, Roger Alves de DocuWare, Pilar Codina y Nestor Giner de Epson Iberica S.A.U, Vicente Ruiz de GDX Group, y todo el equipo de #RIC Gabriela, Herminia, Fidel y Txema","images":["https://archive.org/download/validatedid-facebook-media/943274567803914.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1712850214"},{"anchor":"fb-1712763791-1","date":"10/04/2024","year":"2024","lang":"ES","type":"none","text":"¡Ya falta poco para #RicohSummit2024 en América Latina! 😍\nNuestro compañero Miguel Eduardo Jijón Hanze viajará la semana que viene a Ciudad de #Panamá para presentar nuestras soluciones de firmas electrónicas #VIDsigner a los clientes de Ricoh Latin America, Inc 🤗  #VIDpartenr","images":[],"video":null,"url":null,"pageRef":"facebook.html#fb-1712763791-1"},{"anchor":"fb-1712139590","date":"03/04/2024","year":"2024","lang":"EN","type":"photo","text":"[WHITE PAPER] Find out how to optimize the informed consent signing process with hashtag#VIDsigner. In this white paper, we point out the advantages of electronically signing such sensitive documents and discuss how to choose a secure and appropriate signature system for these cases.\n\nDownload it here (English)➡ https://bit.ly/45KLb9g \n\nThis white paper is also available in other languages: \nSpanish ➡ https://bit.ly/3ELA3i4 \nFrench ➡ https://bit.ly/3LXHIxr\nGerman ➡ https://bit.ly/3y4HlJT\n\n#health #digitalsignature #electronicsignature #informedConsent #healthcare","images":["https://archive.org/download/validatedid-facebook-media/937343695063668.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1712139590"},{"anchor":"fb-1712068254-1","date":"02/04/2024","year":"2024","lang":"ES","type":"none","text":"[CASO DE ÉXITO] 🏨 Hipotels Hotels & Resorts lleva más de 40.000 documentos firmados de forma satisfactoria por parte de los clientes, consiguiendo reducir el tiempo de espera en el registro de llegada de los clientes. \n\nEs un claro ejemplo de cómo las firmas electrónicas hashtag#VIDsigner tienen un impacto positivo en la gestión hotelera, el cual beneficia a los huéspedes, al personal y al medio ambiente. ➡ https://bit.ly/3J8LO3z \n\n#firmaelectronica #firmadigital #Hotels #checkin #SoftwareAvalon","images":[],"video":null,"url":null,"pageRef":"facebook.html#fb-1712068254-1"},{"anchor":"fb-1711542236","date":"27/03/2024","year":"2024","lang":"EN","type":"photo","text":"We are grateful for being awarded the prestigious Seal of Excellence from the #EICAccelerator and feel fortunate to have received funding from the #NextGenerationEU. Thanks to #CDTI and #HorizonEurope, we can continue to improve our decentralized identity solutions and self-managed verifiable credentials. https://lnkd.in/dnwi8SVj","images":["https://archive.org/download/validatedid-facebook-media/932157418915629.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1711542236"},{"anchor":"fb-1710871011","date":"19/03/2024","year":"2024","lang":"ES","type":"photo","text":"Empezamos la semana anunciando nuestra alianza con nuevo #VIDpartner en #Argentina Integrando Salud Especialistas en software médico que brinda a los profesionales de la salud un seguimiento de sus pacientes de 360º, sin necesidad de cambiar de aplicación. \n\nEl objetivo de esta unión estratégica es fortalecer la capacidad de innovación y llegar a grupos clave de consumidores a través de una constante mejora de servicios relacionados con la gestión digital. \n\nConoce Integrando Salud ➡  https://www.integrandosalud.com/es-ar/ \n\n#alianzaempresarial #firmadigital #firmaelectronica #VIDsigner\n#softwaremedico #seguridaddigital #digitalizació","images":["https://archive.org/download/validatedid-facebook-media/926585409472830.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1710871011"},{"anchor":"fb-1710853671-1","date":"19/03/2024","year":"2024","lang":"ES","type":"none","text":"Nuevo maravilloso caso de uso de firmas electrónicas #VIDsigner integradas en software #ResiPlus de nuestro partner #ADDInformatica. \n\nEsta integración permite centralizar la gestión de firma de los documentos de todo tipo de centros, independientemente de su tamaño: residencias de mayores, centros de día, centros de diversidad funcional o centros ocupacionales, y sin necesidad de salir de su herramienta de trabajo habitual. ➡ https://bit.ly/3IGMj4X\n\n#VIDpartner #firmaelectronica #GestiónDocumental #ResidenciasMayores","images":[],"video":null,"url":null,"pageRef":"facebook.html#fb-1710853671-1"},{"anchor":"fb-1710333137","date":"13/03/2024","year":"2024","lang":"EN","type":"photo","text":"Wow!  Over 60,000 electronic signatures were made in a single day! 🎉  🚀📝 Thank you all for signing with #VIDsigner. Let's keep up with the paperless challenge and make a difference together.\n\n#paperless #digitalsignature #esignature #ValidatedID","images":["https://archive.org/download/validatedid-facebook-media/922057933258911.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1710333137"},{"anchor":"fb-1710153824-1","date":"11/03/2024","year":"2024","lang":"ES","type":"none","text":"[CASO DE ÉXITO] #Cuatrecasas, el despacho de abogados líder en España, Portugal y América Latina, apuesta por la agilidad y seguridad jurídica a la hora de firmar documentos legales desde cualquier lugar.\n\nHablamos con Francesc Muñoz, CIO de Cuatrecasas, para conocer a fondo cómo las firmas electrónicas multicanal de #VIDsigner les han ayudado a agilizar la firma de documentos legales. ➡ https://bit.ly/43aDuJY\n\n#firmadeabogados #firmadigital #firmaelectronica #ValidatedID #Cuatrecasas #despachodeabogados","images":[],"video":null,"url":null,"pageRef":"facebook.html#fb-1710153824-1"},{"anchor":"fb-1709922108","date":"08/03/2024","year":"2024","lang":"","type":"photo","text":"Photos","images":["https://archive.org/download/validatedid-facebook-media/918872073577497.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1709922108"},{"anchor":"fb-1709922014","date":"08/03/2024","year":"2024","lang":"","type":"photo","text":"Photos","images":["https://archive.org/download/validatedid-facebook-media/918871116910926.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1709922014"},{"anchor":"fb-1705314387-1","date":"15/01/2024","year":"2024","lang":"ES","type":"none","text":"[#firmadigital #educación] 💡Descubre por qué #VIDsigner está ganando popularidad en muchos centros educativos y #universidades 🌍 debido a su eficiencia y conveniencia a la hora de simplificar tareas administrativas, potenciar el aprendizaje a distancia y reducir el uso del #papel. ♻️","images":[],"video":null,"url":null,"pageRef":"facebook.html#fb-1705314387-1"},{"anchor":"fb-1703155232","date":"21/12/2023","year":"2023","lang":"ES","type":"video","text":"Llegó el momento de bajar las revoluciones y conectar, o no, con tu Grinch interior. ¡Esperamos que pases una Navidad de 100!\n\n🎄 25% de disfrute + 25% de comilonas + 25% de risas + 25% de fiesta 🎄\n\nFeliz Grinchmas","images":[],"video":{"embed_url":"https://archive.org/embed/validatedid-facebook-media/3184194618541532.mp4?ui-theme=dark","thumbnail_url":"https://archive.org/download/validatedid-facebook-media/3184194618541532.mp4.thumbs/3184194618541532.mp4_000001.jpg","title":"Llegó el momento de bajar las revoluciones y conectar, o no, con tu Grinch interior. ¡Esperamos que pases una Navidad de 100!\n\n🎄 25% de disfrute + 25% de comilonas + 25% de risas + 25% de fiesta 🎄\n\nFeliz Grinchmas"},"url":null,"pageRef":"facebook.html#fb-1703155232"},{"anchor":"fb-1702983482-1","date":"19/12/2023","year":"2023","lang":"ES","type":"none","text":"💡Según nuestro análisis detallado del retorno de la inversión (#ROI), es evidente que las empresas que manejan importantes volúmenes de documentos que requieren una firma deberían incorporar la #firmadigital #VIDsigner en sus procesos de trabajo.\n\nNuestra firma proporciona grandes beneficios económicos y medioambientales que se miden mediante la reducción del consumo de papel, la eliminación de procesos manuales, la optimización de los flujos de trabajo, la reducción del fraude y el acceso en cualquier momento y lugar.\n\n¿Qué esperas para hacer el cambio? ♻  \n\n➡️ https://bit.ly/3WjfJvR","images":[],"video":null,"url":null,"pageRef":"facebook.html#fb-1702983482-1"},{"anchor":"fb-1688979386","date":"10/07/2023","year":"2023","lang":"EN","type":"photo","text":"Boston Medical Group México has recently implemented #VIDsigner to improve document signing processes. This has resulted in the signing of over 9,000 documents using VIDsigner BIO, leading to greater efficiency, legal certainty, patient privacy, cost and resource reduction, and improved environmental protection.\n\nWant to know more? ➡ https://bit.ly/44GFDwL\n\n#digitalsignature #healthcare #patientcare #patientexperience","images":["https://archive.org/download/validatedid-facebook-media/741286118002761.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1688979386"},{"anchor":"fb-1688462147","date":"04/07/2023","year":"2023","lang":"ES","type":"photo","text":"[Taller #VIDsigner] 💡🤓\n3 Fechas disponibles: 6 de Julio | 8 de agosto | 7 de septiembre \n¡REGÍSTRATE AHORA!  ➡️ https://bit.ly/2FXyhyz\n\nSesión sobre el poder de las firmas digitales #VIDsigner en la optimización de todo tipo de procesos comerciales. Se testigo de cómo nuestra tecnología vanguardista digitaliza y optimiza el proceso de firma de documentos y aporta un ROI de hasta el 85%.\n\n#VIDSIGNER #webinar #firmadigital #firmaelectrónica","images":["https://archive.org/download/validatedid-facebook-media/736179371846769.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1688462147"},{"anchor":"fb-1688389207-1","date":"03/07/2023","year":"2023","lang":"EN","type":"none","text":"🚀 Discover the 10 main reasons why #VIDsigner is considered the most robust digital signature on the market. ➡️ https://bit.ly/3Pfb9gT\n\nOur more than 11 years in the industry, 3,000 clients, 300 international partners, and 30 million accumulated signatures have helped us understand what aspects are essential for an electronic signature to be legally valid and serve as evidence.\n\n#VIDsigner #esignature #regulation #digitalsignature #electronicsignature #europeanunion #eu","images":[],"video":null,"url":null,"pageRef":"facebook.html#fb-1688389207-1"},{"anchor":"fb-1682597413-1","date":"27/04/2023","year":"2023","lang":"ES","type":"none","text":"MUJERES ESPAÑOLAS LO AMAN 😍\nEFECTO RÁPIDO🥥\n100% ORGÁNICO🥝","images":[],"video":null,"url":null,"pageRef":"facebook.html#fb-1682597413-1"},{"anchor":"fb-1681728906","date":"17/04/2023","year":"2023","lang":"EN","type":"photo","text":"We just reached our highest record with 30M signatures made with #VIDsigner worldwide.  🚀🚀\n\nWe couldn’t be more grateful to our partners and clients for supporting us up to this point and continuously inspiring us to improve and extend our VIDsigner e-signature platform built exclusively to simplify home and work life and protect our planet. 🥳","images":["https://archive.org/download/validatedid-facebook-media/675208941277146.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1681728906"},{"anchor":"fb-1680691933-1","date":"05/04/2023","year":"2023","lang":"ES","type":"none","text":"¿Quieres enviar una comunicación y que quede constancia de ello?\n\n🚀 E-Delivery garantiza que tus clientes o empleados reciben tus comunicados y documentos de forma #fehaciente, con validez #legal.\n\nOlvídate de las comunicaciones certificadas tediosas, costosas y poco fiables. Aquí te lo contamos todo: ➡️ https://bit.ly/3nLqJoL\n\n💡Recuerda que también puedes solicitar una #DEMO personalizada de 20 minutos:  https://bit.ly/3ELpuvc\n\n#comunicacionfehaciente #legal #eDelivery","images":[],"video":null,"url":null,"pageRef":"facebook.html#fb-1680691933-1"},{"anchor":"fb-1680181413","date":"30/03/2023","year":"2023","lang":"EN","type":"photo","text":"🥳 In March, #VIDsigner set a new record by exceeding one million signatures made worldwide IN LESS THAN A MONTH! 🚀🚀","images":["https://archive.org/download/validatedid-facebook-media/662605795870794.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1680181413"},{"anchor":"fb-1675335898","date":"02/02/2023","year":"2023","lang":"EN","type":"photo","text":"🚀 We are thrilled to announce that our identity wallet achieved the next important milestone by becoming #EBSI compliant again.\n \n📲 #VIDwallet, a mobile wallet available for iOS and Android, successfully passed the EBSI compliance test for wallets in all three use cases: diploma, student ID, and identity. VIDwallet is part of VIDchain, Validated ID’s state-of-the-art self-sovereign identity #SSI solution that empowers users to control and manage their digital identity data.\n \nTo get more information on #VIDchain or #VIDwallet, please visit: https://bit.ly/2I7v7JI\n \n#digitalidentity #digitalidentities","images":["https://archive.org/download/validatedid-facebook-media/617970413667666.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1675335898"},{"anchor":"fb-1673263678","date":"09/01/2023","year":"2023","lang":"ES","type":"photo","text":"[WEBINAR] Conoce junto con nuestro CLO y Co-Founder, Fernando Pino, y la editorial jurídica Tirant lo Blanch, las #leyes y #reglamentos que abordan el uso de las firmas electrónicas y que ayudan a garantizar que tengan el mismo valor legal que las firmas manuscritas.\n\n¡Inscríbete y entérate! ➡️ https://lnkd.in/dmwgeXxm\n\n#firmadigital #firmaelectronica #eidas #VIDsigner","images":["https://archive.org/download/validatedid-facebook-media/598162188981822.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1673263678"},{"anchor":"fb-1672833185","date":"04/01/2023","year":"2023","lang":"EN","type":"photo","text":"💡 Are you our #Partner and offer solutions that can be integrated with #VIDsigner? Appearing on our #marketplace gives you more visibility and increases your website traffic. Contact us today!\n\n➡️ https://bit.ly/3lVRLXn","images":["https://archive.org/download/validatedid-facebook-media/594203856044322.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1672833185"},{"anchor":"fb-1672739092-1","date":"03/01/2023","year":"2023","lang":"ES","type":"none","text":"DS Legal Group, despacho experto en #Derecho #Sanitario, ha implantado una serie de mejoras en su plataforma web de servicios #legaltech con la implementación de #credencialesverificables #SSI #VIDchain. \n➡️ https://bit.ly/3GahcNh","images":[],"video":null,"url":null,"pageRef":"facebook.html#fb-1672739092-1"},{"anchor":"fb-1672658095-1","date":"02/01/2023","year":"2023","lang":"ES","type":"none","text":"💡 Empezamos el año debatiendo en este vídeo las nuevas tendencias tecnológicas de #blockchain, #web3, #cripto e #inteligenciaartificial que van a marcar el #2023 junto con otros 26 líderes de la industria en España y Latinoamérica.\n\n➡️ https://bit.ly/3GzA21Q\n\nBITLAB Group\nObservatorio Blockchain","images":[],"video":null,"url":null,"pageRef":"facebook.html#fb-1672658095-1"},{"anchor":"fb-1671792284","date":"23/12/2022","year":"2022","lang":"EN","type":"video","text":"We want to take this time to sincerely wish all those who have been working with us, supporting us and keeping us upbeat mentally, spiritually and physically a MERRY CHRISTMAS and Happy Holidays 🎄 . We toast with you to a healthy and successful 2023! 🥂 💫\n\n¡Always be yourself!","images":[],"video":{"embed_url":"https://archive.org/embed/validatedid-facebook-media/1499262373900916.mp4?ui-theme=dark","thumbnail_url":"https://archive.org/download/validatedid-facebook-media/1499262373900916.mp4.thumbs/1499262373900916.mp4_000001.jpg","title":"We want to take this time to sincerely wish all those who have been working with us, supporting us and keeping us upbeat mentally, spiritually and physically a MERRY CHRISTMAS and Happy Holidays 🎄 . We toast with you to a healthy and successful 2023! 🥂 💫\n\n¡Always be yourself!"},"url":null,"pageRef":"facebook.html#fb-1671792284"},{"anchor":"fb-1671451917","date":"19/12/2022","year":"2022","lang":"ES","type":"multiPhoto","text":"🚀 ¡Otro año más que pasa, pero no sin antes reunirnos para compartir risas, actividades y buenos momentos en equipo! y dar las gracias por los logros 🏆 y aprendizajes obtenidos este año.\n\nCuando cuentas con un equipo comprometido con el crecimiento de la empresa, no hay ningún objetivo que resulte demasiado grande o inalcanzable. 💪 ¡Y ahora vamos a por el #2023!!!\n\n#respeto #apoyo #comunicación #reconocimiento #diversidad #responsabilidad #ValidatedID #VIDsigner #VIDchain #DREAMTEAM","images":["https://archive.org/download/validatedid-facebook-media/580404830757558.jpg","https://archive.org/download/validatedid-facebook-media/580404827424225.jpg","https://archive.org/download/validatedid-facebook-media/580405670757474.jpg","https://archive.org/download/validatedid-facebook-media/580405920757449.jpg","https://archive.org/download/validatedid-facebook-media/580406070757434.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1671451917"},{"anchor":"fb-1666772624","date":"26/10/2022","year":"2022","lang":"ES","type":"photo","text":"Hoy empieza #BDZevent Blockchain Expo & DeFi Congress en #Zaragoza. Un escenario perfecto para conocer las últimas tendencias y soluciones #DeFi, #Web3, #NFTs, #Metaverso, la economía del creador, cómo convergen las Finanzas Centralizadas y Descentralizadas (#CeFi vs #DeFi), y la #criptoeconomía.\n\nY mañana 📆 jueves 27 a las ⏰ 16:30h participamos en la mesa redonda VIII: Web3: Identidad descentralizada.\n\nModerada por Paula Pascual Cortes, Vicepresidenta de Blockchain Aragon, y con ponentes expertos en la materia como Santi Casas, CEO de Validated ID, Carlos Pastor Matut , Líder de Identidad Alastria Blockchain Ecosystem y Experto de European Blockchain Services Infrastructure (Comisión Europea), Carles Garcia, Business Development de #PolygonID y Miguel Angel Calero Fernández, Web3&AI strategist de IZERTIS.\n\nVer programa completo del Congreso -> https://lnkd.in/ewavjwXv","images":["https://archive.org/download/validatedid-facebook-media/531939982270710.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1666772624"},{"anchor":"fb-1666086249-1","date":"18/10/2022","year":"2022","lang":"EN","type":"none","text":"🚀 Want to know the ROI of #VIDsigner digital signatures for your business? You can reduce operating costs by 83% by moving from a paper signature process to a digital signature process!\n\n➡️ https://bit.ly/3M098RM\n\n#digitalsignature #electronicsignature #ROI #returnoninvestment","images":[],"video":null,"url":null,"pageRef":"facebook.html#fb-1666086249-1"},{"anchor":"fb-1666007043","date":"17/10/2022","year":"2022","lang":"ES","type":"photo","text":"Este jueves a las 11h00 nos podrás encontrar en la sala principal del Congreso #NovaGob 2022.\n\nJose Francisco Ruiz, VIDchain Business Manager de Validated ID, dará una breve ponencia sobre \"El modelo de la identidad basada en #wallets del #eIDAS2\".\n\nPrograma: ➡️ https://bit.ly/3T6srLX\n\nTambién tendremos el placer de escuchar otras ponencias destacadas:\n\n💡Nada de teoría, así se digitaliza en la práctica el acceso al empleo público de #Savia.\n\n💡Cinco barreras y cinco razones para ser transparentes en el ámbito de las empresas públicas de Manuel Larrán, Catedrático del Departamento de Economía Financiera y Contabilidad en  la Facultad de Ciencias Económicas y Empresariales de la Universidad de Cádiz.\n\n💡Validación y acreditación de las competencias profesionales para la cualificación del empleado público de Esperanza Gumersinda Marchal Rosa, Coordinadora del Área de Evaluación y Acreditación competencias del #IACP\n\n💡Humanizar la atención a la ciudadanía. Del “Vuelva usted mañana” al “Ya puede usted venir” de Nicolás Suárez","images":["https://archive.org/download/validatedid-facebook-media/523603599771015.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1666007043"},{"anchor":"fb-1665755432","date":"14/10/2022","year":"2022","lang":"ES","type":"photo","text":"🚀 Somos patrocinadores oficiales del evento #NovaGob2022 #Cádiz que se celebra los días 20 y 21 de octubre. ¡Nos podrás encontrar en el Stand 4A!\n\nEl día 20 de octubre tendremos dos #ponencias importantes:\n\n💡 Jose Francisco Ruiz, VIDchain Business Manager de Validated ID: El modelo de la identidad basada en wallets del eIDAS2.\n\n💡 Xavier Sancliment, CEO de @Peakway: La Firma electrónica presencial para Administraciones Públicas.\n\n🔴¡Últimos días para inscribirse en #Novagob2022!\n👉 https://bit.ly/37ORVIT\n\n#VIDchain #VIDsigner","images":["https://archive.org/download/validatedid-facebook-media/521036836694358.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1665755432"},{"anchor":"fb-1665039480","date":"06/10/2022","year":"2022","lang":"EN","type":"photo","text":"🚀 Proud member of Santander X 100: the global entrepreneurship community made up of the most outstanding Santander X #startups and #scaleups with the aim to make our businesses prosper and continue generating a positive impact on today's society.\n\n#SantanderXChallenge #SantanderX100 #metaverse #blockchain #innovation #blockchaintechnology #community #entrepreneurship #VIDchain #VIDwallet","images":["https://archive.org/download/validatedid-facebook-media/512842520847123.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1665039480"},{"anchor":"fb-1664436109-1","date":"29/09/2022","year":"2022","lang":"ES","type":"none","text":"Estamos por finalizar satisfactoriamente las pruebas de interoperabilidad del proyecto #AS4EDI20 para la implementación del perfil CEF eDelivery #AS4 en Europa. 🇪🇺\n\nGracias University of Valencia, #Promofarma, Ionite y a todos los demás miembros del consorcio por contribuir a que un gran número de entidades europeas puedan utilizar los servicios de entrega electrónica compatibles con AS4. \n\n➡️ https://bit.ly/3eUnEy9 \n\n#eIDAS #eDelivery #ConnectingEurope #PEPPOL #CEFTelecom","images":[],"video":null,"url":null,"pageRef":"facebook.html#fb-1664436109-1"},{"anchor":"fb-1664435752-1","date":"29/09/2022","year":"2022","lang":"ES","type":"none","text":"Estamos por finalizar satisfactoriamente las pruebas de interoperabilidad del proyecto #AS4EDI20 para la implementación del perfil CEF eDelivery #AS4 en Europa. 🇪🇺\n\nGracias University of Valencia, #Promofarma, Ionite y a todos los demás miembros del consorcio por contribuir a que un gran número de entidades europeas puedan utilizar los servicios de entrega electrónica compatibles con AS4. \n\n➡️ https://bit.ly/3eUnEy9 \n\n#eIDAS #eDelivery #ConnectingEurope #PEPPOL #CEFTelecom","images":[],"video":null,"url":null,"pageRef":"facebook.html#fb-1664435752-1"},{"anchor":"fb-1662994457","date":"12/09/2022","year":"2022","lang":"ES","type":"photo","text":"¿Tu profesión está asociada al #deporte?\n\n#SportChain tiene como objetivo elevar la confianza en los datos deportivos, y hacer que estos sean verificables, auténticos y analizables. Con este nuevo servicio queremos proteger la identidad, las habilidades y los logros de cualquier deportista. 💪\n\n✍🏼 Ayúdanos: participa en esta encuesta para que podamos llevar el #deporte a otro nivel:\n\n➡️ https://bit.ly/3Kd6pUa\n\n#SportsTechEcosystem #SportsTech #SportsBiz #SportsInnovation #Innovación #SportsNews #InnovationGame #SportChain #deporte #deportistas #VIDchain","images":["https://archive.org/download/validatedid-facebook-media/491661162965259.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1662994457"},{"anchor":"fb-1659509236","date":"03/08/2022","year":"2022","lang":"EN","type":"photo","text":"Download our #whitepaper to get a clear understanding of the main reasons why #humanresources should implement digital signatures to streamline recruiting and onboarding, reduce costs, and protect the environment. ➡️ https://bit.ly/3Jsnw4f\n\n#digitalsignature #electronicsignature #recruiting #humanresources #VIDsigner","images":["https://archive.org/download/validatedid-facebook-media/5598225990202247.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1659509236"},{"anchor":"fb-1659431561","date":"02/08/2022","year":"2022","lang":"EN","type":"photo","text":"#SportChain will revolutionize the sports industry and protect the skills and achievements of athletes. In this section we mention how sports clubs and other related organizations can make use of it, in addition to preventing identity fraud among players.\n\n➡️ https://bit.ly/3zq8pnh\n\n#VIDchain #SportsTechEcosystem #SportsTech #SportsBiz #SportsInnovation #Innovation #SportsNews #InnovationGame","images":["https://archive.org/download/validatedid-facebook-media/5595569613801218.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1659431561"},{"anchor":"fb-1657632164","date":"12/07/2022","year":"2022","lang":"EN","type":"photo","text":"Download now our #whitepaper on #VIDchain, our new solution based on Self-Sovereign Identity or #SSI, an identity ecosystem built on #blockchain technology that promises to completely restructure the current concept of #identity.\n\nVIDchain allows holders and companies to securely and at-scale identify and label any subject and object entity with #cryptographically #verifiable security #credentials, which means it gives complete control of their digital identity and facilitates secure access to any online service.\n\nCheck it out! ➡️ https://bit.ly/3OcVavV\n\n#blockchain #SSI #blockchaintechnology #digitalidentity #VIDchain","images":["https://archive.org/download/validatedid-facebook-media/5537029659655214.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1657632164"},{"anchor":"fb-1657012492","date":"05/07/2022","year":"2022","lang":"EN","type":"photo","text":"We are beyond excited to announce that Validated ID has been selected as a finalist for the Santander X Global Challenge | Blockchain and Beyond, a challenge that seeks to identify #startups and #scaleups with innovative and scalable solutions applying #blockchain technology.\n\nWatch Ivan Basart's live stream pitch on Youtube on Thursday 7 of July, and hang on until Thursday 14th to know who the winner is in a live virtual awards ceremony!\n\n🚀 You can keep track of this revolutionary challenge here: https://bit.ly/3nFpDaQ\n\n#SantanderXChallenge #innovation #startups #blockchaintechnology #scaleups #VIDchain #VIDwallet","images":["https://archive.org/download/validatedid-facebook-media/5517663418258505.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1657012492"},{"anchor":"fb-1656335933","date":"27/06/2022","year":"2022","lang":"EN","type":"multiPhoto","text":"The European Blockchain Convention #2022 started today and our colleagues Ivan Basart, Jose Francisco Ruiz and Albert Cabrerizo are there giving it their all. The #EBC will feature a variety of panels, keynotes, workshops and fire-side chats on the current state of #blockchain, #crypto, #DeFi, #NFTs, and #Web3.\n\n➡️ https://bit.ly/3941m7h\n\n#EBC2022 #VIDchain #VIDsigner #digitalidentity #digitalsignature","images":["https://archive.org/download/validatedid-facebook-media/5496010750423772.jpg","https://archive.org/download/validatedid-facebook-media/5496010727090441.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1656335933"},{"anchor":"fb-1656324879","date":"27/06/2022","year":"2022","lang":"ES","type":"multiPhoto","text":"La ciudad de #Málaga nos acoge hasta el 2 de julio para participar en el XI Campeonato de Europa de #Maxibaloncesto FIMBA Maxibasketball. Asistimos a este evento para dar a conocer #SportChain, una cartera de #identidaddigital centrada en el análisis de datos de los atletas.\n\nNuestra misión es proporcionar seguridad y fiabilidad en el mundo del deporte. 💪\n\n➡️ https://bit.ly/3bwQva3\n\n#blockchain #fimba #VIDchain #SportChain #deporte","images":["https://archive.org/download/validatedid-facebook-media/5495620567129457.jpg","https://archive.org/download/validatedid-facebook-media/5495621020462745.jpg","https://archive.org/download/validatedid-facebook-media/5495621630462684.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1656324879"},{"anchor":"fb-1652879773","date":"18/05/2022","year":"2022","lang":"EN","type":"multiPhoto","text":"The #DocuWorld Americas in #USA #Orlando kicked off this week and many exciting things await us as integrators of the #VIDsigner digital signature, and for the entire community of Users and Partners of DocuWare!\n\nYou can find us at table #7, alternatively, you can connect with Daniel Translateur, VP, and Matias Skliavski, Channel Sales Manager, on LinkedIn if you want to know more about our integration with DocuWare: \n\nhttps://bit.ly/3tt24SK\n\n#DocuWare #VIDsigner #integration #partner #digitalsignature #Digitaltransformation #contentmanagement #documentmanagement","images":["https://archive.org/download/validatedid-facebook-media/5378319768859538.jpg","https://archive.org/download/validatedid-facebook-media/5378319775526204.jpg","https://archive.org/download/validatedid-facebook-media/5378319788859536.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1652879773"},{"anchor":"fb-1651758495","date":"05/05/2022","year":"2022","lang":"ES","type":"photo","text":"Para utilizar una firma digital, dependiendo del país, el firmante debe cumplir ciertos requisitos. Si estás buscando una solución de firma digital en #Argentina 🇦🇷 y tienes dudas, en este apartado te damos toda la información:\n\n➡️ https://bit.ly/39xJ5SN\n\n#firmadigital #firmaelectronica #VIDsigner #marcolegal #argentina #argentinalaw","images":["https://archive.org/download/validatedid-facebook-media/5341044505920398.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1651758495"},{"anchor":"fb-1651651410","date":"04/05/2022","year":"2022","lang":"ES","type":"photo","text":"Golive , además de formar parte de nuestra red de partners, es también aliado de #Oracle y #Sage y acumula más de 700 proyectos de IT en todo el mundo.\n\nSi buscas modernizar y digitalizar tus servicios, ponte en contacto con ellos. Además, te ayudarán a encontrar financiación para que tus proyectos de digitalización no te cuesten dinero. \n\n➡️ Perfil de agente digitalizador: https://bit.ly/38M0c2X\n\n#agentedigitalizador #kitdigital #firmadigital #VIDsigner #firmaelectrónica","images":["https://archive.org/download/validatedid-facebook-media/5337456792945836.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1651651410"},{"anchor":"fb-1651572925","date":"03/05/2022","year":"2022","lang":"EN","type":"photo","text":"We are gearing up for the big day at #DocuWorld2022 Americas. Are you ready? ➡️ Meet us on May 16-20 in #Orlando, Florida as we demo our multichannel #electronicsignature processes integrated with DocuWare and adapted to both face-to-face and remote situations, combining cryptography and biometrics to offer a secure way to electronically sign documents and contracts with full legal validity.\n\n#DocuWorld #partner #users #conference #Florida #USA #VIDsigner #digitalsignature","images":["https://archive.org/download/validatedid-facebook-media/5334880079870174.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1651572925"},{"anchor":"fb-1651489300","date":"02/05/2022","year":"2022","lang":"ES","type":"photo","text":"En este #webinar conducido por Fernando Pino, Co-Founder de Validated ID y Xavier Sancliment, CEO de Peakway, daremos a conocer los beneficios que las firmas multicanal #VIDsigner aportan en muchos #ayuntamientos en España. Entre ellos, agilizar trámites municipales, eliminar burocracia, abaratar costes de gestión a las corporaciones locales y, sobre todo, hacer la vida mucho más cómoda y fácil a la comunidad.\n\nContenido del webinar: \n➡️ Presentación Marco Legislativo y Solución VIDsigner \n➡️ Ejemplos de integración\n➡️ Casos de uso\n\nRegístrate: https://bit.ly/3IIDiWu","images":["https://archive.org/download/validatedid-facebook-media/5332213473470168.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1651489300"},{"anchor":"fb-1650968191","date":"26/04/2022","year":"2022","lang":"ES","type":"photo","text":"El Kit Digital es una iniciativa del Gobierno de España que tiene como objetivo impulsar la digitalización a través de las soluciones disponibles en el mercado.\n\n#Qualita puede ayudarte a solicitar este #bonodigital, que te permitirá acceder e implementar una gran variedad de soluciones de digitalización, entre ellas, la firma electrónica.\n\nContacta a nuestro partner y solicita tu bono: https://bit.ly/3vdPFGE\n\n#VIDsigner #kitdigital #firmadigital #firmaelectrónica","images":["https://archive.org/download/validatedid-facebook-media/5315639565127559.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1650968191"},{"anchor":"fb-1649073688","date":"04/04/2022","year":"2022","lang":"EN","type":"photo","text":"🚀 We are kicking off the week by announcing that we just reached 20 Million VIDsigner signatures made globally 🌎!\n\nWe want to take this opportunity to thank our team, partners and customers for trusting our products and services and we look forward to continuing to deliver excellence in the field of electronic signatures.\n\n#VIDsigner #digitalsignatures #electronicsignatures #achievements #digitalization #companygoals #dreamteam","images":["https://archive.org/download/validatedid-facebook-media/5257527507605432.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1649073688"},{"anchor":"fb-1648739305","date":"31/03/2022","year":"2022","lang":"ES","type":"photo","text":"¿Entras en la categoría de empresa #PYME o eres #autónomo y estás buscando digitalizar y modernizar los procesos de tu empresa?\n\nNuestro partner B2it y Agente Digitalizador te puede ayudar a realizar los trámites necesarios para solicitar el #bono #kitdigital emitido por el Gobierno de España y digitalizar tus servicios con firmas electrónicas #VIDsigner. Conoce su perfil:\n\nhttps://bit.ly/3IUzz8v\n\n#kitdigital #transformaciondigital #bonodigital #VIDsigner #firmadigital #firmaelectronica","images":["https://archive.org/download/validatedid-facebook-media/5247224508635732.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1648739305"},{"anchor":"fb-1648481048","date":"28/03/2022","year":"2022","lang":"ES","type":"photo","text":"¡Nuestro partner #Nextret ya forma parte de la red de Agentes Digitalizadores!\n\nAccede a este portal si eres una #PYME o #Autónomo y estás buscando digitalizar y optimizar tu negocio mediante la implementación de firmas electrónicas #VIDsigner: https://bit.ly/36AC56H\n\n#kitdigital #transformaciondigital #bonodigital #VIDsigner #firmadigital #firmaelectronica","images":["https://archive.org/download/validatedid-facebook-media/5239392676085582.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1648481048"},{"anchor":"fb-1648031065","date":"23/03/2022","year":"2022","lang":"FR","type":"multiPhoto","text":"Aujourd'hui, à l'événement Documation, notre collègue Martí Adroher parlera des avantages de l'intégration de la signature numérique et biométrique #VIDsigner dans notre plate-forme #VIDsignerDOCS.👏👏 \n\n🚩 Nous sommes au stand C75. Visitez-nous 😊\n\n#Documation2022 #Documation #Paris","images":["https://archive.org/download/validatedid-facebook-media/5225291870828996.jpg","https://archive.org/download/validatedid-facebook-media/5225291887495661.jpg","https://archive.org/download/validatedid-facebook-media/5225291860828997.jpg","https://archive.org/download/validatedid-facebook-media/5225291984162318.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1648031065"},{"anchor":"fb-1646312323","date":"03/03/2022","year":"2022","lang":"EN","type":"photo","text":"💡 Have full control over your #identity and enjoy an easy and friendly access to different online services with #VIDchain, our decentralized Self-Sovereign identity (SSI) service based on Blockchain.\n\n➡️ https://bit.ly/32kDCZd\n\n#VIDchain #blockchain #identityverification","images":["https://archive.org/download/validatedid-facebook-media/5171990446159139.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1646312323"},{"anchor":"fb-1645452934","date":"21/02/2022","year":"2022","lang":"ES","type":"photo","text":"A partir de este jueves participaremos junto a nuestro partner Common Management Solutions for Healthcare en el #SEME2022, Sociedad Española de Medicina Estética - SEME Estética de Málaga, evento de referencia del sector de la Medicina Estética a nivel nacional e internacional. Nos encontrarás en el stand 196.\n\nEl 25 de febrero a las 9am nuestro CLO, Fernando Pino, dará una ponencia acerca de los beneficios de la #firmaelectrónica en la gestión de los #consentimientosinformados. Más info:\n\n ➡️ https://bit.ly/33AIWLO\n\n#transformacióndigital #firmaelectrónica #VIDsigner #consentimientoinformado #SEME2022 #digitalizacion","images":["https://archive.org/download/validatedid-facebook-media/5142898069068377.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1645452934"},{"anchor":"fb-1643220682","date":"26/01/2022","year":"2022","lang":"ES","type":"photo","text":"No te pierdas este webinar organizado junto a DocuClass y empieza a gestionar y firmar tus documentos de manera 100% digital y segura gracias a la integración de #DocuClass eContracts y #VIDsigner.\n\n¡Te esperamos!\n\n📆 MIÉRCOLES 2 de febrero a las 15:00h GMT\n➡️ Apúntate aquí: https://bit.ly/3G8v0GY\n\n#webinargratuito #webinar #firmadigital #firmaelectrónica #VIDsigner","images":["https://archive.org/download/validatedid-facebook-media/5057132070978311.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1643220682"},{"anchor":"fb-1642752901","date":"21/01/2022","year":"2022","lang":"DE","type":"video","text":"Die Partnerschaft mit Swisscom Trust Services im Zusammenhang mit qualifizierten elektronischen Signaturen (QES), konzentriert sich auf die Benutzerfreundlichkeit und bietet ein reibungsloses Benutzererlebnis bei gleichzeitig höchstem Vertrauensniveau. Erfahren Sie in diesem Video mehr über uns: https://bit.ly/3xB2quc\n\n#elektronischenSignaturen #VIDsigner #VIDchain #digitalenIdentitäten #QES #VIDpartner #Swisscom","images":[],"video":{"embed_url":"https://archive.org/embed/validatedid-facebook-media/511647556838255.mp4?ui-theme=dark","thumbnail_url":"https://archive.org/download/validatedid-facebook-media/511647556838255.mp4.thumbs/511647556838255.mp4_000001.jpg","title":"Die Partnerschaft mit Swisscom Trust Services im Zusammenhang mit qualifizierten elektronischen Signaturen (QES), konzentriert sich auf die Benutzerfreundlichkeit und bietet ein reibungsloses Benutzererlebnis bei gleichzeitig höchstem Vertrauensniveau. Erfahren Sie in diesem Video mehr über uns: https://bit.ly/3xB2quc\n\n#elektronischenSignaturen #VIDsigner #VIDchain #digitalenIdentitäten #QES #VIDpartner #Swisscom"},"url":null,"pageRef":"facebook.html#fb-1642752901"},{"anchor":"fb-1642176076","date":"14/01/2022","year":"2022","lang":"EN","type":"photo","text":"Today we would like to give a huge welcome to our new #VIDchain Product Manager Andreas Abraham 🤗 🚀 The entire team of Validated ID is thrilled to welcome you on board. We hope you’ll do some amazing works here!\n\nBefore joining Validated ID, Andreas was working at the government innovation center which is part of the Graz University of Technology in Austria. His research interests lie in identity management, distributed ledger technology, privacy-preserving mechanisms and applied cryptography in the related fields. \n\nWelcome to the Validated ID #dreamteam!","images":["https://archive.org/download/validatedid-facebook-media/5002002693157916.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1642176076"},{"anchor":"fb-1641912585","date":"11/01/2022","year":"2022","lang":"DE","type":"video","text":"Als internationaler Partner von Swisscom Trust Services freuen wir uns, unsere Kunden bei der schnellen Abwicklung ihres Geschäfts mit branchenführenden e-Signatur Lösungen zu unterstützen. Wir zeigen Ihnen unseren Wettbewerbsvorteil in Bezug auf ein sicheres E-Unterzeichnen und die digitale Abwicklung von Verträgen. Erfahren Sie in diesem Video mehr über uns.  ➡️ https://bit.ly/3xB2quc\n\n #VIDsigner #swisscom  #eSignatur","images":[],"video":{"embed_url":"https://archive.org/embed/validatedid-facebook-media/467074355135106.mp4?ui-theme=dark","thumbnail_url":"https://archive.org/download/validatedid-facebook-media/467074355135106.mp4.thumbs/467074355135106.mp4_000001.jpg","title":"Als internationaler Partner von Swisscom Trust Services freuen wir uns, unsere Kunden bei der schnellen Abwicklung ihres Geschäfts mit branchenführenden e-Signatur Lösungen zu unterstützen. Wir zeigen Ihnen unseren Wettbewerbsvorteil in Bezug auf ein sicheres E-Unterzeichnen und die digitale Abwicklung von Verträgen. Erfahren Sie in diesem Video mehr über uns.  ➡️ https://bit.ly/3xB2quc\n\n #VIDsigner #swisscom  #eSignatur"},"url":null,"pageRef":"facebook.html#fb-1641912585"},{"anchor":"fb-1641824423","date":"10/01/2022","year":"2022","lang":"ES","type":"photo","text":"Conoce a través de este testimonio la motivación por la cual la Universidad Pontificia Comillas apuesta por la firma remota y centralizada en su impulso por digitalizar y transformar sus procesos educativos. \n\nMás info sobre la #FirmaElectrónica en centros educativos y universidades ➡️ https://bit.ly/3qfdxrr\n\n#firmadigital #VIDsigner #tic #transformaciondigital","images":["https://archive.org/download/validatedid-facebook-media/4987247441300108.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1641824423"},{"anchor":"fb-1641538113","date":"07/01/2022","year":"2022","lang":"EN","type":"video","text":"Find out in this short video why #VIDsigner Centralized is the perfect #digitalsignature service for internal company users who require a large number of documents requiring signatures and allows you to use a #digitalcertificate from any device.","images":[],"video":{"embed_url":"https://archive.org/embed/validatedid-facebook-media/1640032053012929.mp4?ui-theme=dark","thumbnail_url":"https://archive.org/download/validatedid-facebook-media/1640032053012929.mp4.thumbs/1640032053012929.mp4_000001.jpg","title":"Find out in this short video why #VIDsigner Centralized is the perfect #digitalsignature service for internal company users who require a large number of documents requiring signatures and allows you to use a #digitalcertificate from any device."},"url":null,"pageRef":"facebook.html#fb-1641538113"},{"anchor":"fb-1641208823","date":"03/01/2022","year":"2022","lang":"EN","type":"photo","text":"Check out our new funded project by #Trublo #Sportchain.\nIn collaboration with #FimbaSpain we are developing a trusted data and reputation network based on blockchain to manage and create tamper-proof verifiable evidence to notarize all kinds of events and issues in sports competitions. Discover more about #Sportchain here: https://bit.ly/3Jz1kox\n\n#blockchaintechnology #VIDchain #Trublo #SportChain #Fimba","images":["https://archive.org/download/validatedid-facebook-media/4966297336728452.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1641208823"},{"anchor":"fb-1640258737","date":"23/12/2021","year":"2021","lang":"EN","type":"photo","text":"2021 has not been an easy year, nor was 2020. The pandemic has put an end to many plans and good times. In difficult times, we learn to be more grateful for what we have, to be more adaptable, and to value digital transformation and the environment more.\n\nWe at Validated ID wish you a happy holiday season and toast to a prosperous and exciting 2022. 🥂 💫\n\nHappy Holidays! 🎄\nValidated ID team","images":["https://archive.org/download/validatedid-facebook-media/4926279080730278.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1640258737"},{"anchor":"fb-1639468573","date":"14/12/2021","year":"2021","lang":"FR","type":"photo","text":"🗣 Validated ID est désormais certifié #HDS Hébergeur de Données de Santé depuis le 19 octobre 2021 pour le service de signature électronique, l'hébergement d'applications du système d'information, et l'administration du système d'information contenant des données de santé. 👏👏 Accédez au certificat ici ➡️ https://bit.ly/3dIYDlC","images":["https://archive.org/download/validatedid-facebook-media/4884770648214455.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1639468573"},{"anchor":"fb-1639380391","date":"13/12/2021","year":"2021","lang":"EN","type":"photo","text":"Happy to be included in the list of SSI wallets in the #EuropeanBlockchainAssociation. 🙌\nOur #VIDchain wallet is a service designed for helping you to regain control over your digital identity and to exchange digital credentials in a secure and private way.\n\nGet familiar with it and download the VIDchain app on your phone\n➡️ https://bit.ly/30nPYC8 \n\n#SSI #blockchain #digitalwallet #walletapp #digitalidentity","images":["https://archive.org/download/validatedid-facebook-media/4881479158543604.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1639380391"},{"anchor":"fb-1639147654","date":"10/12/2021","year":"2021","lang":"ES","type":"photo","text":"Seguimos con la racha de buenas noticias! 🔥🚀\n\n#VIDsigner forma ya parte del Registro de Proveedores de Servicios de Firma Electrónica de #RepúblicaDominicana, cumpliendo satisfactoriamente con los requisitos establecidos por Instituto Dominicano de las Telecomunicaciones - INDOTEL. \n\nhttps://bit.ly/3dCrUhF","images":["https://archive.org/download/validatedid-facebook-media/4872875966070590.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1639147654"},{"anchor":"fb-1638431167","date":"02/12/2021","year":"2021","lang":"EN","type":"multiPhoto","text":"🔥 Ready for another great day at #Slush2021, the world's leading startup event in #Helsinki. Great to finally be back! cc Ivan Basart","images":["https://archive.org/download/validatedid-facebook-media/4845095988848588.jpg","https://archive.org/download/validatedid-facebook-media/4845096025515251.jpg","https://archive.org/download/validatedid-facebook-media/4845095905515263.jpg","https://archive.org/download/validatedid-facebook-media/4845095908848596.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1638431167"},{"anchor":"fb-1638362998","date":"01/12/2021","year":"2021","lang":"EN","type":"photo","text":"#GLTHDay - Another opportunity to know about the new models of digital identity. \nToday our CTO Ivan Basart participate on #roundtable about Digital Identity & Blockchain together with Top-level speakers:\n➡️ Mariona Capmany - Digital Identity and Innovation Lead at Mitek Systems\n➡️ Daniël Du Seuil - European Blockchain Partnership and Convenor European Self Sovereign\n➡️ Charles Walton - Vice President & General Manager at Avast Software \n\n#legaltech #blockchain #digitalidentity #innovation #SSI #GLTHDay #DigitalIdentity #eIDAS","images":["https://archive.org/download/validatedid-facebook-media/4842236329134554.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1638362998"},{"anchor":"fb-1638279729","date":"30/11/2021","year":"2021","lang":"EN","type":"multiPhoto","text":"Great news! Today at #SlushHQ in #Helsinki Validated ID won pitch contest North meets South 🚀😊 🙌 cc Visit Espoo and Business France Delegation.","images":["https://archive.org/download/validatedid-facebook-media/4839075479450639.jpg","https://archive.org/download/validatedid-facebook-media/4839075549450632.jpg","https://archive.org/download/validatedid-facebook-media/4839075502783970.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1638279729"},{"anchor":"fb-1637851496","date":"25/11/2021","year":"2021","lang":"ES","type":"photo","text":"Apúntate gratis a este #webinar organizado por #ValidatedID y 2day. Hoy hablaremos de las ventajas de la #digitalización con firma electrónica y de los distintos tipos de firma que proporciona el servicio #VIDsigner. Por otro lado, nuestro equipo realizará una demostración práctica de cómo se firma un documento de manera segura, rápida y con validez jurídica.\n\nTe esperamos: https://bit.ly/3CKFTfJ\n\ncc Miguel Eduardo Jijón Hanze y Alex Jacoby\n\n#firmaelectrónica #Perú #webinargratuito","images":["https://archive.org/download/validatedid-facebook-media/4823241994367321.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1637851496"},{"anchor":"fb-1637848159","date":"25/11/2021","year":"2021","lang":"ES","type":"photo","text":"Hoy en #CNIS2021 nuestro equipo está compartiendo las experiencias de Identidad digital #VIDchain y firma electrónica #VIDsigner preparadas para #eIDAS2. \n\nReserva tu cita con uno de nuestros representantes: https://bit.ly/3nqjeAY","images":["https://archive.org/download/validatedid-facebook-media/4823088897715964.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1637848159"},{"anchor":"fb-1637600366","date":"22/11/2021","year":"2021","lang":"ES","type":"photo","text":"Participa en este WEBINAR GRATUITO organizado por nuestro partner Insercop Distrilan en #Colombia y aprende a agilizar la gestión de la documentación necesaria en el mundo de la educación: matrículas, solicitudes de becas, pago de tasas, solicitudes de expediente académico, convenios de prácticas, entre muchos otros.\n\nEn este webinar abordaremos los beneficios que la firma electrónica #VIDsigner aporta en este sector.\n\nRegístrate aquí: https://bit.ly/3DHuvT7","images":["https://archive.org/download/validatedid-facebook-media/4813758068649047.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1637600366"},{"anchor":"fb-1637227018","date":"18/11/2021","year":"2021","lang":"ES","type":"photo","text":"Te esperamos en #CNIS 2021 el 25 y 26 de noviembre, donde compartiremos nuestras soluciones de #firmaelectrónica e #identidaddigital para las #AAPP.\n\nNuestra presencia en el Congreso el 25 de noviembre:   \n\nPonencia. Sala 7 (de 12:30 a 13h)\n➡️ El modelo de la identidad basada en wallets del eIDAS2\n\n👤 Jose Francisco Ruiz, VIDchain Business Manager (SSI- Digital Identity Services) Validated ID\n\nDemostración práctica. Speaker's Corner (de 16 a 17h)\n➡️ Soluciones de Validated ID para la firma electrónica e identidad auto soberana\n\n👤 Ramón Bernabéu, Legal Menager & DPO Validated ID   \n\nReserva tu cita con uno de nuestros representantes: https://bit.ly/3nqjeAY","images":["https://archive.org/download/validatedid-facebook-media/4799337393424448.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1637227018"},{"anchor":"fb-1637219603","date":"18/11/2021","year":"2021","lang":"ES","type":"photo","text":"#Webinar #VIDpartner\n\nMañana a las 10:00h nuestro partner Sofkia Consultoría y Desarrollo S.L. nos contará las ventajas de digitalizar los procesos con #VIDsigner, #Docuware y el portal empleado y ahorro de costes en el #EmailCertificado.\n\nApúntate : https://lnkd.in/dSVz3Siy\n\n¡Os esperamos!","images":["https://archive.org/download/validatedid-facebook-media/4799032406788280.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1637219603"},{"anchor":"fb-1637155773","date":"17/11/2021","year":"2021","lang":"ES","type":"multiPhoto","text":"Hoy estamos presentes en la X Jornada #ACES donde nuestro CEO Santi Casas y CEO de Peakway Xavier Sancliment están explicando cómo la firma electronica facilita los procesos administrativos en las relaciones laborales en el entorno privado.\n\n#VIDsigner #ACES #firmaelectrónica #firmadigital  #sanidadprivada #sanidad #RRHH #recursoshumanos","images":["https://archive.org/download/validatedid-facebook-media/4796378477053673.jpg","https://archive.org/download/validatedid-facebook-media/4796378473720340.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1637155773"},{"anchor":"fb-1636637482","date":"11/11/2021","year":"2021","lang":"EN","type":"photo","text":"What a great day at #Democracy4all - Blockchain for Governance! Today our CEO, Santi Casas will speak at 4:30 pm about a new horizon for digital identity. Come see us!\n\n#blockchain #SSI #identity #VIDchain #ValidatedID","images":["https://archive.org/download/validatedid-facebook-media/4776854862339368.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1636637482"},{"anchor":"fb-1636442488","date":"09/11/2021","year":"2021","lang":"CA","type":"photo","text":"Avui arrenca el Congrés Govern Digital 2021 en línia! \nEn Validated ID tenim el plaer de col·laborar amb el Responsable de Ciberseguretat de FGC Ferrocarrils de la Generalitat de Catalunya Noé Jiménez, que avui a la 13.00 presentarà un taller sobre FGC i la seva estratègia digital per millorar l’eficiència amb la signatura electrònica.\n\nConsulta el programa: https://bit.ly/3k0g7iq \n\n#eSignatures #VIDsigner #ValidatedID #FGC #CongrésGovernDigital","images":["https://archive.org/download/validatedid-facebook-media/4769431183081736.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1636442488"},{"anchor":"fb-1635147776","date":"25/10/2021","year":"2021","lang":"ES","type":"photo","text":"Las Administraciones Públicas que buscan transformación digital para ofrecer mejores servicios a la ciudadanía participan en ​#NovaGob ​2021. Inscríbete a las ponencias de nuestro equipo para afrontar estos retos:\n\n📆 Jueves, 28 de Octubre\n⏰ CEST Time 11:40 a 12:50\n➡️ Presente y futuro de la identidad digital y la firma electrónica en las AAPP \n\n📆 Viernes, 29 de Octubre\n⏰ CEST Time 11:30-12:30\n[SALA DEMO VALIDATED ID]\n➡️ Firma electrónica VIDsigner para Administraciones Públicas. \n\nInscripciones Sala Demo: https://bit.ly/3jdJBaA \n\nPrograma: https://bit.ly/3nrKayN","images":["https://archive.org/download/validatedid-facebook-media/4721368984554623.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1635147776"},{"anchor":"fb-1635081080","date":"24/10/2021","year":"2021","lang":"ES","type":"photo","text":"Evento con nuestros partners en Ecuador","images":["https://archive.org/download/validatedid-facebook-media/4719051481453040.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1635081080"},{"anchor":"fb-1634712864","date":"20/10/2021","year":"2021","lang":"ES","type":"photo","text":"El día 27 de octubre no te pierdas el #WEBINAR organizado por nuestro partner angel24 sobre la problemática a la que se enfrentan los departamentos de #RRHH en la nueva era digital.\n\nEs tu oportunidad de simplificar trámites y ahorrar tiempo y papel con total seguridad mediante #FirmaDigital.\n\nInscríbete aquí: https://bit.ly/3v8ZnbG\n\ncc gladtolink","images":["https://archive.org/download/validatedid-facebook-media/4705991816092340.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1634712864"},{"anchor":"fb-1634624265","date":"19/10/2021","year":"2021","lang":"ES","type":"photo","text":"Un año más, Validated ID acudirá como patrocinador del Congreso #NovaGob los días 28 y 29 de octubre.  En esta ocasión también participaremos en una de las Salas Demo del evento, el 29 de octubre de 11:30 a 12:30, donde nuestro Responsable de Cuentas, Fernando Riera ofrecerá la charla sobre firma biométrica VIDsigner para AAPP. \n\nEl acceso a la Sala Demo es gratuito, sólo tienes que inscribirte previamente para recibir el enlace de conexión.\n\nINSCRÍBETE AQUÍ: https://bit.ly/3jdJBaA","images":["https://archive.org/download/validatedid-facebook-media/4701249723233216.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1634624265"},{"anchor":"fb-1634288612","date":"15/10/2021","year":"2021","lang":"ES","type":"photo","text":"Orgullosos de dar soporte a la Fundación Isaac Peral que a partir de ahora podrá ofrecer a sus patronos y asociados una forma segura y fácil de firmar electrónicamente los documentos de la fundación. https://lnkd.in/eQqHpc96\n\n#VIDsigner #FirmaDigital #FirmaElectrónica #eFirma #VIDpartners","images":["https://archive.org/download/validatedid-facebook-media/4690760807615441.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1634288612"},{"anchor":"fb-1634227338","date":"14/10/2021","year":"2021","lang":"ES","type":"photo","text":"Las firmas electrónicas de #VIDsigner no sólo están integradas de forma nativa con DocuWare, sino que mejoran los flujos de trabajo de DocuWare y permiten a las organizaciones seguir llevando a cabo su actividad con normalidad, con firmas sólidas y legalmente vinculantes.\n\nSi te has perdido el webinar impartido por Juan García Regional Sales Director de #DocuWare, puedes verlo aquí: https://bit.ly/3AHOL4P","images":["https://archive.org/download/validatedid-facebook-media/4688547501170105.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1634227338"},{"anchor":"fb-1634111850","date":"13/10/2021","year":"2021","lang":"EN","type":"photo","text":"Great days at the United VARs annual partner meeting in Stuttgart #Germany. As Solution Partners we're glad to be a part of this great international team and support the changing business landscape with e-signatures integrated with #SAP.\n\n#UVARsAM21 #VIDsigner #RISEwithSAP","images":["https://archive.org/download/validatedid-facebook-media/4683603948331127.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1634111850"},{"anchor":"fb-1633963696","date":"11/10/2021","year":"2021","lang":"ES","type":"photo","text":"Impacientes de empezar el Encuentro de Partners Validated ID #LATAM que tendrá lugar esta tarde en #Quito.\nPartners sponsors: Digital Solutions , #EasysoftSA, Digirati, Twiins HRM , #AVLAbogados\n\n#latinamerica #digital #firmadigital #VIDsigner #VIDpartenrs #firmaelectrónica #transformaciondigital","images":["https://archive.org/download/validatedid-facebook-media/4678229422201913.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1633963696"},{"anchor":"fb-1633670899","date":"08/10/2021","year":"2021","lang":"ES","type":"photo","text":"Descubre las posibilidades que ofrecen las #firmaselectrónicas VIDsigner integradas con #SAP en el webinar gratuito organizado junto a nuestro partner Oreka IT.\n\nEn este #webinar, compartiremos la implementación de #VIDsigner de Validated ID dentro de #SAP S/4HANA y ECC, que permite ganar en interconectividad para que las empresas puedan valorar el servicio desde el primer minuto.\n\nRegístrate aquí:  https://bit.ly/2YAcUNB","images":["https://archive.org/download/validatedid-facebook-media/4667409739950548.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1633670899"},{"anchor":"fb-1632825169","date":"28/09/2021","year":"2021","lang":"EN","type":"photo","text":"Today in UK Health Show our team is sharing the experiences of #DigitalTransformation in the health sector thanks to the electronic signature #VIDsigner, a perfect solution that improves the relationship between the professional and the patient and simplifies obtaining informed consent. \ncc Martí Adroher, Matias Skliavski\n\nWant to know more? Find us at Stand #C8\n\n#healthtech #digitalhealth #HETT2021","images":["https://archive.org/download/validatedid-facebook-media/4637244449633744.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1632825169"},{"anchor":"fb-1632812122","date":"28/09/2021","year":"2021","lang":"ES","type":"photo","text":"El email certificado es la alternativa digital al burofax y al correo postal certificado, que permite tener una comunicación electrónica fehaciente con plena validez legal de tus notificaciones, con un reporte de lo que se envía y cuándo y quién lo recibe. \n\nDescubre todas las ventajas y casos de uso de este servicio en el #webinargratuito#webinargratuito#webinargratuito organizado por nuestro partner Becca Software este JUEVES 30 de septiembre a las 17:00 h.\n\nRegístrate aquí: https://bit.ly/3m7Mg6i \n\n#VIDsigner #EDelivery #emailcertificado #comunicaciónfehaciente #webinar #VIDpartner","images":["https://archive.org/download/validatedid-facebook-media/4636756816349174.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1632812122"},{"anchor":"fb-1632751421","date":"27/09/2021","year":"2021","lang":"ES","type":"photo","text":"Descubre cómo otras #inmobiliarias han aumentado la satisfacción de sus clientes, gracias a la inmediatez en el cierre de las compraventas, alquileres, y reducción de procesos de gestiones presenciales. \n\nInscríbete al #webinar gratuito organizado por nuestro partner en #Colombia Jyg Commerce, los expertos en transformación digital para el sector inmobiliario en firmas digitales. \n\nCc Miguel Eduardo Jijón Hanze y Alberto Jimenez Pedrero\n\nRegístrate aquí: https://bit.ly/3zLAQdh","images":["https://archive.org/download/validatedid-facebook-media/4634403243251198.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1632751421"},{"anchor":"fb-1632747484","date":"27/09/2021","year":"2021","lang":"ES","type":"photo","text":"Validated ID y AXPE Consulting España tienen el placer de invitarle al próximo ☕️ desayuno online gratuito para hablar de innovación en #administraciónPública. \n\nUn encuentro en el que compartiremos las principales herramientas para acompañar a los organismos públicos en el reto de adaptarse a situaciones presenciales y remotas con la ciudadanía: #firmaselectrónicas, #multidispositivo, #blockchain e #identidadDigital.\n\n🧑‍💼👨‍💼 Ponentes y contenidos de la sesión:  \n  \n➡️ Plan de Digitalización para Administraciones Públicas 2021/2025, a cargo de Juan Manuel Martínez Ortiz (Dirección de Administración Pública, #AxpeConsulting)\n\n➡️ Nuevo marco normativo eIDAS V2, a cargo de Nacho Alamillo (Managing partner, #Astrea)\n\n➡️ Marco normativo de acceso electrónico de los ciudadanos a los Servicios Públicos, a cargo de Fernando Pino (CLO, #ValidatedID)\n\n➡️ Resolución de trámites a distancia para la ciudadanía, a cargo de Victor Almonacid (Secretario general, Ayuntamiento De Alzira)\n\n👉 👉 Regístrate aquí: https://bit.ly/3o7CyDL","images":["https://archive.org/download/validatedid-facebook-media/4634189099939279.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1632747484"},{"anchor":"fb-1632309023","date":"22/09/2021","year":"2021","lang":"DE","type":"photo","text":"Discover the main benefits provided by #VIDsigner's digital signature service in tomorrow's #Webinar at 14:00h organized by our #VIDpartner in #CzechRepublic.\n\ncc Tibor Brunclík (#PrintPartners & #SimplyUpTechnologyPartners) & Jana Horáčková (#HoráčekandPartners)\n\nRegister here: https://www.printpartners.cz/docuware-dms-registrace-na-webinar-elektronicky-podpis","images":["https://archive.org/download/validatedid-facebook-media/4616852611672928.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1632309023"},{"anchor":"fb-1632297091","date":"22/09/2021","year":"2021","lang":"ES","type":"photo","text":"Te esperamos este 28 y 29 de Septiembre en el fórum de #AUSAPE  que se llevará a cabo en #Bilbao. \nNuestro experto Xabier Martínez estará encantado explicar a todos los interesados cómo las firmas electrónicas #VIDsigner integradas dentro de las soluciones SAP pueden optimizar sus transacciones digitales.\n\nMás información: https://bit.ly/3AxQjPp","images":["https://archive.org/download/validatedid-facebook-media/4616394438385412.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1632297091"},{"anchor":"fb-1632231972","date":"21/09/2021","year":"2021","lang":"EN","type":"photo","text":"Ready for the UK Health Show 2021? We are! \nOur e-Signature solutions #VIDsigner not only guarantees maximum legal certainty and allows patients and medical staff to feel more comfortable with the processes but also reduces the possibility of errors such as loss of information.  \n\nYou can find us at Stand #C8\n\nStay tuned and contact us for a free demo: https://marketing.validatedid.com/hett-2021","images":["https://archive.org/download/validatedid-facebook-media/4613895455301977.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1632231972"},{"anchor":"fb-1631793388","date":"16/09/2021","year":"2021","lang":"CA","type":"photo","text":"Aprofundeix a la tecnologia revolucionària #blockchain i descobreix les oportunitats que ens brinda en la taula rodona en #BxCat demà a la 11.10. El nostre CEO Santi Casas explicarà l'experiència de #ValidatedID amb les identitats descentralitzades #SSI. \n\ncc Roger Baig (#Vocdoni), Nacho Alamillo Domingo (Astrea La Infopista Jurídica SL), Ignasi Oliva (#i2CAT)","images":["https://archive.org/download/validatedid-facebook-media/4597202670304589.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1631793388"},{"anchor":"fb-1631788609","date":"16/09/2021","year":"2021","lang":"ES","type":"photo","text":"Últimos días para inscribirte al webinar organizado por DocuWare sobre la firma de los documentos creados con el sistema de gestión documental de #DocuWare. \n\nDescubre en directo:  \n\n👉 cómo integrar la firma digital directamente en los documentos del flujo de trabajo sin repercutir en la velocidad de los procesos de la empresa \n\n👉 cómo reducir considerablemente el margen de error y la cantidad de papel utilizada. \n\n📲 Registarte aquí: https://bit.ly/38aZEQx","images":["https://archive.org/download/validatedid-facebook-media/4597005280324328.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1631788609"},{"anchor":"fb-1631090768","date":"08/09/2021","year":"2021","lang":"FR","type":"photo","text":"Validated ID donne rendez-vous à tous ses partenaires pour cette édition à Documation.\n\nVenez nous rencontrer sur notre stand B-5 pour découvrir nos solutions de signature numérique intégrées avec votre GED/ECM, et dématérialiser et automatiser vos processus métier Achats, Comptables, RH, Ventes, etc.\n\nAtelier le 08/09/2021 de 11:00 à la salle Bizet sur les bénéfices de les signatures électroniques et comment intégrer de façon transparente et sécurisée. cc Cedric Guillou, Martí Adroher\n\nInscription gratuite au salon et aux ateliers : https://www.documation.fr/\n\nNotre solutions vous permettant de vous lancer en 3 jours seulement dans la digitalisation de vos processus courants.\n\n#transformationnumérique #salon #workshop #digitalisation","images":["https://archive.org/download/validatedid-facebook-media/4571476319543891.jpg"],"video":null,"url":null,"pageRef":"facebook.html#fb-1631090768"},{"anchor":"fb-1631027035","date":"07/09/2021","year":"2021","lang":"FR","type":"photo","text":"Retrouvez-nous dès aujourd’hui à #Documation à Paris à 11 heures dans la salle Bizet. Dans cet atelier, notre collègue Cedric Guillou vous montrera les bénéfices d’une signature électronique et comment l’intégrer de façon totalement transparente et sécurisée. cc Martí Adroher #dématérialisation #digitalisation #GED #workflows #transformationdigitale #ValidatedID #signaturenumérique","images":["https://archive.org/download/validatedid-facebook-media/4569260603098796.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1631027035"},{"anchor":"fb-1630573241","date":"02/09/2021","year":"2021","lang":"ES","type":"photo","text":"La mayor ventaja de las #FirmasDigitales es la facilidad y rapidez con la que se realizan, sin tener nada que envidiar a una firma manuscrita.\n\n¿Quiere saber cómo se firman digitalmente documentos creados con el sistema de gestión documental de DocuWare?  Inscríbete en este seminario web: https://bit.ly/38aZEQx","images":["https://archive.org/download/validatedid-facebook-media/4552829351408588.png"],"video":null,"url":null,"pageRef":"facebook.html#fb-1630573241"},{"anchor":"fb-1630486839","date":"01/09/2021","year":"2021","lang":"FR","type":"photo","text":"Retrouvez-nous sur l'atelier d'accès libre le MERCREDI 8 SEPTEMBRE à 11h pour parler de les bénéfices de la mise en place d'une #signatureélect
