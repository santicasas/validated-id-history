function detectLanguage(t) {
  var de = ["Biometrische","Zentralisierte","Erfolgsfall","Elektronische","Signatur","Losung","Prasenz","Bildungssektor","Erfolgsgeschichte","biometrischen","digitalen","offentliche","FUR JEDEN","UBERALL","Signaturlosung","zentralisierte","unterschreiben","Swisscom Trust Services und","Integration der digitalen"];
  var fr = ["Signature electronique","Cas d usage","Etude de cas","numeriques","mairies","specifiquement","destinee","PRESENTIELS","SCENARIOS PRESENTIELS","FACON","centralisee","SIGNATURES ELECTRONIQUES","POUR N IMPORTE","certificat numerique","secteur de l"];
  var ca = ["amb idCAT","sector public CAT","pel sector"];
  var es = ["firma ","Firma ","Integracion","integracion","electronica","biometrica","Legalidad","Ventajas","Gestion","Demo firma","Caso de","DEMO Firma","Copia de","Administracion","sin papeles","Firmas ","Webinar","Envia firma","almacena","Digital Future","Clinica CEMTRO","autoadminision","identidad","construyendo","Ekon","Exito","solucion","escenarios","presenciales","Colombia","FORMA MAS SEGURA","FIRMAS ELECTRONICAS","firmacontudnie","CNIS","CERES","firma remota","firma biometrica","firma digital","firma electronica","firmas electronicas","firmas digitales","DOCS ESP"];
  var i;
  for(i=0;i<de.length;i++) if(t.indexOf(de[i])>=0) return "de";
  for(i=0;i<fr.length;i++) if(t.indexOf(fr[i])>=0) return "fr";
  for(i=0;i<ca.length;i++) if(t.indexOf(ca[i])>=0) return "ca";
  for(i=0;i<es.length;i++) if(t.indexOf(es[i])>=0) return "es";
  return "en";
}
function formatDate(d) { return d.slice(6,8)+"/"+d.slice(4,6)+"/"+d.slice(0,4); }
function getYear(d) { return d.slice(0,4); }
var langLabel = {es:"ES",en:"EN",fr:"FR",de:"DE",ca:"CA"};
var langName = {es:"Español",en:"English",fr:"Français",de:"Deutsch",ca:"Català"};
var grid = document.getElementById("grid");
VIDEOS.forEach(function(v) {
  var lang = detectLanguage(v.title);
  var year = getYear(v.date);
  var card = document.createElement("div");
  card.className = "card";
  card.dataset.year = year;
  card.dataset.lang = lang;
  var safe = v.title.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  card.innerHTML =
    "<div class='card-embed'>"+
    "<iframe src='https://archive.org/embed/"+v.id+"?ui-theme=dark' loading='lazy' allowfullscreen></iframe>"+
    "<div class='card-badges'>"+
    "<span class='badge badge-year'>"+year+"</span>"+
    "<span class='badge badge-lang-"+lang+"'>"+(langLabel[lang]||lang)+"</span>"+
    "</div></div>"+
    "<div class='card-body'>"+
    "<div class='card-title'>"+safe+"</div>"+
    "<div class='card-date'>"+formatDate(v.date)+"</div>"+
    "</div>";
  grid.appendChild(card);
});
var counter = document.getElementById("counter");
var noResults = document.getElementById("no-results");
var allCards = Array.from(document.querySelectorAll(".card"));
function updateCounter() {
  counter.textContent = allCards.filter(function(c){return \!c.classList.contains("hidden");}).length;
}
function applyFilters() {
  var checkedYears = Array.from(document.querySelectorAll("[data-group=year]:checked")).map(function(c){return c.value;});
  var checkedLangs = Array.from(document.querySelectorAll("[data-group=lang]:checked")).map(function(c){return c.value;});
  var anyVisible = false;
  allCards.forEach(function(card) {
    var yearMatch = checkedYears.length===0 || checkedYears.indexOf(card.dataset.year)>=0;
    var langMatch = checkedLangs.length===0 || checkedLangs.indexOf(card.dataset.lang)>=0;
    var visible = yearMatch && langMatch;
    card.classList.toggle("hidden", \!visible);
    if(visible) anyVisible = true;
  });
  noResults.classList.toggle("visible", \!anyVisible);
  updateCounter();
}
document.querySelectorAll("input[type=checkbox]").forEach(function(cb){cb.addEventListener("change",applyFilters);});
document.getElementById("btn-clear").addEventListener("click",function(){
  document.querySelectorAll("input[type=checkbox]").forEach(function(cb){cb.checked=false;});
  applyFilters();
});
updateCounter();

</script>
